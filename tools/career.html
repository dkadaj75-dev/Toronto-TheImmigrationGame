<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Condo Life — Career Editor</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, sans-serif; background: #141a28; color: #dfe6f2; }
  header { position: sticky; top: 0; z-index: 5; display: flex; gap: 10px; align-items: center; padding: 10px 14px;
    background: #0f1420ee; backdrop-filter: blur(6px); border-bottom: 1px solid #26304a; }
  header h1 { margin: 0; font-size: 15px; font-weight: 600; }
  header .grow { flex: 1; }
  button { border: 0; border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; background: #2c3a58; color: #dfe6f2; }
  button.primary { background: #3d6fd2; color: #fff; }
  button.danger, .cond-remove { background: #7a3040; }
  button:disabled { opacity: .45; cursor: default; }
  #status { min-width: 150px; text-align: right; font-size: 12px; color: #8fa3c8; }
  #status.ok { color: #7fd98a; } #status.err { color: #e58a8a; }
  main { max-width: 1150px; margin: 0 auto; padding: 14px; }
  section { margin: 14px 0; overflow: hidden; background: #1a2133; border: 1px solid #26304a; border-radius: 12px; }
  section > h2 { display: flex; align-items: center; gap: 8px; margin: 0; padding: 10px 14px; font-size: 13px;
    letter-spacing: .08em; text-transform: uppercase; color: #93a3c0; background: #1f2740; }
  section > h2 .grow { flex: 1; }
  section > h2 button { text-transform: none; letter-spacing: 0; }
  .entity-layout { display: grid; grid-template-columns: 230px 1fr; min-height: 260px; }
  .entity-sidebar { padding: 8px; overflow-y: auto; border-right: 1px solid #26304a; }
  .entity-item { display: flex; width: 100%; align-items: center; gap: 8px; padding: 7px 8px; text-align: left; background: transparent; }
  .entity-item:hover { background: #1c2436; }
  .entity-item.active { background: rgba(90,120,190,.28); }
  .entity-item .badge { margin-left: auto; padding: 2px 7px; font-size: 10px; color: #8fa3c8; background: #10182a; border-radius: 999px; }
  .entity-editor { padding: 16px; overflow-y: auto; }
  .empty { padding: 40px; text-align: center; color: #5f6f93; }
  .card { margin-bottom: 14px; padding: 14px; background: #141b2c; border: 1px solid #26304a; border-radius: 12px; }
  .card h3 { margin: 0 0 10px; font-size: 13px; letter-spacing: .08em; text-transform: uppercase; color: #93a3c0; }
  .frow { display: grid; grid-template-columns: 210px 1fr; gap: 10px; align-items: center; padding: 5px 0; }
  .frow label { font-size: 13px; }
  .frow input[type=number], .frow input[type=text], .frow select { width: 100%; padding: 6px 8px; color: #dfe6f2;
    background: #10182a; border: 1px solid #2c3a58; border-radius: 6px; font: 13px inherit; }
  .frow input[readonly] { color: #6f7fa3; }
  .inline-control { display: flex; align-items: center; gap: 8px; }
  .inline-control input[type=number] { flex: 1; }
  .hint-line { margin-top: 4px; font-size: 11px; color: #6f7fa3; }
  .cond-group { margin: 6px 0; padding: 8px 10px; background: #10182a; border: 1px solid #2c3a58; border-radius: 10px; }
  .cond-group-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .cond-group-head select, .cond-leaf select, .cond-leaf input { padding: 5px 7px; color: #dfe6f2;
    background: #10182a; border: 1px solid #2c3a58; border-radius: 6px; font-size: 12px; }
  .cond-hint { font-size: 11px; color: #8fa3c8; }
  .cond-children { display: flex; flex-direction: column; gap: 6px; }
  .cond-child { display: flex; align-items: flex-start; gap: 8px; }
  .cond-child > :first-child { flex: 1; }
  .cond-leaf { display: flex; flex: 1; flex-wrap: wrap; align-items: center; gap: 8px; padding: 6px 8px;
    background: #1a2133; border: 1px solid #26304a; border-radius: 8px; }
  .cond-var-select { min-width: 190px; }
  .cond-add-row { display: flex; gap: 6px; margin-top: 6px; }
  .cond-add-row button, .cond-remove { flex-shrink: 0; padding: 5px 9px; font-size: 11px; }
  #validationList { margin: 0; padding: 6px 14px 14px; list-style: none; }
  #validationList li { padding: 4px 0; font-size: 12px; color: #e0b05f; border-bottom: 1px solid #212b44; }
  #validationList li:last-child { border-bottom: 0; }
  #validationList:empty::before { content: 'No issues found.'; color: #5f6f93; font-size: 12px; }
  @media (max-width: 720px) {
    .entity-layout { grid-template-columns: 1fr; }
    .entity-sidebar { max-height: 180px; border-right: 0; border-bottom: 1px solid #26304a; }
    .frow { grid-template-columns: 1fr; gap: 3px; }
  }
</style>
</head>
<body>
<header>
  <h1>💼 Career Editor</h1>
  <span class="grow"></span>
  <button id="save" class="primary" disabled>Save changes</button>
  <span id="status">loading…</span>
</header>
<main>
  <section id="visasSection" data-file="visas.json">
    <h2>Visas <span class="grow"></span><button id="newVisa">+ New visa</button></h2>
    <div class="entity-layout">
      <nav id="visaSidebar" class="entity-sidebar"></nav>
      <div id="visaEditor" class="entity-editor"><div class="empty">Select a visa</div></div>
    </div>
  </section>
  <section id="jobsSection" data-file="jobs.json">
    <h2>Jobs <span class="grow"></span><button id="newJob">+ New job</button></h2>
    <div class="entity-layout">
      <nav id="jobSidebar" class="entity-sidebar"></nav>
      <div id="jobEditor" class="entity-editor"><div class="empty">Select a job</div></div>
    </div>
  </section>
  <section id="validationSection">
    <h2 id="validationHeader">Validation</h2>
    <ul id="validationList"></ul>
  </section>
</main>

<script>
// Career Editor V4: plain inline script for jsdom. It edits visas.json and jobs.json only;
// tuning/stats/simstate/quests are read-only references for integrity checks and dropdowns.
const API = '/api/data/';
const state = {
  visas: null, jobs: null, tuning: null, stats: null, simstate: null, quests: null,
  selectedVisa: null, selectedJob: null, dirty: new Set(),
};

async function fetchJson(name) {
  const res = await fetch(API + name);
  if (!res.ok) throw new Error(`${name}: HTTP ${res.status}`);
  return res.json();
}
async function load() {
  setStatus('loading…');
  try {
    const [visas, jobs, tuning, stats, simstate, quests] = await Promise.all([
      fetchJson('visas.json'), fetchJson('jobs.json'), fetchJson('tuning.json'),
      fetchJson('stats.json'), fetchJson('simstate.json'), fetchJson('quests.json'),
    ]);
    Object.assign(state, { visas, jobs, tuning, stats, simstate, quests });
    state.dirty.clear();
    if (!state.selectedVisa && visas.visas.length) state.selectedVisa = visas.visas[0].id;
    if (!state.selectedJob && jobs.jobs.length) state.selectedJob = jobs.jobs[0].id;
    renderAll();
    setStatus('loaded', 'ok');
  } catch (e) { setStatus(String(e.message || e), 'err'); }
}
async function saveAll() {
  setStatus('saving…');
  try {
    const files = { 'visas.json': state.visas, 'jobs.json': state.jobs };
    for (const file of [...state.dirty]) {
      const res = await fetch(API + file, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(files[file], null, 2),
      });
      if (!res.ok) throw new Error(`${file}: HTTP ${res.status}`);
      state.dirty.delete(file);
    }
    updateSave();
    setStatus('saved — game hot-reloads', 'ok');
  } catch (e) { setStatus(String(e.message || e), 'err'); }
}
function markDirty(file) { state.dirty.add(file); updateSave(); setStatus('unsaved changes'); }
function updateSave() { document.getElementById('save').disabled = state.dirty.size === 0; }
function setStatus(msg, cls = '') { const el = document.getElementById('status'); el.textContent = msg; el.className = cls; }
function slugify(name) { return name.trim().toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, ''); }
function uniqueId(base, ids, fallback) {
  let root = base && /^[a-z]/.test(base) ? base : `${fallback}_${base || fallback}`;
  let id = root, n = 2;
  while (ids.includes(id)) id = `${root}_${n++}`;
  return id;
}
function selectedVisa() { return state.visas.visas.find((v) => v.id === state.selectedVisa) || null; }
function selectedJob() { return state.jobs.jobs.find((j) => j.id === state.selectedJob) || null; }
function frow(label, input) {
  const row = document.createElement('div'); row.className = 'frow';
  const lab = document.createElement('label'); lab.textContent = label;
  row.append(lab, input); return row;
}
function textInput(value, onInput, path, readonly = false) {
  const el = document.createElement('input'); el.type = 'text'; el.value = value ?? ''; el.dataset.path = path; el.readOnly = readonly;
  if (!readonly) el.addEventListener('input', () => onInput(el.value));
  return el;
}
function numberInput(value, onInput, path, opts = {}) {
  const el = document.createElement('input'); el.type = 'number'; el.step = opts.step || 'any';
  if (opts.min !== undefined) el.min = opts.min; if (opts.max !== undefined) el.max = opts.max;
  el.value = value ?? ''; el.dataset.path = path;
  el.addEventListener('input', () => onInput(el.value === '' ? (opts.emptyValue ?? 0) : Number(el.value)));
  return el;
}
function checkInput(value, onChange, path) {
  const el = document.createElement('input'); el.type = 'checkbox'; el.checked = !!value; el.dataset.path = path;
  el.addEventListener('change', () => onChange(el.checked)); return el;
}
function selectInput(options, value, onChange, path) {
  const el = document.createElement('select'); el.dataset.path = path;
  for (const [v, label] of options) { const o = document.createElement('option'); o.value = v; o.textContent = label; el.appendChild(o); }
  el.value = value ?? '';
  el.addEventListener('change', () => onChange(el.value)); return el;
}

// Quest Editor condition builder, adapted with an owner callback so the same renderer edits
// either visa.requirements or job.requirements. IDs are offered only from reference JSON.
function isLeafCond(c) { return c != null && typeof c === 'object' && !('all' in c) && !('any' in c); }
function getLeafOp(leaf) { for (const op of ['gte', 'lte', 'eq', 'neq']) if (op in leaf) return op; return null; }
function describeVarPath(path) {
  if (path === 'funds' || path === 'time.hour' || path === 'time.day') return { kind: 'number' };
  if (path.startsWith('needs.') || path.startsWith('skills.')) return { kind: 'number' };
  if (path.startsWith('vars.')) {
    const v = state.simstate.variables.find((x) => x.id === path.slice(5));
    return { kind: 'var', varType: v ? v.type : 'string' };
  }
  if (/^quests\.(.+)\.state$/.test(path)) return { kind: 'queststate' };
  return { kind: 'unknown' };
}
function defaultVarPath() { return state.stats.needs.length ? `needs.${state.stats.needs[0].id}` : 'funds'; }
function defaultValueFor(path, op, oldValue) {
  const info = describeVarPath(path);
  if (op === 'gte' || op === 'lte') return typeof oldValue === 'number' ? oldValue : 0;
  if (info.kind === 'queststate') return ['locked', 'active', 'done'].includes(oldValue) ? oldValue : 'locked';
  if (info.kind === 'var') {
    if (info.varType === 'boolean') return typeof oldValue === 'boolean' ? oldValue : false;
    if (info.varType === 'number') return typeof oldValue === 'number' ? oldValue : 0;
    return typeof oldValue === 'string' ? oldValue : '';
  }
  return typeof oldValue === 'number' ? oldValue : 0;
}
function resetLeaf(leaf, op) {
  const oldOp = getLeafOp(leaf), oldValue = oldOp ? leaf[oldOp] : undefined;
  delete leaf.gte; delete leaf.lte; delete leaf.eq; delete leaf.neq;
  leaf[op] = defaultValueFor(leaf.var, op, oldValue);
}
function appendVarOptions(select, current) {
  const groups = [
    ['Needs', state.stats.needs.map((x) => [`needs.${x.id}`, x.name])],
    ['Skills', state.stats.skills.map((x) => [`skills.${x.id}`, x.name])],
    ['Economy', [['funds', 'Funds']]],
    ['Time', [['time.hour', 'Hour of day'], ['time.day', 'Day']]],
    ['Variables', state.simstate.variables.map((x) => [`vars.${x.id}`, x.name])],
    ['Quests', state.quests.quests.map((x) => [`quests.${x.id}.state`, `${x.name} (state)`])],
  ];
  const known = new Set();
  for (const [label, values] of groups) {
    if (!values.length) continue;
    const group = document.createElement('optgroup'); group.label = label;
    for (const [value, text] of values) { const o = document.createElement('option'); o.value = value; o.textContent = text; group.appendChild(o); known.add(value); }
    select.appendChild(group);
  }
  if (current && !known.has(current)) {
    const group = document.createElement('optgroup'); group.label = 'Unknown (stale id)';
    const o = document.createElement('option'); o.value = current; o.textContent = current; group.appendChild(o); select.appendChild(group);
  }
  select.value = current;
}
function conditionValueInput(path, value, onChange, condPath) {
  const info = describeVarPath(path); let el;
  if (info.kind === 'queststate') {
    el = selectInput([['locked', 'locked'], ['active', 'active'], ['done', 'done']], value, onChange, '');
  } else if (info.kind === 'var' && info.varType === 'boolean') {
    el = selectInput([['true', 'true'], ['false', 'false']], String(!!value), (v) => onChange(v === 'true'), '');
  } else if (info.kind === 'number' || (info.kind === 'var' && info.varType === 'number')) {
    el = numberInput(value, onChange, '', { emptyValue: 0 });
  } else {
    el = textInput(value, onChange, '');
  }
  delete el.dataset.path; el.dataset.role = 'value'; el.dataset.condPath = condPath; return el;
}
function renderConditionNode(node, path, context) { return isLeafCond(node) ? renderLeaf(node, path, context) : renderGroup(node, path, context); }
function commitCondition(context) {
  context.owner.requirements = context.root;
  markDirty(context.file);
  renderAll();
}
function renderGroup(node, path, context) {
  const key = 'all' in node ? 'all' : 'any';
  const box = document.createElement('div'); box.className = 'cond-group'; box.dataset.condPath = path; box.dataset.owner = context.kind;
  const head = document.createElement('div'); head.className = 'cond-group-head';
  const combinator = selectInput([['all', 'ALL'], ['any', 'ANY']], key, (next) => {
    const children = node[key]; delete node.all; delete node.any; node[next] = children; commitCondition(context);
  }, '');
  delete combinator.dataset.path; combinator.dataset.role = 'combinator'; combinator.dataset.condPath = path;
  combinator.dataset.owner = context.kind;
  const hint = document.createElement('span'); hint.className = 'cond-hint';
  hint.textContent = key === 'all' ? '(every child must hold; empty = vacuously TRUE)' : '(any child must hold; empty = FALSE)';
  head.append(combinator, hint); box.appendChild(head);
  const children = document.createElement('div'); children.className = 'cond-children';
  (node[key] || []).forEach((child, index) => {
    const childPath = `${path}.${index}`, wrap = document.createElement('div'); wrap.className = 'cond-child';
    wrap.appendChild(renderConditionNode(child, childPath, context));
    const remove = document.createElement('button'); remove.className = 'cond-remove'; remove.textContent = '× remove';
    remove.dataset.action = 'remove-cond'; remove.dataset.condPath = childPath; remove.dataset.owner = context.kind;
    remove.addEventListener('click', () => { node[key].splice(index, 1); commitCondition(context); });
    wrap.appendChild(remove); children.appendChild(wrap);
  });
  box.appendChild(children);
  const addRow = document.createElement('div'); addRow.className = 'cond-add-row';
  const addLeaf = document.createElement('button'); addLeaf.textContent = '+ Condition'; addLeaf.dataset.action = 'add-leaf';
  addLeaf.dataset.condPath = path; addLeaf.dataset.owner = context.kind;
  addLeaf.addEventListener('click', () => { node[key].push({ var: defaultVarPath(), gte: 0 }); commitCondition(context); });
  const addGroup = document.createElement('button'); addGroup.textContent = '+ Group'; addGroup.dataset.action = 'add-group';
  addGroup.dataset.condPath = path; addGroup.dataset.owner = context.kind;
  addGroup.addEventListener('click', () => { node[key].push({ all: [] }); commitCondition(context); });
  addRow.append(addLeaf, addGroup); box.appendChild(addRow); return box;
}
function renderLeaf(leaf, path, context) {
  const row = document.createElement('div'); row.className = 'cond-leaf'; row.dataset.condPath = path; row.dataset.owner = context.kind;
  const variable = document.createElement('select'); variable.className = 'cond-var-select'; variable.dataset.role = 'var';
  variable.dataset.condPath = path; variable.dataset.owner = context.kind; appendVarOptions(variable, leaf.var);
  variable.addEventListener('change', () => { const op = getLeafOp(leaf) || 'gte'; leaf.var = variable.value; resetLeaf(leaf, op); commitCondition(context); });
  const operator = selectInput(['gte', 'lte', 'eq', 'neq'].map((x) => [x, x]), getLeafOp(leaf) || 'gte', (op) => { resetLeaf(leaf, op); commitCondition(context); }, '');
  delete operator.dataset.path; operator.dataset.role = 'op'; operator.dataset.condPath = path; operator.dataset.owner = context.kind;
  const op = getLeafOp(leaf) || 'gte';
  const value = conditionValueInput(leaf.var, leaf[op], (next) => { leaf[op] = next; context.owner.requirements = context.root; markDirty(context.file); renderValidation(); }, path);
  value.dataset.owner = context.kind;
  row.append(variable, operator, value); return row;
}
function conditionEditor(owner, kind, file) {
  const root = owner.requirements || { all: [] };
  const wrap = document.createElement('div'); wrap.dataset.condRoot = 'requirements'; wrap.dataset.owner = kind;
  wrap.appendChild(renderConditionNode(root, 'requirements', { owner, kind, file, root }));
  if (!owner.requirements) {
    const hint = document.createElement('div'); hint.className = 'hint-line'; hint.textContent = 'No requirements saved. Adding a condition or group creates the tree.';
    wrap.appendChild(hint);
  }
  return wrap;
}

function renderVisaSidebar() {
  const root = document.getElementById('visaSidebar'); root.innerHTML = '';
  for (const visa of state.visas.visas) {
    const button = document.createElement('button'); button.className = `entity-item visa-item${visa.id === state.selectedVisa ? ' active' : ''}`;
    button.dataset.visaId = visa.id; button.innerHTML = `<span>${visa.name}</span>${visa.durationDays === null ? '<span class="badge">permanent</span>' : ''}`;
    button.addEventListener('click', () => { state.selectedVisa = visa.id; renderAll(); }); root.appendChild(button);
  }
}
function renderJobSidebar() {
  const root = document.getElementById('jobSidebar'); root.innerHTML = '';
  for (const job of state.jobs.jobs) {
    const button = document.createElement('button'); button.className = `entity-item job-item${job.id === state.selectedJob ? ' active' : ''}`;
    button.dataset.jobId = job.id; button.textContent = job.name;
    button.addEventListener('click', () => { state.selectedJob = job.id; renderAll(); }); root.appendChild(button);
  }
}
function card(title) { const el = document.createElement('div'); el.className = 'card'; el.innerHTML = `<h3>${title}</h3>`; return el; }
function renderVisaEditor() {
  const root = document.getElementById('visaEditor'), visa = selectedVisa(); root.innerHTML = '';
  if (!visa) { root.innerHTML = '<div class="empty">Select a visa</div>'; return; }
  const details = card('Visa');
  details.appendChild(frow('id (fixed)', textInput(visa.id, () => {}, 'visa.id', true)));
  details.appendChild(frow('name', textInput(visa.name, (v) => { visa.name = v; markDirty('visas.json'); renderVisaSidebar(); renderValidation(); }, 'visa.name')));
  const durationWrap = document.createElement('div'); durationWrap.className = 'inline-control';
  const duration = numberInput(visa.durationDays, (v) => { visa.durationDays = v; markDirty('visas.json'); renderValidation(); }, 'visa.durationDays', { min: 0 });
  duration.disabled = visa.durationDays === null;
  const permanent = checkInput(visa.durationDays === null, (checked) => { visa.durationDays = checked ? null : 30; markDirty('visas.json'); renderAll(); }, 'visa.permanent');
  const permLabel = document.createElement('label'); permLabel.append(permanent, ' permanent'); durationWrap.append(duration, permLabel);
  details.appendChild(frow('duration days', durationWrap));
  details.appendChild(frow('losable', checkInput(visa.losable, (v) => { visa.losable = v; markDirty('visas.json'); }, 'visa.losable')));
  details.appendChild(frow('grace days', numberInput(visa.graceDays, (v) => { visa.graceDays = v; markDirty('visas.json'); }, 'visa.graceDays', { min: 0, emptyValue: 0 })));
  details.appendChild(frow('obtained via', selectInput([['', '— start status / none —'], ['quest', 'Quest'], ['application', 'Application']], visa.obtainedVia, (v) => {
    if (v) visa.obtainedVia = v; else delete visa.obtainedVia; markDirty('visas.json');
  }, 'visa.obtainedVia')));
  details.appendChild(frow('application days', numberInput(visa.applicationDays, (v) => { visa.applicationDays = v; markDirty('visas.json'); }, 'visa.applicationDays', { min: 0, emptyValue: 0 })));
  root.appendChild(details);
  const requirements = card('Application requirements'); requirements.appendChild(conditionEditor(visa, 'visa', 'visas.json')); root.appendChild(requirements);
  const actions = card('Actions'); const del = document.createElement('button'); del.id = 'deleteVisa'; del.className = 'danger'; del.textContent = 'Delete visa';
  del.addEventListener('click', () => removeVisa(visa.id)); actions.appendChild(del); root.appendChild(actions);
}
function renderJobEditor() {
  const root = document.getElementById('jobEditor'), job = selectedJob(); root.innerHTML = '';
  if (!job) { root.innerHTML = '<div class="empty">Select a job</div>'; return; }
  const details = card('Job');
  details.appendChild(frow('id (fixed)', textInput(job.id, () => {}, 'job.id', true)));
  details.appendChild(frow('name', textInput(job.name, (v) => { job.name = v; markDirty('jobs.json'); renderJobSidebar(); renderValidation(); }, 'job.name')));
  const visaOptions = [['', 'None'], ...state.visas.visas.map((v) => [v.id, v.name])];
  if (job.grantsVisa && !state.visas.visas.some((v) => v.id === job.grantsVisa)) visaOptions.push([job.grantsVisa, `${job.grantsVisa} (unknown)`]);
  details.appendChild(frow('grants visa', selectInput(visaOptions, job.grantsVisa, (v) => { if (v) job.grantsVisa = v; else delete job.grantsVisa; markDirty('jobs.json'); renderValidation(); }, 'job.grantsVisa')));
  const hours = job.hours || (job.hours = { startHour: 9, endHour: 17 });
  details.appendChild(frow('start hour', numberInput(hours.startHour, (v) => { hours.startHour = v; markDirty('jobs.json'); renderValidation(); }, 'job.startHour', { min: 0, max: 23 })));
  details.appendChild(frow('end hour', numberInput(hours.endHour, (v) => { hours.endHour = v; markDirty('jobs.json'); renderValidation(); }, 'job.endHour', { min: 0, max: 23 })));
  details.appendChild(frow('pay per shift', numberInput(job.payPerShift, (v) => { job.payPerShift = v; markDirty('jobs.json'); renderValidation(); }, 'job.payPerShift')));
  details.appendChild(frow('minimum credit score', numberInput(job.minCreditScore, (v) => {
    if (v === null) delete job.minCreditScore; else job.minCreditScore = v;
    markDirty('jobs.json'); renderValidation();
  }, 'job.minCreditScore', { min: 0, emptyValue: null })));
  details.appendChild(frow('max skips', numberInput(job.maxSkips, (v) => { job.maxSkips = v; markDirty('jobs.json'); }, 'job.maxSkips', { min: 0 })));
  root.appendChild(details);
  const needsCost = card('Needs cost on return');
  const costs = job.needsCost || {};
  for (const [needId, amount] of Object.entries(costs)) {
    const row = document.createElement('div'); row.className = 'frow need-cost-row'; row.dataset.needId = needId;
    const options = state.stats.needs
      .filter((need) => need.id === needId || !(need.id in costs))
      .map((need) => [need.id, need.name]);
    if (!state.stats.needs.some((need) => need.id === needId)) options.push([needId, `${needId} (unknown)`]);
    const need = selectInput(options, needId, (nextId) => {
      const value = job.needsCost[needId]; delete job.needsCost[needId]; job.needsCost[nextId] = value;
      markDirty('jobs.json'); renderJobEditor(); renderValidation();
    }, `job.needsCost.${needId}.need`);
    const value = numberInput(amount, (nextAmount) => {
      job.needsCost[needId] = nextAmount; markDirty('jobs.json'); renderValidation();
    }, `job.needsCost.${needId}.amount`, { min: 0 });
    const remove = document.createElement('button'); remove.type = 'button'; remove.textContent = 'Remove';
    remove.dataset.action = 'remove-needs-cost'; remove.addEventListener('click', () => {
      delete job.needsCost[needId]; if (!Object.keys(job.needsCost).length) delete job.needsCost;
      markDirty('jobs.json'); renderJobEditor(); renderValidation();
    });
    const controls = document.createElement('div'); controls.className = 'inline-control'; controls.append(need, value, remove);
    row.append(controls); needsCost.appendChild(row);
  }
  const addCost = document.createElement('button'); addCost.type = 'button'; addCost.id = 'addNeedsCost'; addCost.textContent = '+ Add need cost';
  const availableNeed = state.stats.needs.find((need) => !(need.id in costs));
  addCost.disabled = !availableNeed;
  addCost.addEventListener('click', () => {
    if (!availableNeed) return;
    (job.needsCost ||= {})[availableNeed.id] = 0; markDirty('jobs.json'); renderJobEditor(); renderValidation();
  });
  needsCost.appendChild(addCost); root.appendChild(needsCost);
  const requirements = card('Job requirements'); requirements.appendChild(conditionEditor(job, 'job', 'jobs.json')); root.appendChild(requirements);
  const actions = card('Actions'); const del = document.createElement('button'); del.id = 'deleteJob'; del.className = 'danger'; del.textContent = 'Delete job';
  del.addEventListener('click', () => removeJob(job.id)); actions.appendChild(del); root.appendChild(actions);
}

function addVisa() {
  const raw = window.prompt('New visa name:', ''); if (!raw || !raw.trim()) return;
  const name = raw.trim(), id = uniqueId(slugify(name), state.visas.visas.map((v) => v.id), 'visa');
  state.visas.visas.push({ id, name, durationDays: 30, losable: false, graceDays: 0, obtainedVia: 'quest', applicationDays: 0, requirements: { all: [] } });
  state.selectedVisa = id; markDirty('visas.json'); renderAll();
}
function addJob() {
  const raw = window.prompt('New job name:', ''); if (!raw || !raw.trim()) return;
  const name = raw.trim(), id = uniqueId(slugify(name), state.jobs.jobs.map((j) => j.id), 'job');
  state.jobs.jobs.push({ id, name, requirements: { all: [] }, hours: { startHour: 9, endHour: 17 }, payPerShift: 0, maxSkips: 0 });
  state.selectedJob = id; markDirty('jobs.json'); renderAll();
}
function removeVisa(id) {
  const visa = state.visas.visas.find((v) => v.id === id); if (!visa) return;
  if (state.tuning.visa && state.tuning.visa.startStatus === id) {
    window.alert(`Cannot delete "${visa.name}": tuning.visa.startStatus is "${id}". Choose another start status in tuning.json first.`); return;
  }
  const refs = state.jobs.jobs.filter((j) => j.grantsVisa === id);
  const message = refs.length
    ? `"${visa.name}" is granted by these jobs: ${refs.map((j) => j.name).join(', ')}.\n\nDeleting it will clear grantsVisa from those jobs and save both files together. Continue?`
    : `Delete "${visa.name}"? No jobs grant it.`;
  if (!window.confirm(message)) return;
  state.visas.visas = state.visas.visas.filter((v) => v.id !== id);
  if (refs.length) { for (const job of refs) delete job.grantsVisa; markDirty('jobs.json'); }
  state.selectedVisa = state.visas.visas[0]?.id || null; markDirty('visas.json'); renderAll();
}
function removeJob(id) {
  const job = state.jobs.jobs.find((j) => j.id === id); if (!job) return;
  if (!window.confirm(`Delete "${job.name}"? Jobs have no authored cross-references.`)) return;
  state.jobs.jobs = state.jobs.jobs.filter((j) => j.id !== id);
  state.selectedJob = state.jobs.jobs[0]?.id || null; markDirty('jobs.json'); renderAll();
}

function collectValidationIssues() {
  const issues = []; if (!state.visas) return issues;
  const needIds = new Set(state.stats.needs.map((x) => x.id));
  const skillIds = new Set(state.stats.skills.map((x) => x.id));
  const variableIds = new Set(state.simstate.variables.map((x) => x.id));
  const questIds = new Set(state.quests.quests.map((x) => x.id));
  const visaIds = new Set(state.visas.visas.map((x) => x.id));
  function checkCondition(node, owner) {
    if (!node) return;
    if (!isLeafCond(node)) {
      const key = 'all' in node ? 'all' : 'any', children = node[key] || [];
      if (!children.length) issues.push(`${owner} — requirements: empty "${key}" group is ${key === 'all' ? 'vacuously TRUE' : 'always FALSE'}.`);
      children.forEach((child) => checkCondition(child, owner)); return;
    }
    if (!node.var) { issues.push(`${owner} — requirements: a condition is missing its var path.`); return; }
    if (!getLeafOp(node)) issues.push(`${owner} — requirements: "${node.var}" has no operator.`);
    if (node.var.startsWith('needs.') && !needIds.has(node.var.slice(6))) issues.push(`${owner} — requirements: unknown need id "${node.var}".`);
    else if (node.var.startsWith('skills.') && !skillIds.has(node.var.slice(7))) issues.push(`${owner} — requirements: unknown skill id "${node.var}".`);
    else if (node.var.startsWith('vars.') && !variableIds.has(node.var.slice(5))) issues.push(`${owner} — requirements: unknown variable "${node.var.slice(5)}".`);
    else if (/^quests\.(.+)\.state$/.test(node.var)) {
      const id = /^quests\.(.+)\.state$/.exec(node.var)[1]; if (!questIds.has(id)) issues.push(`${owner} — requirements: unknown quest id "${node.var}".`);
    } else if (!(node.var.startsWith('needs.') || node.var.startsWith('skills.') || node.var.startsWith('vars.') || node.var === 'funds' || node.var === 'time.hour' || node.var === 'time.day')) {
      issues.push(`${owner} — requirements: unrecognized condition id "${node.var}".`);
    }
  }
  for (const visa of state.visas.visas) checkCondition(visa.requirements, `Visa "${visa.name || visa.id}"`);
  for (const job of state.jobs.jobs) {
    checkCondition(job.requirements, `Job "${job.name || job.id}"`);
    if (job.grantsVisa && !visaIds.has(job.grantsVisa)) issues.push(`Job "${job.name || job.id}" — grantsVisa references unknown visa "${job.grantsVisa}".`);
    if (job.hours && job.hours.startHour === job.hours.endHour) issues.push(`Job "${job.name || job.id}" — endHour equals startHour (${job.hours.startHour}).`);
    if (typeof job.payPerShift === 'number' && job.payPerShift < 0) issues.push(`Job "${job.name || job.id}" — payPerShift is negative (${job.payPerShift}).`);
    if (typeof job.minCreditScore === 'number' && job.minCreditScore < 0) issues.push(`Job "${job.name || job.id}" — minCreditScore is negative (${job.minCreditScore}).`);
    for (const [needId, amount] of Object.entries(job.needsCost || {})) {
      if (!needIds.has(needId)) issues.push(`Job "${job.name || job.id}" — needsCost references unknown need id "${needId}".`);
      if (typeof amount === 'number' && amount < 0) issues.push(`Job "${job.name || job.id}" — needsCost.${needId} is negative (${amount}).`);
    }
  }
  const startStatus = state.tuning.visa && state.tuning.visa.startStatus;
  if (!startStatus || !visaIds.has(startStatus)) issues.push(`tuning.visa.startStatus references missing visa "${startStatus || ''}".`);
  return issues;
}
function renderValidation() {
  const list = document.getElementById('validationList'), header = document.getElementById('validationHeader');
  if (!list || !state.visas) return;
  const issues = collectValidationIssues(); list.innerHTML = '';
  for (const message of issues) { const item = document.createElement('li'); item.textContent = message; list.appendChild(item); }
  header.textContent = issues.length ? `Validation — ⚠ ${issues.length} issue${issues.length === 1 ? '' : 's'} (warnings only, saving is never blocked)` : 'Validation — ✓ no issues';
}
function renderAll() { renderVisaSidebar(); renderJobSidebar(); renderVisaEditor(); renderJobEditor(); renderValidation(); }

document.getElementById('newVisa').addEventListener('click', addVisa);
document.getElementById('newJob').addEventListener('click', addJob);
document.getElementById('save').addEventListener('click', saveAll);
window.addEventListener('keydown', (e) => { if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveAll(); } });
window.addEventListener('beforeunload', (e) => { if (state.dirty.size) e.preventDefault(); });
window.CareerEditor = { state, load, saveAll, slugify, uniqueId, collectValidationIssues, removeVisa, removeJob };
load();
</script>
<script src="/tools/nav.js"></script>
</body>
