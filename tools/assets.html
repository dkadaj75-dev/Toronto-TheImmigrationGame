<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Condo Life — Asset Editor</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, sans-serif; background: #141a28; color: #dfe6f2; }
  header { position: sticky; top: 0; z-index: 5; display: flex; gap: 10px; align-items: center;
    padding: 10px 14px; background: #0f1420ee; backdrop-filter: blur(6px); border-bottom: 1px solid #26304a; }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  header .grow { flex: 1; }
  #search { background: #1c2436; border: 1px solid #2c3a58; color: #dfe6f2; border-radius: 8px; padding: 7px 10px; width: 200px; font-size: 13px; }
  button { border: 0; border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; background: #2c3a58; color: #dfe6f2; }
  button.primary { background: #3d6fd2; color: #fff; }
  button.danger { background: #7a3040; }
  button:disabled { opacity: .45; cursor: default; }
  #status { font-size: 12px; color: #8fa3c8; min-width: 150px; text-align: right; }
  #status.ok { color: #7fd98a; } #status.err { color: #e58a8a; }

  #layout { display: grid; grid-template-columns: 250px 1fr; height: calc(100vh - 53px); }
  #sidebar { border-right: 1px solid #26304a; overflow-y: auto; padding: 8px; }
  #sidebar h4 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: #6f7fa3; margin: 12px 6px 4px; }
  .asset-item { display: flex; align-items: center; gap: 8px; width: 100%; text-align: left;
    background: transparent; padding: 7px 8px; border-radius: 8px; font-size: 13px; }
  .asset-item:hover { background: #1c2436; }
  .asset-item.active { background: rgba(90,120,190,.28); }
  .asset-item .badge { margin-left: auto; font-size: 10px; color: #8fa3c8; background: #1c2436; border-radius: 999px; padding: 2px 7px; }
  #editor { overflow-y: auto; padding: 16px; }
  #editor .empty { color: #5f6f93; padding: 40px; text-align: center; }
  .card { background: #1a2133; border: 1px solid #26304a; border-radius: 12px; padding: 14px; margin-bottom: 14px; max-width: 660px; }
  .card h2 { margin: 0 0 10px; font-size: 13px; letter-spacing: .08em; text-transform: uppercase; color: #93a3c0; }
  .frow { display: grid; grid-template-columns: 160px 1fr; gap: 10px; align-items: center; padding: 5px 0; }
  .frow label { font-size: 13px; }
  .frow input[type=number], .frow input[type=text], .frow select { width: 100%; background: #10182a; border: 1px solid #2c3a58;
    color: #dfe6f2; border-radius: 6px; padding: 6px 8px; font-size: 13px; }
  .frow input[readonly] { color: #6f7fa3; }
  .frow .pair { display: flex; gap: 8px; }
  .checks { display: flex; flex-wrap: wrap; gap: 8px; }
  .checks label { display: flex; align-items: center; gap: 5px; font-size: 13px; background: #10182a;
    border: 1px solid #2c3a58; border-radius: 8px; padding: 5px 9px; cursor: pointer; }
  .checks label:has(input:checked) { border-color: #3d6fd2; background: rgba(61,111,210,.15); }
  #preview-wrap { max-width: 660px; }
  #preview { width: 100%; height: 280px; background: #0d1220; border: 1px solid #26304a; border-radius: 12px; display: block; }
  #preview-msg { font-size: 12px; color: #5f6f93; margin-top: 6px; }
  .row-actions { display: flex; gap: 8px; margin-top: 8px; }
  .hint { font-size: 11px; color: #5f6f93; margin-top: 6px; line-height: 1.5; }
</style>
</head>
<body>
<header>
  <h1>🛋 Asset Editor</h1>
  <span class="grow"></span>
  <input id="search" type="search" placeholder="Search assets…" />
  <button id="new">+ New asset</button>
  <button id="save" class="primary" disabled>Save changes</button>
  <span id="status">loading…</span>
</header>
<div id="layout">
  <nav id="sidebar"></nav>
  <div id="editor"><div class="empty">Select an asset</div></div>
</div>

<script>
// ------------------------------------------------------------------ state
const API = '/api/data/';
const state = {
  assets: null, interactions: null, map: null, stats: null, tuning: null,
  selected: null, dirty: false,
  // Preview-only state: never written to assets.json. Character starts hidden on every load.
  showCharacter: false, previewPose: null,
};
const previewGridSize = () => {
  const size = Number(state.map?.gridSize);
  return Number.isFinite(size) && size > 0 ? size : 0.5;
};
const previewGridSpec = () => {
  const tileSize = previewGridSize();
  const divisions = Math.max(1, Math.ceil(4 / tileSize));
  return { tileSize, divisions, size: divisions * tileSize };
};
/** Sit/lie always have game/facing.ts computed transforms, even on a completely sparse asset.
 * `use` deliberately has no runtime default, so it is offered only when usePose.use explicitly
 * exists (matching SimAgent.applyPose). */
function availablePreviewPoses(asset) {
  if (!asset) return [];
  const poses = ['sit', 'lie'];
  if (asset.usePose?.use) poses.push('use');
  return poses;
}

/** Resolve a preview pose to the game's logical animation vocabulary and configured clip name.
 * The module still passes the logical state to AnimController, which owns the real clip lookup. */
function resolvePoseAnimation(pose, asset, actions = state.interactions?.actions ?? [], clipMap = state.tuning?.character?.clipMap ?? {}) {
  const actionStates = actions
    .filter((action) => asset?.interactions?.includes(action.id))
    .map((action) => action.animation)
    .filter(Boolean);
  const matching = actionStates.filter((name) => (
    pose === 'sit' ? name.startsWith('sit')
      : pose === 'lie' ? name.startsWith('lie')
      : !name.startsWith('sit') && !name.startsWith('lie')
  ));
  const fallbacks = pose === 'use' ? ['stand_use', 'use', 'idle'] : [pose];
  const candidates = [...new Set([...matching, ...fallbacks])];
  const logicalState = candidates.find((name) => clipMap[name]) ?? candidates[0] ?? 'idle';
  return { logicalState, clipName: clipMap[logicalState] ?? null };
}

window.AssetEditor = { state, previewGridSize, previewGridSpec, availablePreviewPoses, resolvePoseAnimation };

async function load() {
  setStatus('loading…');
  try {
    const [a, i, m, s, t] = await Promise.all([
      fetch(API + 'assets.json').then((r) => { if (!r.ok) throw new Error('assets.json HTTP ' + r.status); return r.json(); }),
      fetch(API + 'interactions.json').then((r) => { if (!r.ok) throw new Error('interactions.json HTTP ' + r.status); return r.json(); }),
      fetch(API + 'maps/condo.json').then((r) => (r.ok ? r.json() : null)).catch(() => null),
      fetch(API + 'stats.json').then((r) => (r.ok ? r.json() : { needs: [], skills: [] })).catch(() => ({ needs: [], skills: [] })),
      fetch(API + 'tuning.json').then((r) => (r.ok ? r.json() : null)).catch(() => null),
    ]);
    state.assets = a; state.interactions = i; state.map = m; state.stats = s; state.tuning = t;
    state.dirty = false;
    if (!state.selected && a.assets.length) state.selected = a.assets[0].id;
    renderAll();
    setStatus('loaded', 'ok');
  } catch (e) { setStatus(String(e.message || e), 'err'); }
}

async function save() {
  setStatus('saving…');
  try {
    const res = await fetch(API + 'assets.json', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state.assets, null, 2),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    state.dirty = false;
    updateSave();
    setStatus('saved — game hot-reloads', 'ok');
  } catch (e) { setStatus(String(e.message || e), 'err'); }
}

function markDirty() { state.dirty = true; updateSave(); setStatus('unsaved changes'); schedulePreview(); }
function updateSave() { document.getElementById('save').disabled = !state.dirty; }
function setStatus(msg, cls = '') { const s = document.getElementById('status'); s.textContent = msg; s.className = cls; }
const placedCount = (id) => (state.map?.placedObjects ?? []).filter((p) => p.asset === id).length;
const selectedAsset = () => state.assets.assets.find((a) => a.id === state.selected) ?? null;

// ------------------------------------------------------------------ sidebar
function renderSidebar() {
  const nav = document.getElementById('sidebar');
  const q = document.getElementById('search').value.trim().toLowerCase();
  nav.innerHTML = '';
  for (const cat of state.assets.categories) {
    const items = state.assets.assets.filter((a) => a.category === cat &&
      (q === '' || a.name.toLowerCase().includes(q) || a.id.toLowerCase().includes(q)));
    if (!items.length) continue;
    const h = document.createElement('h4');
    h.textContent = cat;
    nav.appendChild(h);
    for (const a of items) {
      const b = document.createElement('button');
      b.className = 'asset-item' + (a.id === state.selected ? ' active' : '');
      b.dataset.assetId = a.id;
      const n = placedCount(a.id);
      b.innerHTML = `<span>${a.name}</span>${n ? `<span class="badge">×${n} placed</span>` : ''}`;
      b.addEventListener('click', () => { state.selected = a.id; renderAll(); });
      nav.appendChild(b);
    }
  }
  // uncategorized safety net
  const stray = state.assets.assets.filter((a) => !state.assets.categories.includes(a.category));
  if (stray.length) {
    const h = document.createElement('h4');
    h.textContent = '(uncategorized)';
    nav.appendChild(h);
    for (const a of stray) {
      const b = document.createElement('button');
      b.className = 'asset-item' + (a.id === state.selected ? ' active' : '');
      b.dataset.assetId = a.id;
      b.textContent = a.name;
      b.addEventListener('click', () => { state.selected = a.id; renderAll(); });
      nav.appendChild(b);
    }
  }
}

// ------------------------------------------------------------------ editor form
function frow(label, input) {
  const r = document.createElement('div');
  r.className = 'frow';
  const l = document.createElement('label');
  l.textContent = label;
  r.append(l, input);
  return r;
}
function numInput(get, set, path) {
  const i = document.createElement('input');
  i.type = 'number'; i.step = 'any'; i.value = get() ?? '';
  i.dataset.path = path;
  i.addEventListener('input', () => { set(i.value === '' ? undefined : Number(i.value)); markDirty(); });
  return i;
}
function textInput(get, set, path, opts = {}) {
  const i = document.createElement('input');
  i.type = 'text'; i.value = get() ?? '';
  i.dataset.path = path;
  if (opts.readonly) i.readOnly = true;
  i.addEventListener('input', () => { set(i.value); markDirty(); });
  return i;
}
function checkInput(get, set, path) {
  const i = document.createElement('input');
  i.type = 'checkbox'; i.checked = !!get();
  i.dataset.path = path;
  i.addEventListener('change', () => { set(i.checked); markDirty(); });
  return i;
}
function selectInput(options, get, set, path) {
  const sel = document.createElement('select');
  sel.dataset.path = path;
  for (const o of options) {
    const opt = document.createElement('option');
    opt.value = o.value; opt.textContent = o.label;
    sel.appendChild(opt);
  }
  sel.value = get();
  sel.addEventListener('change', () => { set(sel.value); markDirty(); });
  return sel;
}
// §7.5: same extension list as game/sprites.ts's classifyMeshPath (kept in sync manually — this
// classic inline script deliberately doesn't import game/*.ts, same convention as every other
// tool's plain-script half, e.g. the Interaction Editor's own slugify).
const IMAGE_MESH_EXTENSIONS = ['png', 'jpg', 'jpeg', 'webp', 'gif'];
function isImageMesh(mesh) {
  const m = /\.([a-z0-9]+)(?:[?#].*)?$/i.exec(String(mesh || '').trim());
  return !!m && IMAGE_MESH_EXTENSIONS.includes(m[1].toLowerCase());
}

// needs.<id> / skills.<id> namespace, matching game/quests.ts's resolveVar / accidents.ts's
// statMaxFor — the ONLY var paths accident risk modifiers meaningfully interpolate against.
function accidentVarOptions() {
  return [
    ...state.stats.needs.map((n) => ({ value: 'needs.' + n.id, label: 'Need: ' + n.name })),
    ...state.stats.skills.map((s) => ({ value: 'skills.' + s.id, label: 'Skill: ' + s.name })),
  ];
}

// --- accidents risk section (§7.3), normal (non-transient) assets only.
function accidentAssetOptions() {
  return state.assets.assets.filter((x) => x.category === 'transient').map((x) => ({ value: x.id, label: x.name }));
}
function renderAccidentsCard(a) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = '<h2>Accidents</h2><div class="hint">What can go wrong while this asset is used, and how likely — accidentId options are transient-category assets only.</div>';
  const accOpts = accidentAssetOptions();
  const risks = a.accidents ?? [];

  risks.forEach((risk, i) => {
    const box = document.createElement('div');
    box.className = 'card';
    box.style.background = '#141c2e';
    box.style.margin = '10px 0 0';

    box.appendChild(frow('accident', selectInput(
      accOpts.length ? accOpts : [{ value: risk.accidentId ?? '', label: '(no transient-category assets yet)' }],
      () => risk.accidentId, (v) => { risk.accidentId = v; }, `accidents.${i}.accidentId`,
    )));
    box.appendChild(frow('trigger', selectInput([{ value: 'onUse', label: 'onUse' }], () => 'onUse', () => { risk.trigger = 'onUse'; }, `accidents.${i}.trigger`)));
    box.appendChild(frow('base chance %', numInput(() => risk.baseChancePercent, (v) => { risk.baseChancePercent = v ?? 0; }, `accidents.${i}.baseChancePercent`)));
    box.appendChild(frow('placement', selectInput(
      [{ value: 'on', label: 'on (same cells as this asset)' }, { value: 'adjacent', label: 'adjacent (nearby free cell)' }],
      () => risk.placement, (v) => { risk.placement = v; renderAll(); }, `accidents.${i}.placement`,
    )));
    if (risk.placement === 'adjacent') {
      const rangePair = document.createElement('div');
      rangePair.className = 'pair';
      const rangeAt = (k) => risk.adjacentRange?.[k];
      const setRange = (k) => (v) => {
        const cur = Array.isArray(risk.adjacentRange) ? [...risk.adjacentRange] : [1, 2];
        cur[k] = v ?? (k === 0 ? 1 : 2);
        risk.adjacentRange = cur;
      };
      rangePair.append(
        numInput(() => rangeAt(0), setRange(0), `accidents.${i}.adjacentRange.0`),
        numInput(() => rangeAt(1), setRange(1), `accidents.${i}.adjacentRange.1`),
      );
      box.appendChild(frow('adjacent range (min/max grid squares)', rangePair));
    }

    // --- modifiers
    const modsTitle = document.createElement('div');
    modsTitle.className = 'hint';
    modsTitle.textContent = 'Modifiers (linear lerp of a % contribution from the stat at 0 to the stat at its max):';
    box.appendChild(modsTitle);
    const mods = risk.modifiers ?? [];
    mods.forEach((mod, j) => {
      const modRow = document.createElement('div');
      modRow.className = 'frow';
      modRow.appendChild(selectInput(accidentVarOptions(), () => mod.var, (v) => { mod.var = v; }, `accidents.${i}.modifiers.${j}.var`));
      const pctPair = document.createElement('div');
      pctPair.className = 'pair';
      pctPair.append(
        numInput(() => mod.pctAt0, (v) => { mod.pctAt0 = v ?? 0; }, `accidents.${i}.modifiers.${j}.pctAt0`),
        numInput(() => mod.pctAtMax, (v) => { mod.pctAtMax = v ?? 0; }, `accidents.${i}.modifiers.${j}.pctAtMax`),
      );
      modRow.appendChild(pctPair);
      const rmMod = document.createElement('button');
      rmMod.textContent = '× remove modifier';
      rmMod.addEventListener('click', () => {
        risk.modifiers = mods.filter((_, k) => k !== j);
        if (!risk.modifiers.length) delete risk.modifiers;
        markDirty(); renderAll();
      });
      modRow.appendChild(rmMod);
      box.appendChild(modRow);
    });
    const addMod = document.createElement('button');
    addMod.textContent = '+ Add modifier';
    addMod.addEventListener('click', () => {
      risk.modifiers = [...mods, { var: accidentVarOptions()[0]?.value ?? 'needs.hunger', pctAt0: 0, pctAtMax: 0 }];
      markDirty(); renderAll();
    });
    box.appendChild(addMod);

    const rmRisk = document.createElement('button');
    rmRisk.className = 'danger';
    rmRisk.textContent = '× Remove this risk';
    rmRisk.style.marginTop = '8px';
    rmRisk.addEventListener('click', () => {
      a.accidents = risks.filter((_, k) => k !== i);
      if (!a.accidents.length) delete a.accidents;
      markDirty(); renderAll();
    });
    box.appendChild(rmRisk);

    card.appendChild(box);
  });

  const addRisk = document.createElement('button');
  addRisk.className = 'primary';
  addRisk.style.marginTop = '10px';
  addRisk.textContent = '+ Add accident risk';
  addRisk.addEventListener('click', () => {
    a.accidents = [...risks, { accidentId: accOpts[0]?.value ?? '', trigger: 'onUse', baseChancePercent: 0, placement: 'on' }];
    markDirty(); renderAll();
  });
  card.appendChild(addRisk);

  return card;
}

function renderEditor() {
  const root = document.getElementById('editor');
  const a = selectedAsset();
  root.innerHTML = '';
  if (!a) { root.innerHTML = '<div class="empty">Select an asset</div>'; return; }

  // --- identity & economy
  const card1 = document.createElement('div');
  card1.className = 'card';
  card1.innerHTML = '<h2>Asset</h2>';
  card1.appendChild(frow('id (fixed — maps reference it)', textInput(() => a.id, () => {}, 'id', { readonly: true })));
  card1.appendChild(frow('name', textInput(() => a.name, (v) => { a.name = v; renderSidebar(); }, 'name')));
  const catSel = document.createElement('select');
  catSel.dataset.path = 'category';
  for (const c of state.assets.categories) {
    const o = document.createElement('option'); o.value = c; o.textContent = c; catSel.appendChild(o);
  }
  catSel.value = a.category;
  catSel.addEventListener('change', () => { a.category = catSel.value; markDirty(); renderSidebar(); });
  card1.appendChild(frow('category', catSel));
  card1.appendChild(frow('buy price', numInput(() => a.buyPrice, (v) => { a.buyPrice = v ?? 0; }, 'buyPrice')));
  card1.appendChild(frow('sell price', numInput(() => a.sellPrice, (v) => { a.sellPrice = v ?? 0; }, 'sellPrice')));
  card1.appendChild(frow('environment score', numInput(() => a.environmentScore, (v) => { a.environmentScore = v ?? 0; }, 'environmentScore')));
  card1.appendChild(frow('survival importance (higher = repossessed later)', numInput(
    () => a.survivalImportance,
    (v) => { if (v === undefined) delete a.survivalImportance; else a.survivalImportance = v; },
    'survivalImportance',
  )));
  const buyableCb = document.createElement('input');
  buyableCb.type = 'checkbox';
  buyableCb.dataset.path = 'buyable';
  buyableCb.checked = a.buyable !== false; // absent = true (§7.1)
  buyableCb.addEventListener('change', () => { if (buyableCb.checked) delete a.buyable; else a.buyable = false; markDirty(); });
  card1.appendChild(frow('buyable (offered in the Buy/Sell catalog)', buyableCb));
  const questGateCb = document.createElement('input');
  questGateCb.type = 'checkbox';
  questGateCb.dataset.path = 'requiresQuestUnlock';
  questGateCb.checked = !!a.requiresQuestUnlock;
  questGateCb.addEventListener('change', () => { if (questGateCb.checked) a.requiresQuestUnlock = true; else delete a.requiresQuestUnlock; markDirty(); });
  card1.appendChild(frow('requires quest unlock (only purchasable once a quest unlocks it)', questGateCb));
  root.appendChild(card1);

  // --- Buy/Sell catalog icon (§7.6): image path under public/ + thumbnail preview. Absent → the
  // in-game catalog falls back to a category-colored initials tile (game/buymode.ts's
  // iconFallbackColor/iconFallbackInitials) — never a broken image.
  const cardIcon = document.createElement('div');
  cardIcon.className = 'card';
  cardIcon.innerHTML = '<h2>Catalog icon</h2><div class="hint">Image path under public/ shown on the Buy/Sell catalog card. Leave blank for a category-colored initials tile instead — never a broken image.</div>';
  const iconInput = textInput(() => a.icon, (v) => { if (v) a.icon = v; else delete a.icon; updateIconThumb(); }, 'icon');
  iconInput.placeholder = '/models/icons/sofa.png';
  cardIcon.appendChild(frow('icon path', iconInput));
  cardIcon.insertAdjacentHTML('beforeend', '<img id="icon-thumb" alt="" style="max-width:96px;max-height:96px;border-radius:8px;border:1px solid #26304a;display:none;margin-top:4px;" /><div id="icon-thumb-msg" class="hint"></div>');
  root.appendChild(cardIcon);
  function updateIconThumb() {
    const img = document.getElementById('icon-thumb');
    const msg = document.getElementById('icon-thumb-msg');
    if (!img || !msg) return;
    if (!a.icon) { img.style.display = 'none'; msg.textContent = 'No icon set — catalog falls back to a colored initials tile.'; return; }
    const url = /^(\/|https?:)/.test(a.icon) ? a.icon : '/' + a.icon;
    img.onload = () => { img.style.display = 'block'; msg.textContent = url; };
    img.onerror = () => { img.style.display = 'none'; msg.textContent = `Could not load ${url} — the file should be at public${url}. Falls back to a colored initials tile in-game.`; };
    img.src = url;
  }
  updateIconThumb();

  // --- placement & seating
  const card2 = document.createElement('div');
  card2.className = 'card';
  card2.innerHTML = '<h2>Placement & seating</h2>';
  const pair = document.createElement('div');
  pair.className = 'pair';
  pair.append(
    numInput(() => a.footprint[0], (v) => { a.footprint[0] = v ?? 1; }, 'footprint.w'),
    numInput(() => a.footprint[1], (v) => { a.footprint[1] = v ?? 1; }, 'footprint.d'),
  );
  card2.appendChild(frow('footprint (w × d, meters)', pair));
  card2.appendChild(frow('seats (count)', numInput(() => a.seats, (v) => { if (v === undefined) delete a.seats; else a.seats = v; }, 'seats')));
  card2.appendChild(frow('is a seat target (sit here for seat-aware actions)', checkInput(() => a.seatTarget, (v) => { if (v) a.seatTarget = true; else delete a.seatTarget; }, 'seatTarget')));
  card2.appendChild(frow('facing ° (blank = 0)', numInput(() => a.facingDeg, (v) => { if (v === undefined) delete a.facingDeg; else a.facingDeg = v; }, 'facingDeg')));
  card2.insertAdjacentHTML('beforeend', '<div class="hint">direction the object faces, degrees — world facing = the map instance\'s rot° + this. 0 means the model\'s local +Z (its "front") already points the way rot° faces; only set this if the mesh itself is authored facing a different local axis.</div>');
  root.appendChild(card2);

  // --- sit/lie/use perch override (§7.8, roadmap item 1; `use` added ROADMAP_NEXT B2-3): sparse
  // per-pose fields, same ensure/prune convention as meshFit/door/sprite below. Defaults with
  // nothing set: sit/lie perch ON the footprint center at tuning.character.sitHeight/lieHeight,
  // facing worldFacingDeg — see game/facing.ts's usePoseFor doc comment. `use` is DIFFERENT: it
  // has no computed default at all — leaving its whole section untouched means a standing action
  // (e.g. cooking, using a sink) keeps the normal walk-up-and-face-it approach spot; only fill
  // this in for an asset the sim should stand INSIDE (e.g. the shower).
  const cardPose = document.createElement('div');
  cardPose.className = 'card';

function addAsset(base) {
  let id = window.prompt('New asset id (lowercase, no spaces):', base ? base.id + '_copy' : '');
  if (!id) return;
  id = id.trim().toLowerCase().replace(/\s+/g, '_');
  if (state.assets.assets.some((x) => x.id === id)) { window.alert(`id "${id}" already exists`); return; }
  const fresh = base ?? {
    id, name: id, category: state.assets.categories[0] ?? 'misc', mesh: '',
    buyPrice: 0, sellPrice: 0, environmentScore: 0, footprint: [1, 1], interactions: [],
  };
  fresh.id = id;
  if (base) fresh.name = base.name + ' copy';
  state.assets.assets.push(fresh);
  state.selected = id;
  markDirty();
  renderAll();
}

function renderAll() { renderSidebar(); renderEditor(); }

function schedulePreview() {
  const a = selectedAsset();
  // §7.5: pass the whole asset so the preview can render image meshes with the real footprint/
  // sprite config (the preview module ignores everything but mesh for GLBs).
  window.AssetPreview?.show(a?.mesh || '', a);
}

document.getElementById('search').addEventListener('input', renderSidebar);
document.getElementById('new').addEventListener('click', () => addAsset(null));
document.getElementById('save').addEventListener('click', save);
window.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); save(); }
});
window.addEventListener('beforeunload', (e) => { if (state.dirty) e.preventDefault(); });
load();
</script>

  if (!visible.length) return;
  const box = new THREE.Box3();
  for (const object of visible) box.expandByObject(object);
  const worldSize = box.getSize(new THREE.Vector3());
  const size = worldSize.length() || 1;
  const center = box.getCenter(new THREE.Vector3());
  camera.near = Math.max(size / 100, 0.001);
  camera.far = size * 20;
  camera.updateProjectionMatrix();
  camera.position.copy(center).add(new THREE.Vector3(1, 0.7, 1.2).setLength(size * 1.2));
  controls.target.copy(center);
  controls.update();
}

function ensureCharacter(character) {
  if (!characterPromise) {
    characterStatus = 'loading character…'; previewMessage();
    characterPromise = loadRiggedCharacter(character).then(({ model, clips }) => {
      characterRoot = new THREE.Group();
      characterRoot.name = 'asset-editor-character-preview';
      characterRoot.add(model);
      characterAnim = new AnimController(model, clips, character);
      characterRoot.visible = false;
      scene.add(characterRoot);
      return { clips };
    }).catch((error) => {
      characterPromise = null;
      throw error;
    });
  }
  return characterPromise;
}

function updateCharacter(seq, assetDef) {
  const editor = window.AssetEditor;
  const character = editor?.state?.tuning?.character;
  if (!character?.meshPath) {
    if (characterRoot) characterRoot.visible = false;
    characterStatus = 'Character preview unavailable: tuning.character is not configured.';
    previewMessage();
    return;
  }
  const poses = editor.availablePreviewPoses(assetDef);
  const pose = editor.state.previewPose;
  if (!editor.state.showCharacter) {
    if (characterRoot) characterRoot.visible = false;
    characterStatus = poses.length ? '' : 'No sit/lie/use pose is relevant to this asset.';
    previewMessage();
    return;
  }
  if (!pose || !poses.includes(pose)) {
    if (characterRoot) characterRoot.visible = false;
    characterStatus = 'No sit/lie/use pose is relevant to this asset.';
    previewMessage();
    return;
  }
  ensureCharacter(character).then(() => {
    if (seq !== previewSeq) return;
    const transform = usePoseFor(pose, { pos: [0, 0], rotDeg: 0 }, assetDef, editor.state.tuning);
    characterRoot.position.set(transform.pos[0], transform.y, transform.pos[1]);
    characterRoot.rotation.set(0, THREE.MathUtils.degToRad(transform.facingDeg), 0);
    characterRoot.visible = true;
    const resolved = editor.resolvePoseAnimation(pose, assetDef);
    characterAnim.retune(character);
    characterAnim.play(resolved.logicalState);
    characterStatus = resolved.clipName
      ? `${pose} character animation: ${resolved.logicalState} → ${resolved.clipName}`
      : `${pose} character animation "${resolved.logicalState}" is unmapped; game fallback applies`;
    previewMessage();
    framePreview();
  }).catch(() => {
    if (seq !== previewSeq) return;
    if (characterRoot) characterRoot.visible = false;
    characterStatus = `Could not load character ${character.meshPath}.`;
    previewMessage();
  });
}

function ensure(canvas) {
  if (renderer && renderer.domElement === canvas) return true;
  try {
    renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  } catch { renderer = null; return false; }
  scene = new THREE.Scene();
  // renderEditor replaces the canvas when selecting another asset. Reattach the one cached rig
  // to the new preview scene instead of loading the character again.
  if (characterRoot) scene.add(characterRoot);
  camera = new THREE.PerspectiveCamera(45, 1, 0.01, 100);
  camera.position.set(2, 1.6, 2.6);
  controls = new OrbitControls(camera, canvas);
  controls.enableDamping = true;
  scene.add(new THREE.AmbientLight(0xbfd0e8, 1.1));
  const sun = new THREE.DirectionalLight(0xffffff, 2);
  sun.position.set(3, 5, 2);
  scene.add(sun);
  const grid = window.AssetEditor?.previewGridSpec?.() ?? { size: 4, divisions: 8 };
  scene.add(new THREE.GridHelper(grid.size, grid.divisions, 0x2c3a58, 0x212b44));
  cancelAnimationFrame(raf);
  const loop = () => {
    raf = requestAnimationFrame(loop);
    const rect = canvas.getBoundingClientRect();
    if (canvas.width !== Math.floor(rect.width) && rect.width > 0) {
      renderer.setSize(rect.width, rect.height, false);
      camera.aspect = rect.width / rect.height;
      camera.updateProjectionMatrix();
    }
    controls.update();
    const dt = previewClock.getDelta();
    activeSprite?.update(dt); // advance GIF frames while previewing
    characterAnim?.update(dt); // preview has no sim clock/pause, so animate in real time
    renderer.render(scene, camera);
  };
  loop();
  return true;
}

window.AssetPreview = {
  show(meshPath, assetDef) {
    const canvas = document.getElementById('preview');
    if (!canvas || !ensure(canvas)) return;
    previewSeq++; // invalidate any in-flight async load from a previous show()
    const seq = previewSeq;
    if (current) { scene.remove(current); current = null; }
    if (activeSprite) { activeSprite.dispose(); activeSprite = null; }
    if (characterRoot) characterRoot.visible = false;
    assetStatus = meshPath ? '' : 'No mesh assigned — set a GLB or image path to preview it.';
    characterStatus = '';
    previewMessage();
    updateCharacter(seq, assetDef);
    if (!meshPath) return;
    // public/ is served at the site root — normalize "models/bed.glb" → "/models/bed.glb"
    const url = /^(\/|https?:)/.test(meshPath) ? meshPath : '/' + meshPath;
    assetStatus = 'loading ' + url + ' …'; previewMessage();
    // §7.5: image mesh (png/jpg/webp/gif) — preview through the game's OWN sprite pipeline
    // (game/sprites.ts), so what the designer sees here (billboard vs flat, GIF animation) is
    // exactly what spawns in-game. Frame advance runs on real time in this preview.
    if (classifyMeshPath(url) === 'image') {
      const def = assetDef && Array.isArray(assetDef.footprint) ? assetDef : { ...(assetDef || {}), footprint: [1, 1] };
      const inst = createSpriteInstance(def, url);
      inst.ready
        .then(() => {
          if (seq !== previewSeq) { inst.dispose(); return; } // superseded by a newer show()
          if (current) scene.remove(current);
          current = inst.object;
          activeSprite = inst;
          scene.add(current);
          assetStatus = `${url} — image sprite (${def.sprite?.orientation ?? 'billboard'}${url.toLowerCase().includes('.gif') ? ', animated' : ''})`;
          previewMessage(); framePreview();
        })
        .catch(() => { inst.dispose(); assetStatus = `Could not load ${url} — the file should be at public${url}.`; previewMessage(); });
      return;
    }
    // GLB furniture — apply the SAME transforms the game applies (game/world.ts), so the
    // designer sees the model at its real in-game size, grounded at y=0 on the grid, rather
    // than the raw GLB centered by its own bounds. loadMeshTemplate caches per URL, so
    // footprint/meshFit live-edits re-clone cheaply instead of re-fetching.
    const def = assetDef && Array.isArray(assetDef.footprint) ? assetDef : { ...(assetDef || {}), footprint: [1, 1] };
    loadMeshTemplate(url)
      .then((template) => {
        if (seq !== previewSeq) return; // superseded by a newer show()
        const model = template.clone(true);
        normalizeModelToFootprint(model, def.footprint); // footprint-fit scale + center XZ + ground y=0
        if (def.wallMounted) { // wall-mounted assets re-center vertically like the game does
          const wb = new THREE.Box3().setFromObject(model);
          model.position.y -= wb.getCenter(new THREE.Vector3()).y;
        }
        applyMeshFit(model, def.meshFit); // scale / yawOffsetDeg / yOffset corrections
        if (current) scene.remove(current);
        current = model;
        scene.add(current);
        // frame the grounded model: orbit its center, keep the y=0 grid in view
        const box = new THREE.Box3().setFromObject(model);
        const worldSize = box.getSize(new THREE.Vector3());
        assetStatus = `${url} — in-game size ${worldSize.toArray().map((v) => v.toFixed(2)).join(' × ')} m · grounded at y=0`;
        previewMessage(); framePreview();
      })
      .catch(() => { assetStatus = `Could not load ${url} — the file should be at public${url} (e.g. public/models/bed.glb → "/models/bed.glb").`; previewMessage(); });
  },
};
</script>
<script src="/tools/nav.js"></script>
</body>
