<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Condo Life — Asset Editor</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, sans-serif; background: #141a28; color: #dfe6f2; }
  header { position: sticky; top: 0; z-index: 5; display: flex; gap: 10px; align-items: center;
    padding: 10px 14px; background: #0f1420ee; backdrop-filter: blur(6px); border-bottom: 1px solid #26304a; }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  header .grow { flex: 1; }
  #search { background: #1c2436; border: 1px solid #2c3a58; color: #dfe6f2; border-radius: 8px; padding: 7px 10px; width: 200px; font-size: 13px; }
  button { border: 0; border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; background: #2c3a58; color: #dfe6f2; }
  button.primary { background: #3d6fd2; color: #fff; }
  button.danger { background: #7a3040; }
  button:disabled { opacity: .45; cursor: default; }
  #status { font-size: 12px; color: #8fa3c8; min-width: 150px; text-align: right; }
  #status.ok { color: #7fd98a; } #status.err { color: #e58a8a; }

  #layout { display: grid; grid-template-columns: 250px 1fr; height: calc(100vh - 53px); }
  #sidebar { border-right: 1px solid #26304a; overflow-y: auto; padding: 8px; }
  #sidebar h4 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: #6f7fa3; margin: 12px 6px 4px; }
  .asset-item { display: flex; align-items: center; gap: 8px; width: 100%; text-align: left;
    background: transparent; padding: 7px 8px; border-radius: 8px; font-size: 13px; }
  .asset-item:hover { background: #1c2436; }
  .asset-item.active { background: rgba(90,120,190,.28); }
  .asset-item .badge { margin-left: auto; font-size: 10px; color: #8fa3c8; background: #1c2436; border-radius: 999px; padding: 2px 7px; }
  #editor { overflow-y: auto; padding: 16px; display: grid; grid-template-columns: minmax(440px, 660px) minmax(420px, 1fr); gap: 0 18px; align-items: start; }
  #editor .empty { color: #5f6f93; padding: 40px; text-align: center; }
  .card { background: #1a2133; border: 1px solid #26304a; border-radius: 12px; padding: 14px; margin-bottom: 14px; max-width: 660px; grid-column: 1; }
  .card h2 { margin: 0 0 10px; font-size: 13px; letter-spacing: .08em; text-transform: uppercase; color: #93a3c0; }
  .frow { display: grid; grid-template-columns: 160px 1fr; gap: 10px; align-items: center; padding: 5px 0; }
  .frow label { font-size: 13px; }
  .frow input[type=number], .frow input[type=text], .frow select { width: 100%; background: #10182a; border: 1px solid #2c3a58;
    color: #dfe6f2; border-radius: 6px; padding: 6px 8px; font-size: 13px; }
  .frow input[readonly] { color: #6f7fa3; }
  .frow .pair { display: flex; gap: 8px; }
  .checks { display: flex; flex-wrap: wrap; gap: 8px; }
  .checks label { display: flex; align-items: center; gap: 5px; font-size: 13px; background: #10182a;
    border: 1px solid #2c3a58; border-radius: 8px; padding: 5px 9px; cursor: pointer; }
  .checks label:has(input:checked) { border-color: #3d6fd2; background: rgba(61,111,210,.15); }
  #preview-wrap { max-width: none; width: 100%; grid-column: 2; grid-row: 1 / span 12; position: sticky; top: 0; align-self: start; }
  #preview { width: 100%; height: min(520px, calc(100vh - 165px)); min-height: 360px; background: #0d1220; border: 1px solid #26304a; border-radius: 12px; display: block; }
  #preview-msg { font-size: 12px; color: #5f6f93; margin-top: 6px; }
  .row-actions { display: flex; gap: 8px; margin-top: 8px; }
  .hint { font-size: 11px; color: #5f6f93; margin-top: 6px; line-height: 1.5; }
  @media (max-width: 1050px) {
    #editor { display: block; }
    #preview-wrap { position: relative; top: auto; }
    #preview { height: 340px; min-height: 0; }
  }
</style>
</head>
<body>
<header>
  <h1>🛋 Asset Editor</h1>
  <span class="grow"></span>
  <input id="search" type="search" placeholder="Search assets…" />
  <button id="new">+ New asset</button>
  <button id="save" class="primary" disabled>Save changes</button>
  <span id="status">loading…</span>
</header>
<div id="layout">
  <nav id="sidebar"></nav>
  <div id="editor"><div class="empty">Select an asset</div></div>
</div>

<script>
// ------------------------------------------------------------------ state
const API = '/api/data/';
const esc = (value) => String(value ?? '').replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
const FEATURE_CATEGORY_CARDS = Object.freeze({
  electronics: ['Light', 'Sound', 'Power (Hydro)', 'State visuals'],
  comfort: ['Sit / lie / use pose', 'Seat locations (multiple)', 'Need multipliers'],
  plumbing: ['Accidents', 'Cleanup'],
  garbage: ['Garbage'],
  kitchen: ['Food', 'Combustibility'],
});
const state = {
  assets: null, interactions: null, map: null, stats: null, tuning: null, events: null,
  selected: null, dirty: false,
  // Preview-only state: never written to assets.json. Character starts hidden on every load.
  showCharacter: false, previewPose: null, previewOn: false, previewSeatLocation: null,
  helperVisibility: { footprint: true, sit: true, lie: true, facing: true, surfaces: true, handle: true },
};
const previewGridSize = () => {
  const size = Number(state.map?.gridSize);
  return Number.isFinite(size) && size > 0 ? size : 0.5;
};
const previewGridSpec = () => {
  const tileSize = previewGridSize();
  const divisions = Math.max(1, Math.ceil(4 / tileSize));
  return { tileSize, divisions, size: divisions * tileSize };
};
/** Every pose can be inspected before it is authored. Sit/lie use their computed perch defaults;
 * use previews the normal computed standing approach until usePose.use has authored fields. */
function availablePreviewPoses(asset) {
  return asset ? ['sit', 'lie', 'use'] : [];
}

/** Pure preview label/branch helper. Empty pose objects count as computed defaults because the
 * editor prunes them and no actual transform field has been authored. */
function previewPoseSource(pose, asset) {
  const entry = asset?.usePose?.[pose];
  return entry && Object.keys(entry).length > 0 ? 'authored' : 'computed default';
}

/** Resolve a preview pose to the game's logical animation vocabulary and configured clip name.
 * The module still passes the logical state to AnimController, which owns the real clip lookup. */
function resolvePoseAnimation(pose, asset, actions = state.interactions?.actions ?? [], clipMap = state.tuning?.character?.clipMap ?? {}) {
  const actionStates = actions
    .filter((action) => asset?.interactions?.includes(action.id))
    .map((action) => action.animation)
    .filter(Boolean);
  const matching = actionStates.filter((name) => (
    pose === 'sit' ? name.startsWith('sit')
      : pose === 'lie' ? name.startsWith('lie')
      : !name.startsWith('sit') && !name.startsWith('lie')
  ));
  const fallbacks = pose === 'use' ? ['stand_use', 'use', 'idle'] : [pose];
  const candidates = [...new Set([...matching, ...fallbacks])];
  const logicalState = candidates.find((name) => clipMap[name]) ?? candidates[0] ?? 'idle';
  return { logicalState, clipName: clipMap[logicalState] ?? null };
}

function setCarryHandleFromPreview(position, final = false) {
  const asset = selectedAsset();
  if (!asset?.carryHandle || !Array.isArray(position)) return;
  asset.carryHandle = [0, 1, 2].map((index) => Number((Number(position[index]) || 0).toFixed(3)));
  for (let index = 0; index < 3; index++) {
    const input = document.querySelector(`input[data-path="carryHandle.${['x', 'y', 'z'][index]}"]`);
    if (input) input.value = String(asset.carryHandle[index]);
  }
  if (final) { state.dirty = true; updateSave(); setStatus('unsaved changes'); }
}

window.AssetEditor = { state, previewGridSize, previewGridSpec, availablePreviewPoses, previewPoseSource, resolvePoseAnimation, setCarryHandleFromPreview };

async function load() {
  setStatus('loading…');
  try {
    const [a, i, m, s, t, e] = await Promise.all([
      fetch(API + 'assets.json').then((r) => { if (!r.ok) throw new Error('assets.json HTTP ' + r.status); return r.json(); }),
      fetch(API + 'interactions.json').then((r) => { if (!r.ok) throw new Error('interactions.json HTTP ' + r.status); return r.json(); }),
      // AUDIT bug 17: placement counts / delete warnings must consider EVERY map, not just condo.
      fetch('/api/maps').then((r) => (r.ok ? r.json() : { maps: ['condo'] })).catch(() => ({ maps: ['condo'] }))
        .then(({ maps }) => Promise.all(maps.map((name) =>
          fetch(API + 'maps/' + name + '.json').then((r) => (r.ok ? r.json() : null)).catch(() => null))))
        .then((loaded) => loaded.filter(Boolean)),
      fetch(API + 'stats.json').then((r) => (r.ok ? r.json() : { needs: [], skills: [] })).catch(() => ({ needs: [], skills: [] })),
      fetch(API + 'tuning.json').then((r) => (r.ok ? r.json() : null)).catch(() => null),
      fetch(API + 'events.json').then((r) => (r.ok ? r.json() : { events: [] })).catch(() => ({ events: [] })),
    ]);
    state.assets = a; state.interactions = i; state.maps = m; state.map = m[0] ?? null; state.stats = s; state.tuning = t; state.events = e;
    state.dirty = false;
    if (!state.selected && a.assets.length) state.selected = a.assets[0].id;
    renderAll();
    setStatus('loaded', 'ok');
  } catch (e) { setStatus(String(e.message || e), 'err'); }
}

async function save() {
  setStatus('saving…');
  try {
    const res = await fetch(API + 'assets.json', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state.assets, null, 2),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    state.dirty = false;
    updateSave();
    setStatus('saved — game hot-reloads', 'ok');
  } catch (e) { setStatus(String(e.message || e), 'err'); }
}

function markDirty() { state.dirty = true; updateSave(); setStatus('unsaved changes'); schedulePreview(); }
function updateSave() { document.getElementById('save').disabled = !state.dirty; }
function setStatus(msg, cls = '') { const s = document.getElementById('status'); s.textContent = msg; s.className = cls; }
const placedCount = (id) => (state.maps ?? []).reduce((sum, m) => sum + (m.placedObjects ?? []).filter((p) => p.asset === id).length, 0);
const selectedAsset = () => state.assets.assets.find((a) => a.id === state.selected) ?? null;

// ------------------------------------------------------------------ sidebar
function renderSidebar() {
  const nav = document.getElementById('sidebar');
  const q = document.getElementById('search').value.trim().toLowerCase();
  nav.innerHTML = '';
  for (const cat of state.assets.categories) {
    const items = state.assets.assets.filter((a) => a.category === cat &&
      (q === '' || a.name.toLowerCase().includes(q) || a.id.toLowerCase().includes(q)));
    if (!items.length) continue;
    const h = document.createElement('h4');
    h.textContent = cat;
    nav.appendChild(h);
    for (const a of items) {
      const b = document.createElement('button');
      b.className = 'asset-item' + (a.id === state.selected ? ' active' : '');
      b.dataset.assetId = a.id;
      const n = placedCount(a.id);
      b.innerHTML = `<span>${a.name}</span>${n ? `<span class="badge">×${n} placed</span>` : ''}`;
      b.addEventListener('click', () => { state.selected = a.id; renderAll(); });
      nav.appendChild(b);
    }
  }
  // uncategorized safety net
  const stray = state.assets.assets.filter((a) => !state.assets.categories.includes(a.category) &&
    (q === '' || a.name.toLowerCase().includes(q) || a.id.toLowerCase().includes(q)));
  if (stray.length) {
    const h = document.createElement('h4');
    h.textContent = '(uncategorized)';
    nav.appendChild(h);
    for (const a of stray) {
      const b = document.createElement('button');
      b.className = 'asset-item' + (a.id === state.selected ? ' active' : '');
      b.dataset.assetId = a.id;
      b.textContent = a.name;
      b.addEventListener('click', () => { state.selected = a.id; renderAll(); });
      nav.appendChild(b);
    }
  }
}

// ------------------------------------------------------------------ editor form
function frow(label, input) {
  const r = document.createElement('div');
  r.className = 'frow';
  const l = document.createElement('label');
  l.textContent = label;
  r.append(l, input);
  return r;
}
function numInput(get, set, path) {
  const i = document.createElement('input');
  i.type = 'number'; i.step = 'any'; i.value = get() ?? '';
  i.dataset.path = path;
  i.addEventListener('input', () => { set(i.value === '' ? undefined : Number(i.value)); markDirty(); });
  return i;
}
function textInput(get, set, path, opts = {}) {
  const i = document.createElement('input');
  i.type = 'text'; i.value = get() ?? '';
  i.dataset.path = path;
  if (opts.readonly) i.readOnly = true;
  i.addEventListener('input', () => { set(i.value); markDirty(); });
  return i;
}
function checkInput(get, set, path) {
  const i = document.createElement('input');
  i.type = 'checkbox'; i.checked = !!get();
  i.dataset.path = path;
  i.addEventListener('change', () => { set(i.checked); markDirty(); });
  return i;
}
function renderFeatureCategoriesCard(a) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.card = 'feature-categories';
  card.innerHTML = '<h2>Feature categories</h2><div class="hint">Choose the setting groups relevant to this asset. These are editor-only and distinct from the in-game category above. With none selected, every setting card remains visible.</div>';
  const checks = document.createElement('div');
  checks.className = 'checks';
  const selected = new Set(Array.isArray(a.featureCategories) ? a.featureCategories : []);
  for (const category of Object.keys(FEATURE_CATEGORY_CARDS)) {
    const label = document.createElement('label');
    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.dataset.path = `featureCategories:${category}`;
    checkbox.checked = selected.has(category);
    checkbox.addEventListener('change', () => {
      const next = new Set(Array.isArray(a.featureCategories) ? a.featureCategories : []);
      if (checkbox.checked) next.add(category); else next.delete(category);
      const ordered = Object.keys(FEATURE_CATEGORY_CARDS).filter((name) => next.has(name));
      if (ordered.length) a.featureCategories = ordered; else delete a.featureCategories;
      markDirty();
      renderAll();
    });
    label.append(checkbox, document.createTextNode(category));
    checks.appendChild(label);
  }
  card.appendChild(checks);
  return card;
}
function appendFeatureCard(root, card, a, category, authoredKeys) {
  card.dataset.featureCategory = category;
  const selected = Array.isArray(a.featureCategories) ? a.featureCategories : [];
  const showAll = selected.length === 0;
  const hasAuthoredData = authoredKeys.some((key) => Object.prototype.hasOwnProperty.call(a, key));
  if (showAll || selected.includes(category) || hasAuthoredData) root.appendChild(card);
}
function selectInput(options, get, set, path) {
  const sel = document.createElement('select');
  sel.dataset.path = path;
  for (const o of options) {
    const opt = document.createElement('option');
    opt.value = o.value; opt.textContent = o.label;
    sel.appendChild(opt);
  }
  sel.value = get();
  sel.addEventListener('change', () => { set(sel.value); markDirty(); });
  return sel;
}
function eventOptions(current) {
  const options = [{ value: '', label: '(none)' }, ...(state.events?.events ?? []).map((event) => ({ value: event.id, label: event.id }))];
  if (current && !options.some((option) => option.value === current)) options.push({ value: current, label: current + ' (unknown)' });
  return options;
}
// AUDIT overlap 35: the REAL game/sprites.ts classifyMeshPath is bridged in by the module script
// below (window.AssetEditorEngine, same pattern as the Theme Editor's setThemeEngine); this local
// list is only the jsdom/module-load-failure fallback, no longer the primary.
const IMAGE_MESH_EXTENSIONS = ['png', 'jpg', 'jpeg', 'webp', 'gif'];
function isImageMesh(mesh) {
  const engine = window.AssetEditorEngine;
  if (engine?.classifyMeshPath) return engine.classifyMeshPath(String(mesh || '').trim()) === 'image';
  const m = /\.([a-z0-9]+)(?:[?#].*)?$/i.exec(String(mesh || '').trim());
  return !!m && IMAGE_MESH_EXTENSIONS.includes(m[1].toLowerCase());
}

function nextCategoryId() {
  let n = 1;
  while (state.assets.categories.includes(`category_${n}`)) n++;
  return `category_${n}`;
}

function renderCategoriesCard() {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = '<h2>Categories</h2>';
  state.assets.categories.forEach((category, index) => {
    const count = state.assets.assets.filter((asset) => asset.category === category).length;
    const controls = document.createElement('div');
    controls.className = 'pair';
    const rename = document.createElement('input');
    rename.type = 'text'; rename.value = category; rename.dataset.path = `categories.${index}`;
    rename.addEventListener('change', () => {
      const next = rename.value.trim();
      if (!next || (next !== category && state.assets.categories.includes(next))) {
        window.alert(next ? `category "${next}" already exists` : 'category id cannot be blank');
        renderAll();
        return;
      }
      if (next === category) return;
      state.assets.categories[index] = next;
      for (const asset of state.assets.assets) if (asset.category === category) asset.category = next;
      window.RefScan?.warnAfterDelete(category, [category], { skipFiles: ['assets.json'] }, (w) => setStatus(w, 'err'));
      markDirty();
      renderAll();
    });
    const del = document.createElement('button');
    del.className = 'danger'; del.textContent = 'Delete'; del.dataset.categoryDelete = category;
    del.addEventListener('click', () => {
      if (count && !window.confirm(`Category "${category}" is used by ${count} asset${count === 1 ? '' : 's'}. Delete the category anyway?`)) return;
      state.assets.categories.splice(index, 1);
      window.RefScan?.warnAfterDelete(category, [category], { skipFiles: ['assets.json'] }, (w) => setStatus(w, 'err'));
      markDirty();
      renderAll();
    });
    controls.append(rename, del);
    const row = frow(`${count} asset${count === 1 ? '' : 's'}`, controls);
    row.dataset.categoryRow = category;
    card.appendChild(row);
  });
  const add = document.createElement('button');
  add.textContent = '+ Add category'; add.id = 'add-category';
  add.addEventListener('click', () => {
    state.assets.categories.push(nextCategoryId());
    markDirty();
    renderAll();
  });
  card.appendChild(add);
  return card;
}

function nextStateId(a) {
  let n = 1;
  const used = new Set((a.states ?? []).map((s) => s.id));
  while (used.has(`state_${n}`)) n++;
  return `state_${n}`;
}

function renderStatesCard(a) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.card = 'states';
  card.innerHTML = '<h2>States</h2><div class="hint">Optional generalized asset states. A state\'s checked actions are the only ones offered there; all checked or none checked means all asset interactions (the sparse default). <b>setsState</b> on an action creates transitions between states. If no state is marked default, the first state is used.</div>';
  const states = a.states ?? [];
  const assetActions = state.interactions.actions.filter((action) => a.interactions.includes(action.id));

  states.forEach((assetState, index) => {
    const box = document.createElement('div');
    box.className = 'card'; box.style.background = '#141c2e'; box.style.margin = '10px 0 0';
    box.dataset.stateRow = String(index);

    const idInput = document.createElement('input');
    idInput.type = 'text'; idInput.value = assetState.id ?? ''; idInput.dataset.path = `states.${index}.id`;
    idInput.addEventListener('change', () => {
      const previous = assetState.id;
      const next = idInput.value.trim();
      if (!next || states.some((entry, otherIndex) => otherIndex !== index && entry.id === next)) {
        window.alert(next ? `state id "${next}" already exists` : 'state id cannot be blank');
        idInput.value = previous;
        return;
      }
      assetState.id = next;
      markDirty(); renderAll();
    });
    box.appendChild(frow('id (unique)', idInput));
    box.appendChild(frow('display name', textInput(
      () => assetState.name,
      (v) => { const t = v.trim(); if (t) assetState.name = t; else delete assetState.name; },
      `states.${index}.name`,
    )));
    const stateMesh = textInput(
      () => assetState.mesh,
      (v) => { const t = normPublicPath(v); if (t) assetState.mesh = t; else delete assetState.mesh; },
      `states.${index}.mesh`,
    );
    stateMesh.placeholder = 'blank = base mesh';
    box.appendChild(frow('mesh path', stateMesh));
    box.appendChild(frow('on enter \u2192 event', selectInput(
      eventOptions(assetState.onEnter),
      () => assetState.onEnter ?? '',
      (v) => { if (v) assetState.onEnter = v; else delete assetState.onEnter; },
      `states.${index}.onEnter`,
    )));

    const defaultCb = document.createElement('input');
    defaultCb.type = 'checkbox'; defaultCb.checked = assetState.default === true;
    defaultCb.dataset.path = `states.${index}.default`;
    defaultCb.addEventListener('change', () => {
      for (const entry of states) delete entry.default;
      if (defaultCb.checked) assetState.default = true;
      markDirty(); renderAll();
    });
    box.appendChild(frow('default (exclusive)', defaultCb));

    box.appendChild(frow('blocks navigation', selectInput(
      [
        { value: '', label: '(inherit from asset)' },
        { value: 'true', label: 'blocks navigation' },
        { value: 'false', label: 'does not block navigation' },
      ],
      () => assetState.blocksNav === undefined ? '' : String(assetState.blocksNav),
      (v) => { if (v === '') delete assetState.blocksNav; else assetState.blocksNav = v === 'true'; },
      `states.${index}.blocksNav`,
    )));

    const footprint = document.createElement('div'); footprint.className = 'pair';
    const setFootprint = (axis) => (v) => {
      if (v === undefined) { delete assetState.footprint; return; }
      const next = assetState.footprint ? [...assetState.footprint] : [...a.footprint];
      next[axis] = v; assetState.footprint = next;
    };
    footprint.append(
      numInput(() => assetState.footprint?.[0], setFootprint(0), `states.${index}.footprint.w`),
      numInput(() => assetState.footprint?.[1], setFootprint(1), `states.${index}.footprint.d`),
    );
    box.appendChild(frow('footprint W / D (blank = inherit)', footprint));

    const actionChecks = document.createElement('div'); actionChecks.className = 'checks';
    for (const action of assetActions) {
      const label = document.createElement('label');
      const cb = document.createElement('input'); cb.type = 'checkbox'; cb.dataset.actionId = action.id;
      cb.dataset.path = `states.${index}.interaction:${action.id}`;
      cb.checked = assetState.interactions === undefined || assetState.interactions.includes(action.id);
      cb.addEventListener('change', () => {
        const checked = [...actionChecks.querySelectorAll('input[type="checkbox"]')]
          .filter((input) => input.checked).map((input) => input.dataset.actionId);
        if (checked.length === 0 || checked.length === assetActions.length) delete assetState.interactions;
        else assetState.interactions = checked;
        markDirty();
      });
      label.append(cb, document.createTextNode(action.name)); actionChecks.appendChild(label);
    }
    if (!assetActions.length) actionChecks.innerHTML = '<span class="hint">Add interactions to this asset first.</span>';
    box.appendChild(frow('actions offered in this state', actionChecks));

    const incoming = assetActions.filter((action) => action.setsState === assetState.id);
    const isDefault = assetState.default === true || (!states.some((entry) => entry.default === true) && index === 0);
    const entered = document.createElement('div'); entered.className = 'hint'; entered.dataset.stateIncoming = assetState.id;
    entered.textContent = incoming.length ? `Entered by: ${incoming.map((action) => action.name).join(', ')}` : 'Entered by: no action';
    box.appendChild(entered);
    if (!incoming.length && !isDefault) {

// AUDIT bugs 18-21: ONE public-path normalizer for every path field (icon/mesh/sound/pane/state
// visuals) — pasted Windows paths reduce to public/-relative, legacy "/public/..." values heal.
function normPublicPath(v) {
  // AUDIT overlap 36: shared tools/pathnorm.js is the primary; the body below is only the jsdom fallback.
  if (window.PathNorm) return window.PathNorm.publicRelative(v);
  let s = String(v).trim().replace(/\\/g, '/');
  const i = s.toLowerCase().lastIndexOf('/public/');
  if (i >= 0) s = s.slice(i + '/public/'.length);
  return s.replace(/^\/+/, '');
}

  card4b.appendChild(frow('…or per-axis scale x/y/z (overrides the field above)', scalePair));
  card4b.appendChild(frow('yaw offset ° (rotates the mesh in place)', numInput(
    () => a.meshFit?.yawOffsetDeg,
    (v) => { if (v === undefined) { if (a.meshFit) delete a.meshFit.yawOffsetDeg; } else ensureFit().yawOffsetDeg = v; pruneFit(); },
    'meshFit.yawOffsetDeg',
  )));
  // Per-axis position nudge (meters, post-grounding). Each axis is sparse — blank = unset (0).
  // yOffset predates xOffset/zOffset and keeps its exact meaning; the two new axes are a
  // backward-compatible superset (see game/data.ts meshFit + game/world.ts applyMeshFit).
  const offsetInput = (key) => numInput(
    () => a.meshFit?.[key],
    (v) => { if (v === undefined) { if (a.meshFit) delete a.meshFit[key]; } else ensureFit()[key] = v; pruneFit(); },

  const offsetPair = document.createElement('div');

  root.appendChild(card4b);

  // --- need multipliers (sparse: needMultipliers keys only exist while set; an empty map is
  // pruned away entirely). Each row scales this asset's effective per-tick gain for one need:
  // effective gain = action.needGains[need] * multiplier. >1 is better than average, <1 worse,
  // NEGATIVE inverts it (an awful chair that drains comfort). Applied identically in-game and by
  // the autonomy scorer via game/stats.ts effectiveNeedGain.
  const card4c = document.createElement('div');

  card4c.innerHTML = '<h2>Need multipliers</h2><div class="hint">Scale how much of each need this asset gives while an action runs on it (effective gain = action gain × multiplier). 1 = unchanged, above 1 = better, below 1 = worse, negative = drains the need. Leave empty for no scaling.</div>';
  const ensureMult = () => (a.needMultipliers ??= {});
  const pruneMult = () => { if (a.needMultipliers && Object.keys(a.needMultipliers).length === 0) delete a.needMultipliers; };
  const needOptions = () => state.stats.needs.map((n) => ({ value: n.id, label: n.name }));
  const rows = Object.entries(a.needMultipliers ?? {});
  rows.forEach(([needId, mult]) => {
    const row = document.createElement('div');

    row.appendChild(selectInput(needOptions(), () => needId, (v) => {
      if (v === needId) return;

    row.appendChild(numInput(

  addMult.addEventListener('click', () => {

  card4c.appendChild(addMult);
  appendFeatureCard(root, card4c, a, 'comfort', ['needMultipliers']);

  // --- sprite (§7.5: only rendered when the mesh path is an image — png/jpg/webp/gif — rather
  // than a GLB; sparse writes, same ensure/prune pattern as meshFit above).
  if (isImageMesh(a.mesh)) {

    card4d.innerHTML = '<h2>Sprite</h2><div class="hint">This asset\'s mesh path looks like an image, not a GLB — it renders as a textured plane instead. Billboard (default) always faces the camera (fire, smoke); flat lies on the floor (puddles, debris). fps overrides an animated GIF\'s own frame delays; leave blank to use the GIF\'s native timing.</div>';
    const ensureSprite = () => (a.sprite ??= {});

  // --- door (§7.1: only on category "door" — hingeOffset/openAngleDeg/openSeconds/closeSeconds/

    const hingeAt = (i) => a.door?.hingeOffset?.[i];

      () => a.door?.triggerDistance,
      (v) => { if (v === undefined) { if (a.door) delete a.door.triggerDistance; } else ensureDoor().triggerDistance = v; },

    // ROADMAP_APT D1 (resolved decision §6.2): the hole an ON-WALL door cuts through a continuous

      'door.apertureWidth',
    )));
    card4c.appendChild(frow('aperture height m (blank = 2.1m default)', numInput(
      () => a.door?.apertureHeight,
      (v) => { if (v === undefined) { if (a.door) delete a.door.apertureHeight; } else ensureDoor().apertureHeight = v; },
      'door.apertureHeight',
    )));
    // ROADMAP_APT D2 (frame/pane split): make ONLY the door PANE swing (game/doors.ts). BOTH sparse,
    // both optional — absent = the whole asset pivots (today's behavior). paneNode names a node

    const setPaneField = (key) => (v) => {

    card4c.appendChild(frow('exterior (tappable interactable, never opens/closes automatically)', checkInput(

  // --- danger zone
  const card5 = document.createElement('div');

    window.RefScan?.warnAfterDelete(a.id, [a.id], { skipFiles: ['assets.json'] }, (w) => setStatus(w, 'err'));
    state.assets.assets = state.assets.assets.filter((x) => x.id !== a.id);

function addAsset(base) {
  let id = window.prompt('New asset id (lowercase, no spaces):', base ? base.id + '_copy' : '');
  if (!id) return;
  id = id.trim().toLowerCase().replace(/\s+/g, '_');
  if (state.assets.assets.some((x) => x.id === id)) { window.alert(`id "${id}" already exists`); return; }
  const fresh = base ?? {
    id, name: id, category: state.assets.categories[0] ?? 'misc', mesh: '',
    buyPrice: 0, sellPrice: 0, environmentScore: 0, footprint: [1, 1], interactions: [],
  };
  fresh.id = id;
  if (base) fresh.name = base.name + ' copy';
  state.assets.assets.push(fresh);
  state.selected = id;
  markDirty();
  renderAll();
}

function renderAll() { renderSidebar(); renderEditor(); }

function schedulePreview() {
  const a = selectedAsset();
  // §7.5: pass the whole asset so the preview can render image meshes with the real footprint/
  // sprite config (the preview module ignores everything but mesh for GLBs).
  window.AssetPreview?.show(a?.mesh || '', a, state.previewOn);
}

document.getElementById('search').addEventListener('input', renderSidebar);
document.getElementById('new').addEventListener('click', () => addAsset(null));
document.getElementById('save').addEventListener('click', save);
window.addEventListener('keydown', (e) => {

});

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { TransformControls } from 'three/addons/controls/TransformControls.js';
import { AnimController } from '/game/anim.ts';
import { facingVector, seatLocationEntries, useFacingTargetFor, usePoseFor, usePoseForEntry, useSpotFor } from '/game/facing.ts';
import { classifyMeshPath, createSpriteInstance, createOverlayInstance } from '/game/sprites.ts';
import { normalizeModelToFootprint, applyMeshFit, loadMeshTemplate, loadRiggedCharacter, makeSimStandIn, applyOverlayTransform } from '/game/world.ts';
import { resolvePaneConfig } from '/game/doors.ts';
import { resolveScreenOverlay, overlayVisibleWhenOn, meshForState } from '/game/stateviz.ts';

let renderer = null, scene, camera, controls, transformControls = null, current = null, raf = 0;
let footprintHelper = null; // translucent ground rect + outline at y=0 showing the asset's footprint
let useHelpers = null; // preview-only seat/lie markers and the custom facing-target cube
let activeSprite = null; // §7.5: SpriteInstance being previewed — its update() drives GIF frames (real time here, sim time in-game)
let activeOverlay = null; // state-visuals screen overlay preview (game/stateviz.ts), animated like activeSprite
let previewSeq = 0; // staleness token: a slow decode must not clobber a newer show()
let characterPromise = null, characterRoot = null, characterAnim = null;
let characterFallback = false;
let assetStatus = '', characterStatus = '';
const previewClock = new THREE.Clock();

function previewMessage() {
  const msg = document.getElementById('preview-msg');
  if (msg) msg.textContent = [assetStatus, characterStatus].filter(Boolean).join(' · ');
}

// ITEM 1 feature: draw the asset's footprint as a visible ground rectangle (translucent fill +
// wireframe outline) at y=0 so the designer can see where the mesh sits WITHIN it — the footprint
// drives placement/nav and stays put while meshFit offsets nudge the mesh relative to its center.
// Rebuilt on every show() so it live-updates when the footprint (or offsets) change.
function updateFootprintHelper(def) {
  if (footprintHelper) {
    scene.remove(footprintHelper);
    footprintHelper.traverse((o) => { o.geometry?.dispose?.(); o.material?.dispose?.(); });
    footprintHelper = null;
  }
  if (window.AssetEditor?.state?.helperVisibility?.footprint === false) return;
  const fp = def && Array.isArray(def.footprint) ? def.footprint : null;
  const w = fp && fp[0] > 0 ? fp[0] : 0, d = fp && fp[1] > 0 ? fp[1] : 0;
  if (!(w > 0) || !(d > 0)) return;
  footprintHelper = new THREE.Group();
  footprintHelper.name = 'footprint-helper';
  const hx = w / 2, hz = d / 2, y = 0.002; // just above the grid to avoid z-fighting
  const fill = new THREE.Mesh(
    new THREE.PlaneGeometry(w, d).rotateX(-Math.PI / 2),
    new THREE.MeshBasicMaterial({ color: 0x4fd1c5, transparent: true, opacity: 0.12, side: THREE.DoubleSide, depthWrite: false }),
  );
  fill.position.y = y;
  const outline = new THREE.LineLoop(
    new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-hx, y, -hz), new THREE.Vector3(hx, y, -hz),
      new THREE.Vector3(hx, y, hz), new THREE.Vector3(-hx, y, hz),
    ]),
    new THREE.LineBasicMaterial({ color: 0x4fd1c5 }),
  );
  footprintHelper.add(fill, outline);
  scene.add(footprintHelper);
}

function updateUseHelpers(def) {
  transformControls?.detach();
  if (transformControls) transformControls.visible = false;
  if (useHelpers) {
    scene.remove(useHelpers);
    useHelpers.traverse((object) => { object.geometry?.dispose?.(); object.material?.dispose?.(); });
  }
  useHelpers = new THREE.Group();
  useHelpers.name = 'asset-editor-use-helpers';
  const instance = { pos: [0, 0], rotDeg: 0 };
  for (const pose of ['sit', 'lie']) {
    if (window.AssetEditor.state.helperVisibility?.[pose] === false) continue;
    (def ? seatLocationEntries(def, pose) : []).forEach((entry, index) => {
      const transform = usePoseForEntry(pose, entry, instance, def, window.AssetEditor.state.tuning);
      const color = pose === 'sit' ? 0x43d9ff : 0xd66bff;
      const marker = new THREE.Mesh(
        new THREE.SphereGeometry(0.09, 12, 8),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.8, depthWrite: false }),
      );
      marker.name = `${pose}-location-${index}`;
      marker.position.set(transform.pos[0], Math.max(0.06, transform.y), transform.pos[1]);
      const [dx, dz] = facingVector(transform.facingDeg);
      const arrow = new THREE.ArrowHelper(new THREE.Vector3(dx, 0, dz), marker.position, 0.42, color, 0.12, 0.07);
      useHelpers.add(marker, arrow);
    });
  }
  const target = window.AssetEditor.state.helperVisibility?.facing === false ? null : def ? useFacingTargetFor(instance, def) : null;
  if (target) {
    const cube = new THREE.Mesh(
      new THREE.BoxGeometry(0.16, 0.16, 0.16),
      new THREE.MeshBasicMaterial({ color: 0xffcc33, wireframe: true, transparent: true, opacity: 0.95 }),
    );
    cube.name = 'use-facing-target';
    cube.position.set(target[0], 0.12, target[1]);
    useHelpers.add(cube);
  }
  if (window.AssetEditor.state.helperVisibility?.surfaces !== false) {
    (def?.surfaceSockets ?? []).forEach((socket, index) => {
      const marker = new THREE.Mesh(
        new THREE.BoxGeometry(0.2, 0.035, 0.2),
        new THREE.MeshBasicMaterial({ color: 0x61e786, transparent: true, opacity: 0.85, depthWrite: false }),
      );
      marker.name = `surface-socket-${index}-available`;
      marker.position.set(socket.offset?.[0] ?? 0, Math.max(0.02, socket.y ?? 0), socket.offset?.[1] ?? 0);
      marker.rotation.y = THREE.MathUtils.degToRad(socket.rotationDeg ?? 0);
      useHelpers.add(marker);
    });
  }
  if (window.AssetEditor.state.helperVisibility?.handle !== false && Array.isArray(def?.carryHandle)) {
    const marker = new THREE.Mesh(
      new THREE.SphereGeometry(0.095, 16, 10),
      new THREE.MeshBasicMaterial({ color: 0xff8a3d, transparent: true, opacity: 0.92, depthWrite: false }),
    );
    marker.name = 'carry-handle';
    marker.position.fromArray(def.carryHandle);
    useHelpers.add(marker);
    if (transformControls) {
      transformControls.attach(marker);
      transformControls.visible = true;
    }
  }
  scene.add(useHelpers);
}

function framePreview() {
  const visible = [current, characterRoot?.visible ? characterRoot : null, footprintHelper, useHelpers].filter(Boolean);
  if (!visible.length) return;
  const box = new THREE.Box3();
  for (const object of visible) box.expandByObject(object);
  const worldSize = box.getSize(new THREE.Vector3());
  const size = worldSize.length() || 1;
  const center = box.getCenter(new THREE.Vector3());
  camera.near = Math.max(size / 100, 0.001);
  camera.far = size * 20;
  camera.updateProjectionMatrix();
  camera.position.copy(center).add(new THREE.Vector3(1, 0.7, 1.2).setLength(size * 1.2));
  controls.target.copy(center);
  controls.update();
}

function ensureCharacter(character) {
  if (!characterPromise) {
    characterStatus = 'loading character…'; previewMessage();
    characterPromise = loadRiggedCharacter(character).then(({ model, clips }) => {
      characterFallback = false;
      characterRoot = new THREE.Group();
      characterRoot.name = 'asset-editor-character-preview';
      characterRoot.add(model);
      characterAnim = new AnimController(model, clips, character);
      characterRoot.visible = false;
      scene.add(characterRoot);
      return { clips };
    }).catch((error) => {
      // The game itself keeps its capsule when a custom rig cannot load. The editor must do the
      // same so Show character never becomes a blank/broken control.
      console.warn('Asset Editor character rig failed; using the in-game stand-in.', error);
      characterFallback = true;
      characterRoot = makeSimStandIn();
      characterRoot.name = 'asset-editor-character-preview-fallback';
      characterRoot.visible = false;
      characterAnim = null;
      scene.add(characterRoot);
      return { clips: [] };
    });
  }
  return characterPromise;
}

function updateCharacter(seq, assetDef) {
  const editor = window.AssetEditor;
  const character = editor?.state?.tuning?.character;
  if (!character?.meshPath) {
    if (characterRoot) characterRoot.visible = false;
    characterStatus = 'Character preview unavailable: tuning.character is not configured.';
    previewMessage();
    return;
  }
  const poses = editor.availablePreviewPoses(assetDef);
  const pose = editor.state.previewPose;
  if (!editor.state.showCharacter) {
    if (characterRoot) characterRoot.visible = false;
    characterStatus = poses.length ? '' : 'No sit/lie/use pose is relevant to this asset.';
    previewMessage();
    return;
  }
  if (!pose || !poses.includes(pose)) {
    if (characterRoot) characterRoot.visible = false;
    characterStatus = 'No sit/lie/use pose is relevant to this asset.';
    previewMessage();
    return;
  }
  ensureCharacter(character).then(() => {
    if (seq !== previewSeq) return;
    const instance = { pos: [0, 0], rotDeg: 0 };
    const source = editor.previewPoseSource(pose, assetDef);
    // New.txt #5: an authored multi-location pick (Seat locations card) overrides the single
    // usePose[pose] transform, but only while it's valid for THIS asset/pose (switching assets or
    // poses without a matching entry silently falls back to the normal single-pose preview).
    const seatLoc = editor.state.previewSeatLocation;
    const seatEntry = seatLoc && seatLoc.pose === pose ? assetDef?.useLocations?.[seatLoc.pose]?.[seatLoc.index] : undefined;
    const poseTransform = seatEntry !== undefined
      ? usePoseForEntry(pose, seatEntry, instance, assetDef, editor.state.tuning)
      : usePoseFor(pose, instance, assetDef, editor.state.tuning);
    const transform = pose === 'use' && source === 'computed default'
      ? { ...poseTransform, pos: useSpotFor(instance, assetDef, editor.state.tuning) }
      : poseTransform;
    characterRoot.position.set(transform.pos[0], transform.y, transform.pos[1]);
    characterRoot.rotation.set(0, THREE.MathUtils.degToRad(transform.facingDeg), 0);
    characterRoot.visible = true;
    const resolved = editor.resolvePoseAnimation(pose, assetDef);
    characterAnim?.retune(character);
    characterAnim?.play(resolved.logicalState);
    const sourceLabel = pose === 'use' ? `${source} standing spot; ` : '';
    characterStatus = characterFallback
      ? `${sourceLabel}${pose} character shown with the in-game stand-in (custom rig unavailable)`
      : resolved.clipName
      ? `${sourceLabel}${pose} character animation: ${resolved.logicalState} -> ${resolved.clipName}`
      : `${sourceLabel}${pose} character animation "${resolved.logicalState}" is unmapped; game fallback applies`;
    previewMessage();
    framePreview();
  }).catch(() => {
    if (seq !== previewSeq) return;
    if (characterRoot) characterRoot.visible = false;
    characterStatus = `Could not load character ${character.meshPath}.`;
    previewMessage();
  });
}

function ensure(canvas) {
  if (renderer && renderer.domElement === canvas) return true;
  try {
    renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  } catch { renderer = null; return false; }
  scene = new THREE.Scene();
  useHelpers = null;

  // to the new preview scene instead of loading the character again.
  if (characterRoot) scene.add(characterRoot);
  camera = new THREE.PerspectiveCamera(45, 1, 0.01, 100);
  camera.position.set(2, 1.6, 2.6);
  controls = new OrbitControls(camera, canvas);
  controls.enableDamping = true;
  transformControls = new TransformControls(camera, canvas);
  transformControls.setMode('translate');
  transformControls.setSpace('local');
  transformControls.setSize(0.7);
  transformControls.visible = false;
  transformControls.addEventListener('dragging-changed', (event) => { controls.enabled = !event.value; });
  transformControls.addEventListener('objectChange', () => {
    const object = transformControls.object;
    if (object?.name === 'carry-handle') window.AssetEditor?.setCarryHandleFromPreview?.(object.position.toArray(), false);
  });
  transformControls.addEventListener('mouseUp', () => {
    const object = transformControls.object;
    if (object?.name === 'carry-handle') window.AssetEditor?.setCarryHandleFromPreview?.(object.position.toArray(), true);
  });
  scene.add(transformControls);
  scene.add(new THREE.AmbientLight(0xbfd0e8, 1.1));
  const sun = new THREE.DirectionalLight(0xffffff, 2);
  sun.position.set(3, 5, 2);
  scene.add(sun);
  const grid = window.AssetEditor?.previewGridSpec?.() ?? { size: 4, divisions: 8 };
  scene.add(new THREE.GridHelper(grid.size, grid.divisions, 0x2c3a58, 0x212b44));
  cancelAnimationFrame(raf);
  const loop = () => {
    raf = requestAnimationFrame(loop);
    const rect = canvas.getBoundingClientRect();
    if (canvas.width !== Math.floor(rect.width) && rect.width > 0) {
      renderer.setSize(rect.width, rect.height, false);
      camera.aspect = rect.width / rect.height;
      camera.updateProjectionMatrix();
    }
    controls.update();
    const dt = previewClock.getDelta();
    activeSprite?.update(dt); // advance GIF frames while previewing
    activeOverlay?.update(dt); // state-visuals overlay GIF, also real time in the preview
    characterAnim?.update(dt); // preview has no sim clock/pause, so animate in real time
    renderer.render(scene, camera);
  };
  loop();
  return true;
}

// AUDIT overlap 35: expose the game's own classifier to the inline script (see isImageMesh).
window.AssetEditorEngine = { classifyMeshPath };
window.AssetPreview = {
  show(meshPath, assetDef, previewOn = false) {
    const canvas = document.getElementById('preview');
    if (!canvas || !ensure(canvas)) return;
    previewSeq++; // invalidate any in-flight async load from a previous show()
    const seq = previewSeq;
    if (current) { scene.remove(current); current = null; }
    if (activeSprite) { activeSprite.dispose(); activeSprite = null; }
    if (activeOverlay) { scene.remove(activeOverlay.object); activeOverlay.dispose(); activeOverlay = null; }
    if (characterRoot) characterRoot.visible = false;
    // State visuals (game/stateviz.ts): the previewed mesh follows the toggled power state through
    // the game's OWN resolution, and the screen overlay renders through the game's own instance +
    // transform, so the preview is exactly what a placed instance shows in that state.
    if (assetDef) meshPath = meshForState({ mesh: meshPath, stateMeshes: assetDef.stateMeshes }, previewOn);
    const overlayCfg = assetDef ? resolveScreenOverlay(assetDef) : null;
    if (overlayCfg && overlayVisibleWhenOn(overlayCfg, previewOn)) {
      const overlayUrl = /^(\/|https?:)/.test(overlayCfg.image) ? overlayCfg.image : '/' + overlayCfg.image;
      const inst = createOverlayInstance(overlayCfg, overlayUrl, assetDef.id || 'preview');
      applyOverlayTransform(inst.object, overlayCfg);
      activeOverlay = inst;
      scene.add(inst.object);
      inst.ready
        .then(() => { if (seq === previewSeq) framePreview(); })
        .catch(() => { assetStatus += ` · overlay image failed (${overlayUrl}) — file should be under public/`; previewMessage(); });
    }
    updateFootprintHelper(assetDef); // live footprint ground rect (rebuilt each show → follows footprint edits)
    updateUseHelpers(assetDef);
    assetStatus = meshPath ? '' : 'No mesh assigned — set a GLB or image path to preview it.';
    characterStatus = '';
    previewMessage();
    updateCharacter(seq, assetDef);
    if (!meshPath) return;
    // public/ is served at the site root — normalize "models/bed.glb" → "/models/bed.glb"
    const url = /^(\/|https?:)/.test(meshPath) ? meshPath : '/' + meshPath;
    assetStatus = 'loading ' + url + ' …'; previewMessage();
    // §7.5: image mesh (png/jpg/webp/gif) — preview through the game's OWN sprite pipeline
    // (game/sprites.ts), so what the designer sees here (billboard vs flat, GIF animation) is
    // exactly what spawns in-game. Frame advance runs on real time in this preview.
    if (classifyMeshPath(url) === 'image') {
      const def = assetDef && Array.isArray(assetDef.footprint) ? assetDef : { ...(assetDef || {}), footprint: [1, 1] };
      const inst = createSpriteInstance(def, url);
      inst.ready
        .then(() => {
          if (seq !== previewSeq) { inst.dispose(); return; } // superseded by a newer show()
          if (current) scene.remove(current);
          current = inst.object;
          activeSprite = inst;
          scene.add(current);
          assetStatus = `${url} — image sprite (${def.sprite?.orientation ?? 'billboard'}${url.toLowerCase().includes('.gif') ? ', animated' : ''})`;
          previewMessage(); framePreview();
        })
        .catch(() => { inst.dispose(); assetStatus = `Could not load ${url} — the file should be at public${url}.`; previewMessage(); });
      return;
    }
    // GLB furniture — apply the SAME transforms the game applies (game/world.ts), so the
    // designer sees the model at its real in-game size, grounded at y=0 on the grid, rather
    // than the raw GLB centered by its own bounds. loadMeshTemplate caches per URL, so
    // footprint/meshFit live-edits re-clone cheaply instead of re-fetching.
    const def = assetDef && Array.isArray(assetDef.footprint) ? assetDef : { ...(assetDef || {}), footprint: [1, 1] };
    // D2: names of the loaded GLB's named nodes — surfaced for door assets so the designer can find
    // the right door.paneNode without guessing (nice-to-have per ROADMAP_APT D2).
    const nodeNames = (tpl) => {
      const names = [];
      tpl.traverse((o) => { if (o.name) names.push(o.name); });
      return [...new Set(names)];
    };
    // D2: a separate pane GLB (door.paneMesh) is combined with the frame mesh in ONE 3D — fitted to
    // the footprint TOGETHER, exactly as game/doors.ts combines them at runtime — so the preview
    // shows what actually spawns. loadMeshTemplate caches both per URL (cheap re-clone on edits).
    // Bugstofix (2026-07-19): use the GAME's precedence (resolvePaneConfig: paneNode WINS over
    // paneMesh) so the preview can never show a pane combine the runtime would skip.
    const paneRaw = resolvePaneConfig(def)?.paneMesh;
    const paneUrl = paneRaw ? (/^(\/|https?:)/.test(paneRaw) ? paneRaw : '/' + paneRaw) : null;
    if (paneUrl) {
      Promise.all([loadMeshTemplate(url), loadMeshTemplate(paneUrl)])
        .then(([frameT, paneT]) => {
          if (seq !== previewSeq) return; // superseded by a newer show()
          const combined = new THREE.Group();
          combined.add(frameT.clone(true), paneT.clone(true));
          normalizeModelToFootprint(combined, def.footprint);
          applyMeshFit(combined, def.meshFit);
          if (current) scene.remove(current);
          current = combined;
          scene.add(current);
          const box = new THREE.Box3().setFromObject(combined);
          const ws = box.getSize(new THREE.Vector3());
          assetStatus = `${url} + pane ${paneUrl} — combined in-game size ${ws.toArray().map((v) => v.toFixed(2)).join(' × ')} m · grounded at y=0`;
          previewMessage(); framePreview();
        })
        .catch(() => { assetStatus = `Could not load frame ${url} or pane ${paneUrl} — both files should be under public/.`; previewMessage(); });
      return;
    }
    loadMeshTemplate(url)
      .then((template) => {
        if (seq !== previewSeq) return; // superseded by a newer show()
        const model = template.clone(true);
        normalizeModelToFootprint(model, def.footprint); // footprint-fit scale + center XZ + ground y=0
        applyMeshFit(model, def.meshFit); // scale / yaw / offsets — re-anchors to footprint center
        if (def.wallMounted) { // wall-mounted assets re-center vertically like the game does (after meshFit)
          const wb = new THREE.Box3().setFromObject(model);
          model.position.y -= wb.getCenter(new THREE.Vector3()).y;
        }
        if (current) scene.remove(current);
        current = model;
        scene.add(current);
        // frame the grounded model: orbit its center, keep the y=0 grid in view
        const box = new THREE.Box3().setFromObject(model);
        const worldSize = box.getSize(new THREE.Vector3());
        assetStatus = `${url} — in-game size ${worldSize.toArray().map((v) => v.toFixed(2)).join(' × ')} m · grounded at y=0`;
        if (def.category === 'door') {
          const names = nodeNames(template);
          if (names.length) assetStatus += ` · GLB nodes (for pane node name): ${names.slice(0, 12).join(', ')}${names.length > 12 ? ' …' : ''}`;
        }
        previewMessage(); framePreview();
      })
      .catch(() => { assetStatus = `Could not load ${url} — the file should be at public${url} (e.g. public/models/bed.glb → "/models/bed.glb").`; previewMessage(); });
  },
};
