<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Condo Life — Interaction Editor</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, sans-serif; background: #141a28; color: #dfe6f2; }
  header { position: sticky; top: 0; z-index: 5; display: flex; gap: 10px; align-items: center;
    padding: 10px 14px; background: #0f1420ee; backdrop-filter: blur(6px); border-bottom: 1px solid #26304a; }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  header .grow { flex: 1; }
  #search { background: #1c2436; border: 1px solid #2c3a58; color: #dfe6f2; border-radius: 8px; padding: 7px 10px; width: 200px; font-size: 13px; }
  button { border: 0; border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; background: #2c3a58; color: #dfe6f2; }
  button.primary { background: #3d6fd2; color: #fff; }
  button.danger { background: #7a3040; }
  button:disabled { opacity: .45; cursor: default; }
  #status { font-size: 12px; color: #8fa3c8; min-width: 150px; text-align: right; }
  #status.ok { color: #7fd98a; } #status.err { color: #e58a8a; }

  #layout { display: grid; grid-template-columns: 250px 1fr; height: calc(100vh - 53px); }
  #sidebar { border-right: 1px solid #26304a; overflow-y: auto; padding: 8px; }
  .action-item { display: flex; align-items: center; gap: 8px; width: 100%; text-align: left;
    background: transparent; padding: 7px 8px; border-radius: 8px; font-size: 13px; }
  .action-item:hover { background: #1c2436; }
  .action-item.active { background: rgba(90,120,190,.28); }
  .action-item .badge { margin-left: auto; font-size: 10px; color: #8fa3c8; background: #1c2436; border-radius: 999px; padding: 2px 7px; }
  #editor { overflow-y: auto; padding: 16px; display: grid; grid-template-columns: repeat(2, minmax(360px, 660px)); gap: 14px; align-items: start; }
  #editor .empty { color: #5f6f93; padding: 40px; text-align: center; }
  .card { background: #1a2133; border: 1px solid #26304a; border-radius: 12px; padding: 14px; min-width: 0; }
  .card.wide { grid-column: 1 / -1; }
  .card h2 { margin: 0 0 10px; font-size: 13px; letter-spacing: .08em; text-transform: uppercase; color: #93a3c0; }
  .frow { display: grid; grid-template-columns: 190px 1fr; gap: 10px; align-items: center; padding: 5px 0; }
  .frow label { font-size: 13px; }
  .frow input[type=number], .frow input[type=text], .frow select { width: 100%; background: #10182a; border: 1px solid #2c3a58;
    color: #dfe6f2; border-radius: 6px; padding: 6px 8px; font-size: 13px; }
  .frow input[readonly] { color: #6f7fa3; }
  .hint-line { font-size: 11px; color: #5f6f93; margin-top: 4px; }
  .hint-line.warn { color: #e0a44a; }
  .row-actions { display: flex; gap: 8px; margin-top: 8px; }
  .flow-steps { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
  .flow-step { background: #10182a; border: 1px solid #2c3a58; border-radius: 999px; padding: 7px 11px; font-size: 12px; }
  .flow-arrow { color: #6f7fa3; }
  .connection-issue { border-radius: 8px; margin-top: 8px; padding: 7px 9px; font-size: 12px; }
  .connection-issue.error { color: #ffd4d4; background: rgba(122,48,64,.38); border: 1px solid #7a3040; }
  .connection-issue.warning { color: #f4d99e; background: rgba(128,91,34,.28); border: 1px solid #805b22; }

  .cond-group { border: 1px solid #2c3a58; border-radius: 10px; padding: 8px 10px; margin: 6px 0; background: #10182a; }
  .cond-group-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .cond-group-head select { background: #1c2436; border: 1px solid #2c3a58; color: #dfe6f2; border-radius: 6px; padding: 4px 8px; font-size: 12px; }
  .cond-hint { font-size: 11px; color: #8fa3c8; }
  .cond-children { display: flex; flex-direction: column; gap: 6px; }
  .cond-child { display: flex; align-items: flex-start; gap: 8px; }
  .cond-child > *:first-child { flex: 1; }
  .cond-leaf { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; background: #1a2133; border: 1px solid #26304a;
    border-radius: 8px; padding: 6px 8px; flex: 1; }
  .cond-leaf select, .cond-leaf input { background: #10182a; border: 1px solid #2c3a58; color: #dfe6f2; border-radius: 6px; padding: 5px 7px; font-size: 12px; }
  .cond-var-select { min-width: 190px; }
  .cond-add-row { display: flex; gap: 6px; margin-top: 6px; }
  .cond-add-row button, .cond-remove { font-size: 11px; padding: 5px 9px; }
  .cond-remove { background: #7a3040; flex-shrink: 0; }
  @media (max-width: 1120px) {
    #editor { display: block; }
    .card { margin-bottom: 14px; }
  }
</style>
</head>
<body>
<header>
  <h1>🎬 Interaction Editor</h1>
  <span class="grow"></span>
  <input id="search" type="search" placeholder="Search actions…" />
  <button id="new">+ New action</button>
  <button id="save" class="primary" disabled>Save changes</button>
  <span id="status">loading…</span>
</header>
<div id="layout">
  <nav id="sidebar"></nav>
  <div id="editor"><div class="empty">Select an action</div></div>
</div>

<script src="/tools/condition-builder.js"></script>
<script>
// ------------------------------------------------------------------ state
// The Interaction Editor makes data/interactions.json (ENUM_Interations port) fully
// designer-editable: add/remove actions, per-action need/skill gains, primary need,
// animation state, autonomy eligibility, seat-awareness. Mirrors tools/assets.html's
// sidebar+editor architecture (see PROJECT_CONTEXT.md §5 "Tool architecture").
const API = '/api/data/';
const esc = (value) => String(value ?? '').replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
// ROADMAP_NEXT B2-1: simstate.json/quests.json are read-only reference data here (same role as
// assets.json/stats.json already play) — they only feed the Conditions card's var-path dropdowns
// (vars.<id> / quests.<id>.state), mirroring the Quest Editor's own condition builder exactly.
// Neither file is ever PUT by this tool.
const state = { interactions: null, assets: null, stats: null, simstate: null, quests: null, events: null, selected: null, dirty: new Set(), actionChainEngine: null };

function setActionChainEngine(engine) {
  state.actionChainEngine = engine;
  if (state.interactions && state.assets) renderAll();
}

async function load() {
  setStatus('loading…');
  try {
    const [i, a, s, simstate, quests, events] = await Promise.all([
      fetch(API + 'interactions.json').then((r) => { if (!r.ok) throw new Error('interactions.json HTTP ' + r.status); return r.json(); }),
      fetch(API + 'assets.json').then((r) => { if (!r.ok) throw new Error('assets.json HTTP ' + r.status); return r.json(); }),
      fetch(API + 'stats.json').then((r) => { if (!r.ok) throw new Error('stats.json HTTP ' + r.status); return r.json(); }),
      fetch(API + 'simstate.json').then((r) => { if (!r.ok) throw new Error('simstate.json HTTP ' + r.status); return r.json(); }),
      fetch(API + 'quests.json').then((r) => { if (!r.ok) throw new Error('quests.json HTTP ' + r.status); return r.json(); }),
      // events.json is READ-ONLY reference data here (feeds the "emits event" picker); never PUT.
      fetch(API + 'events.json').then((r) => (r.ok ? r.json() : { events: [] })).catch(() => ({ events: [] })),
    ]);
    state.interactions = i; state.assets = a; state.stats = s; state.simstate = simstate; state.quests = quests; state.events = events;
    state.dirty.clear();
    if (!state.selected && i.actions.length) state.selected = i.actions[0].id;
    renderAll();
    setStatus('loaded', 'ok');
  } catch (e) { setStatus(String(e.message || e), 'err'); }
}

async function saveAll() {
  setStatus('saving…');
  try {
    const files = { 'interactions.json': state.interactions, 'assets.json': state.assets };
    for (const f of [...state.dirty]) {
      const res = await fetch(API + f, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(files[f], null, 2),
      });
      if (!res.ok) throw new Error(`${f}: HTTP ${res.status}`);
      state.dirty.delete(f);
    }
    updateSave();
    setStatus('saved — game hot-reloads', 'ok');
  } catch (e) { setStatus(String(e.message || e), 'err'); }
}

function markDirty(file) { state.dirty.add(file); updateSave(); setStatus('unsaved changes'); if (file === 'interactions.json') refreshActionFlow(); }
function updateSave() { document.getElementById('save').disabled = state.dirty.size === 0; }
function setStatus(msg, cls = '') { const s = document.getElementById('status'); s.textContent = msg; s.className = cls; }
const selectedAction = () => state.interactions.actions.find((a) => a.id === state.selected) ?? null;

// ------------------------------------------------------------------ sidebar
function renderSidebar() {
  const nav = document.getElementById('sidebar');
  const q = document.getElementById('search').value.trim().toLowerCase();
  nav.innerHTML = '';
  const items = state.interactions.actions.filter((a) =>
    q === '' || a.name.toLowerCase().includes(q) || a.id.toLowerCase().includes(q));
  for (const act of items) {
    const b = document.createElement('button');
    b.className = 'action-item' + (act.id === state.selected ? ' active' : '');
    b.dataset.actionId = act.id;
    b.innerHTML = `<span>${act.name}</span>${act.autonomyEligible ? '' : '<span class="badge">player-only</span>'}`;
    b.addEventListener('click', () => { state.selected = act.id; renderAll(); });
    nav.appendChild(b);
  }
}

// ------------------------------------------------------------------ field factory (mirrors assets.html)
function frow(label, input) {
  const r = document.createElement('div');
  r.className = 'frow';
  const l = document.createElement('label');
  l.textContent = label;
  r.append(l, input);
  return r;
}
function numInput(get, set, path) {
  const i = document.createElement('input');
  i.type = 'number'; i.step = 'any'; i.value = get() ?? '';
  i.dataset.path = path;
  i.addEventListener('input', () => { set(i.value === '' ? undefined : Number(i.value)); markDirty('interactions.json'); });
  return i;
}
function textInput(get, set, path, opts = {}) {
  const i = document.createElement('input');
  i.type = 'text'; i.value = get() ?? '';
  i.dataset.path = path;
  if (opts.readonly) i.readOnly = true;
  if (opts.list) i.setAttribute('list', opts.list);
  i.addEventListener('input', () => { set(i.value); markDirty('interactions.json'); });
  return i;
}
function checkInput(get, set, path) {
  const i = document.createElement('input');
  i.type = 'checkbox'; i.checked = !!get();
  i.dataset.path = path;
  i.addEventListener('change', () => { set(i.checked); markDirty('interactions.json'); });
  return i;
}

// animation states in use across all actions, plus the 4 core states the game always
// recognizes (game/anim.ts BUILTIN in the Animation Mapper) — shown as a hint + datalist
// so the free-text "animation" field doesn't require guessing an existing name.
const CORE_STATES = ['idle', 'walk', 'sit', 'lie'];
function animationStatesInUse() {
  const set = new Set(CORE_STATES);
  for (const a of state.interactions.actions) {
    const v = String(a.animation || '').trim();
    if (v) set.add(v);
  }
  return [...set].sort();
}

// ------------------------------------------------------------------ condition builder
// ROADMAP_NEXT B2-1: `ActionDef.conditions?: Condition` reuses the EXACT quest condition
// tree/namespace/evaluator (game/quests.ts's `Condition`/`evaluate`) through the shared
// tools/condition-builder.js renderer, writing into `a.conditions` instead of a quest's
// `trigger`/`completion`. Empty/absent
// `conditions` = always available (sparse, checked in game/main.ts's tap-menu filter and
// game/autonomy.ts's `maybeAct`).
const { anyLeaf, stripCondition } = window.ConditionBuilder;
const conditionBuilder = window.ConditionBuilder.create({
  data: () => ({ stats: state.stats, simstate: state.simstate, quests: state.quests }),
  onStructuralChange: () => {
    const action = selectedAction();
    if (action?.conditions && !anyLeaf(action.conditions, () => true)) delete action.conditions;
    markDirty('interactions.json');
    renderEditor();
  },
  onValueChange: () => { markDirty('interactions.json'); },
});
// ROADMAP_NEXT B2-5: duration-modifier var options, scoped to needs+skills only (the only
// namespaces game/duration.ts's computeDurationSeconds resolves — funds/time/vars/quests would be
// meaningless as a duration multiplier). Deliberately separate from the shared condition
// builder's full namespace list (see the Duration card's own comment).
function appendDurationVarOptions(sel, currentValue) {
  sel.innerHTML = '';
  const groups = [
    ['Needs', state.stats.needs.map((n) => ({ value: 'needs.' + n.id, label: n.name }))],
    ['Skills', state.stats.skills.map((s) => ({ value: 'skills.' + s.id, label: s.name }))],
  ];
  const known = new Set();
  for (const [label, opts] of groups) {
    if (!opts.length) continue;
    const og = document.createElement('optgroup'); og.label = label;
    for (const o of opts) {
      const opt = document.createElement('option'); opt.value = o.value; opt.textContent = o.label;
      og.appendChild(opt); known.add(o.value);
    }
    sel.appendChild(og);
  }
  if (currentValue && !known.has(currentValue)) {
    const og = document.createElement('optgroup'); og.label = 'Unknown (stale id)';
    const opt = document.createElement('option'); opt.value = currentValue; opt.textContent = currentValue;
    og.appendChild(opt); sel.appendChild(og);
  }
  sel.value = currentValue;
}
function renderActionFlowCard(action) {
  const card = document.createElement('div');
  card.className = 'card wide'; card.dataset.actionFlow = '';
  card.innerHTML = '<h2>Action flow</h2>';
  const flow = document.createElement('div'); flow.className = 'flow-steps';
  const steps = state.actionChainEngine?.describeActionFlow?.(action, state.interactions.actions, state.assets.assets)
    ?? [`Perform ${action.name}`];
  steps.forEach((step, index) => {
    if (index) { const arrow = document.createElement('span'); arrow.className = 'flow-arrow'; arrow.textContent = '\u2192'; flow.appendChild(arrow); }
    const pill = document.createElement('span'); pill.className = 'flow-step'; pill.textContent = step; flow.appendChild(pill);
  });
  card.appendChild(flow);
  const directIssues = state.actionChainEngine?.actionConnectionIssues?.(action, state.interactions.actions, state.assets.assets) ?? [];
  const graphIssues = (state.actionChainEngine?.actionGraphIssues?.(state.interactions.actions, state.assets.assets) ?? [])
    .filter((issue) => issue.actionId === action.id);
  const issues = [...directIssues];
  for (const issue of graphIssues) {
    if (!issues.some((entry) => entry.code === issue.code && entry.assetId === issue.assetId)) issues.push(issue);
  }
  for (const issue of issues) {
    const row = document.createElement('div'); row.className = `connection-issue ${issue.level}`;
    row.dataset.connectionIssue = issue.code;
    row.textContent = `${issue.level === 'error' ? 'Error' : 'Warning'}: ${issue.message}`;
    card.appendChild(row);
  }
  if (!issues.length) {
    const ok = document.createElement('div'); ok.className = 'hint-line';
    ok.textContent = 'All linked assets and actions are connected correctly.'; card.appendChild(ok);
  }
  return card;
}

function refreshActionFlow() {
  const current = document.querySelector('[data-action-flow]');
  const action = selectedAction();
  if (current && action) current.replaceWith(renderActionFlowCard(action));
}

// ------------------------------------------------------------------ editor
function renderEditor() {
  const root = document.getElementById('editor');
  const a = selectedAction();
  root.innerHTML = '';
  if (!a) { root.innerHTML = '<div class="empty">Select an action</div>'; return; }

  const datalist = document.createElement('datalist');
  datalist.id = 'anim-states-list';
  for (const s of animationStatesInUse()) {
    const o = document.createElement('option');
    o.value = s;
    datalist.appendChild(o);
  }
  root.appendChild(datalist);

  // Read-only view of the same connections the runtime executes. It refreshes independently on
  // field edits, so inputs keep focus while graph sequencing and validation stay current.
  root.appendChild(renderActionFlowCard(a));

  // --- identity
  const card1 = document.createElement('div');
  card1.className = 'card';
  card1.innerHTML = '<h2>Action</h2>';
  card1.appendChild(frow('id (fixed — assets reference it)', textInput(() => a.id, () => {}, 'id', { readonly: true })));
  card1.appendChild(frow('name', textInput(() => a.name, (v) => { a.name = v; renderSidebar(); }, 'name')));

  const animWrap = document.createElement('div');
  const animInput = textInput(() => a.animation, (v) => { a.animation = v; }, 'animation', { list: 'anim-states-list' });
  animWrap.appendChild(animInput);
  const warn = document.createElement('div');
  warn.id = 'anim-warn';
  warn.className = 'hint-line warn';
  warn.textContent = '⚠ no animation set — sim will fall back to idle for this action';
  const updateWarn = () => { warn.style.display = animInput.value.trim() ? 'none' : ''; };
  updateWarn();
  animInput.addEventListener('input', updateWarn);
  animWrap.appendChild(warn);
  const hint = document.createElement('div');
  hint.id = 'anim-states-hint';
  hint.className = 'hint-line';
  hint.textContent = 'states in use: ' + animationStatesInUse().join(', ') + ' — feeds the Animation Mapper’s state list';
  animWrap.appendChild(hint);
  card1.appendChild(frow('animation state', animWrap));
  const pose = document.createElement('select'); pose.dataset.path = 'pose';
  pose.innerHTML = '<option value="">Automatic from animation name</option><option value="sit">Sit on seat/target</option><option value="lie">Lie on seat/target</option><option value="use">Use authored standing pose</option>';
  pose.value = a.pose ?? '';
  pose.addEventListener('change', () => {
    if (pose.value) a.pose = pose.value; else delete a.pose;
    markDirty('interactions.json');
  });
  card1.appendChild(frow('physical placement pose', pose));
  card1.insertAdjacentHTML('beforeend', '<div class="hint-line">Use an explicit pose when the animation name is semantic rather than prefixed with sit/lie—for example, Reading.</div>');
  root.appendChild(card1);

  // --- behavior
  const card2 = document.createElement('div');
  card2.className = 'card';
  card2.innerHTML = '<h2>Behavior</h2>';
  card2.appendChild(frow('autonomy eligible (sim may pick this on its own)',
    checkInput(() => a.autonomyEligible, (v) => { a.autonomyEligible = v; renderSidebar(); }, 'autonomyEligible')));
  card2.appendChild(frow('seat aware (walks to nearest seat facing the object, e.g. TV)',
    checkInput(() => !!a.seatAware, (v) => {
      if (v) a.seatAware = true;
      else { delete a.seatAware; delete a.fetchBeforeSeat; }
      renderAll();
    }, 'seatAware')));
  const seatSearch = document.createElement('select'); seatSearch.dataset.path = 'seatSearch';
  seatSearch.innerHTML = '<option value="targetFacing">Target-facing viewing seat (TV)</option><option value="nearest">Nearest seat (reading / self-contained activity)</option>';
  seatSearch.value = a.seatSearch ?? 'targetFacing'; seatSearch.disabled = !a.seatAware;
  seatSearch.addEventListener('change', () => {
    if (seatSearch.value === 'nearest') a.seatSearch = 'nearest'; else delete a.seatSearch;
    markDirty('interactions.json');
  });
  card2.appendChild(frow('seat selection', seatSearch));
  card2.appendChild(frow('fetch source before seating (two legs: visit this object first, then walk to a seat — e.g. bookshelf reading/studying)',
    checkInput(() => !!a.fetchBeforeSeat, (v) => { if (v) a.fetchBeforeSeat = true; else delete a.fetchBeforeSeat; }, 'fetchBeforeSeat')));
  card2.appendChild(frow('face target after sitting (unticking keeps the seat’s own facing instead — e.g. read_book stays facing however the sofa’s usePose points it, rather than spinning to stare at the bookshelf)',
    checkInput(() => a.faceTarget !== false, (v) => { if (v) delete a.faceTarget; else a.faceTarget = false; }, 'faceTarget')));
  card2.appendChild(frow('powers on target (starting this action switches the stateful target asset ON and leaves it on — e.g. every Watch-TV channel powers the TV)',
    checkInput(() => !!a.powersOnTarget, (v) => { if (v) a.powersOnTarget = true; else delete a.powersOnTarget; }, 'powersOnTarget')));
  card2.appendChild(frow('censor (Sims-style pixelation quad over the sim while this action runs, e.g. shower/toilet)',
    checkInput(() => !!a.censor, (v) => { if (v) a.censor = true; else delete a.censor; }, 'censor')));
  card2.appendChild(frow('cost (optional — charged from funds when the action starts)',
    numInput(() => a.cost, (v) => { if (v === undefined) delete a.cost; else a.cost = Math.max(0, v); }, 'cost')));
  card2.lastElementChild.querySelector('label').textContent = 'cost (optional — checked before ordering; charged only when the action finishes)';

  const requiredCard = document.createElement('div');
  requiredCard.className = 'card';
  requiredCard.innerHTML = '<h2>Required asset</h2><div class="hint-line">Optional presence gate around the action target. A before visit routes required asset → target; an after visit routes target → required asset.</div>';
  requiredCard.querySelector('h2').textContent = 'Extra asset requirement';
  requiredCard.querySelector('.hint-line').textContent = 'A nearby asset this action needs in addition to its target. A before visit routes requirement → target; an after visit routes target → requirement.';
  const requiredAsset = document.createElement('select'); requiredAsset.dataset.path = 'requiredAsset.assetId';
  requiredAsset.innerHTML = '<option value="">(none)</option>' + state.assets.assets
    .filter((asset) => asset.category !== 'transient')
    .map((asset) => `<option value="${esc(asset.id)}">${esc(asset.name)}</option>`).join('');
  if (a.requiredAsset?.assetId && !state.assets.assets.some((asset) => asset.id === a.requiredAsset.assetId)) {
    requiredAsset.insertAdjacentHTML('beforeend', `<option value="${esc(a.requiredAsset.assetId)}">${esc(a.requiredAsset.assetId)} (unknown)</option>`);
  }
  requiredAsset.value = a.requiredAsset?.assetId ?? '';
  requiredAsset.addEventListener('change', () => {
    if (!requiredAsset.value) delete a.requiredAsset;
    else a.requiredAsset = { ...(a.requiredAsset ?? {}), assetId: requiredAsset.value, radiusMeters: a.requiredAsset?.radiusMeters ?? 5 };
    markDirty('interactions.json'); renderAll();
  });
  requiredCard.appendChild(frow('asset required', requiredAsset));
  if (a.requiredAsset) {
    const alternatives = document.createElement('select'); alternatives.multiple = true; alternatives.size = 4;
    alternatives.dataset.path = 'requiredAsset.alternativeAssetIds';
    const acceptedAlternatives = a.requiredAsset.alternativeAssetIds ?? [];
    const selectableAlternatives = state.assets.assets.filter((asset) => asset.category !== 'transient' && asset.id !== a.requiredAsset.assetId);
    alternatives.innerHTML = selectableAlternatives
      .map((asset) => `<option value="${esc(asset.id)}"${acceptedAlternatives.includes(asset.id) ? ' selected' : ''}>${esc(asset.name)}</option>`).join('');
    for (const id of acceptedAlternatives.filter((id) => !state.assets.assets.some((asset) => asset.id === id))) {
      alternatives.insertAdjacentHTML('beforeend', `<option value="${esc(id)}" selected>${esc(id)} (unknown)</option>`);
    }
    alternatives.addEventListener('change', () => {
      if (!a.requiredAsset) return;
      const ids = [...alternatives.selectedOptions].map((option) => option.value);
      if (ids.length) a.requiredAsset.alternativeAssetIds = ids; else delete a.requiredAsset.alternativeAssetIds;
      markDirty('interactions.json');
    });
    requiredCard.appendChild(frow('also accept asset variants (Ctrl/Cmd-click)', alternatives));
    requiredCard.appendChild(frow('radius from action target (m)', numInput(
      () => a.requiredAsset?.radiusMeters,
      (value) => { if (a.requiredAsset) a.requiredAsset.radiusMeters = Math.max(0, value ?? 0); },
      'requiredAsset.radiusMeters',
    )));
    requiredCard.appendChild(frow('visit required asset before performing this action', checkInput(
      () => !!a.requiredAsset?.visitBefore,
      (value) => { if (value) a.requiredAsset.visitBefore = true; else delete a.requiredAsset.visitBefore; },
      'requiredAsset.visitBefore',
    )));
    requiredCard.appendChild(frow('visit required asset after performing this action', checkInput(
      () => !!a.requiredAsset?.visitAfter,

  cardWaste.appendChild(frow('legacy produced-waste transient', wasteSel));
  root.appendChild(cardWaste);

  // --- food override (ROADMAP item 2, meal tiers): sparse per-action override of the food transient
  // this action spawns (fridge Eat → snack, stove Cook → meal). Present fields win over the spawned
  // transient's OWN AssetDef.food block; blank fields fall back to it. The B7-2 cooking-skill scaling
  // still applies on top of whichever hungerGain this resolves to. Lets a designer author
  // cook_light_meal / cook_large_meal that spawn the same `meal` but fill different amounts, entirely
  // here — no code change. Same sparse ensure/prune convention as the duration card above. See
  // game/food.ts resolveFoodConfig.
  const cardFood = document.createElement('div');
  cardFood.className = 'card';
  cardFood.innerHTML = '<h2>Food override <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#5f6f93">(optional — overrides the spawned snack/meal transient\'s own hunger/perish; blank = use the asset default; cooking-skill scaling still applies)</span></h2>';
  const ensureFood = () => { if (!a.food) a.food = {}; return a.food; };
  const pruneFoodIfEmpty = () => { if (a.food && a.food.hungerGain === undefined && a.food.perishHours === undefined) delete a.food; };
  cardFood.appendChild(frow('hunger gain (overrides asset food.hungerGain)', numInput(
    () => a.food?.hungerGain,
    (v) => { if (v === undefined) { if (a.food) delete a.food.hungerGain; pruneFoodIfEmpty(); } else ensureFood().hungerGain = v; },
    'food.hungerGain',
  )));
  cardFood.appendChild(frow('perish hours (overrides asset food.perishHours)', numInput(
    () => a.food?.perishHours,
    (v) => { if (v === undefined) { if (a.food) delete a.food.perishHours; pruneFoodIfEmpty(); } else ensureFood().perishHours = v; },
    'food.perishHours',
  )));
  root.appendChild(cardFood);

  // --- need gains (fed from stats.json — no free-typed ids, one row per real need)
  const card3 = document.createElement('div');
  card3.className = 'card';
  card3.innerHTML = '<h2>Need gains / tick <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#5f6f93">(blank = no effect)</span></h2>';
  for (const need of state.stats.needs) {
    card3.appendChild(frow(need.name, numInput(
      () => a.needGains[need.id],
      (v) => { if (v === undefined) delete a.needGains[need.id]; else a.needGains[need.id] = v; },
      'gain.need.' + need.id,
    )));
  }
  root.appendChild(card3);

  // --- skill gains (same convention)
  const card4 = document.createElement('div');
  card4.className = 'card';
  card4.innerHTML = '<h2>Skill gains / tick</h2>';
  for (const skill of state.stats.skills) {
    const label = skill.name + (skill.enabled === false ? ' (disabled)' : '');
    card4.appendChild(frow(label, numInput(
      () => a.skillGains[skill.id],
      (v) => { if (v === undefined) delete a.skillGains[skill.id]; else a.skillGains[skill.id] = v; },
      'gain.skill.' + skill.id,
    )));
  }
  root.appendChild(card4);

  // --- conditions (ROADMAP_NEXT B2-1): sparse, same dropdown-driven recursive builder as the
  // Quest Editor's trigger/completion cards (tools/quests.html). Empty/absent = no conditions =
  // always available; the empty-group semantics are the same as quests' (an empty top-level
  // `all` is vacuously TRUE — i.e. still "always available" — so the "+ Add condition" button
  // seeds `{ all: [] }` rather than leaving the field half-defined).
  const cardCond = document.createElement('div');
  cardCond.className = 'card';
  cardCond.innerHTML = '<h2>Conditions <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#5f6f93">(optional — unmet conditions hide this action from the tap menu and skip it for autonomy)</span></h2>';
  if (!a.conditions) {
    const addCondBtn = document.createElement('button');
    addCondBtn.id = 'addConditions'; addCondBtn.textContent = '+ Add condition';
    addCondBtn.addEventListener('click', () => {
      a.conditions = { all: [] };
      markDirty('interactions.json');
      renderEditor();
    });
    cardCond.appendChild(addCondBtn);
    const hint = document.createElement('div');
    hint.className = 'hint-line';
    hint.textContent = 'No conditions — always available.';
    cardCond.appendChild(hint);
  } else {
    const condRoot = document.createElement('div');
    condRoot.dataset.condRoot = 'conditions';
    condRoot.appendChild(conditionBuilder.render(a.conditions, 'conditions'));
    cardCond.appendChild(condRoot);
    const removeAllBtn = document.createElement('button');
    removeAllBtn.className = 'danger'; removeAllBtn.id = 'removeConditions';
    removeAllBtn.textContent = 'Remove all conditions (always available)';
    removeAllBtn.style.marginTop = '8px';
    removeAllBtn.addEventListener('click', () => {
      a.conditions = stripCondition(a.conditions, () => true);
      if (!anyLeaf(a.conditions, () => true)) delete a.conditions;
      markDirty('interactions.json');
      renderEditor();
    });
    cardCond.appendChild(removeAllBtn);
  }
  root.appendChild(cardCond);

  // --- danger zone
  const card5 = document.createElement('div');
  card5.className = 'card';
  card5.innerHTML = '<h2>Actions</h2>';
  const rowA = document.createElement('div');
  rowA.className = 'row-actions';
  const del = document.createElement('button');
  del.className = 'danger';
  del.id = 'delete';
  const n = assetUsages(a.id).length;
  del.textContent = n ? `Delete (used by ${n} asset${n === 1 ? '' : 's'}!)` : 'Delete';
  del.addEventListener('click', () => removeAction(a.id));
  rowA.appendChild(del);
  card5.appendChild(rowA);
  root.appendChild(card5);
}

// ------------------------------------------------------------------ add/remove (referential integrity)
// Same policy as the Tuning Editor's need/skill add-remove (PROJECT_CONTEXT.md §2c): warn with the
// exact list of referencing assets, then on confirm strip the dangling reference so assets.json
// never ships an interaction id that no longer exists in interactions.json.
function slugify(name) {
  return name.trim().toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '');
}
function uniqueId(base, existingIds) {
  let root = base && /^[a-z]/.test(base) ? base : `a_${base || 'action'}`;
  if (!root) root = 'action';
  let candidate = root, n = 2;
  while (existingIds.includes(candidate)) candidate = `${root}_${n++}`;
  return candidate;
}

function assetUsages(actionId) {
  return state.assets.assets.filter((asset) => asset.interactions.includes(actionId)).map((asset) => asset.name);
}

function addAction() {
  const name = window.prompt('New action name (e.g. "Do Yoga"):', '');
  if (!name || !name.trim()) return;
  const id = uniqueId(slugify(name.trim()), state.interactions.actions.map((a) => a.id));
  state.interactions.actions.push({
    id,
    name: name.trim(),
    needGains: {},
    skillGains: {},
    animation: '',
    autonomyEligible: true,
    primaryNeed: null,
  });
  state.selected = id;
  markDirty('interactions.json');
  renderAll(); // rebuilds DOM — call after markDirty is fine here since sidebar/editor read state.dirty only via updateSave()
}

function removeAction(id) {
  const action = state.interactions.actions.find((a) => a.id === id);
  if (!action) return;
  const uses = assetUsages(id);
  const msg = uses.length
    ? `"${action.name}" is referenced by: ${uses.join(', ')}.\n\nDeleting it will remove this action from those assets' interaction lists. Continue?`
    : `Delete "${action.name}"? No assets reference it.`;
  if (!window.confirm(msg)) return;
  // AUDIT bugs 4-13: after the in-tool reconciliation, scan every OTHER data file and surface
  // still-dangling references in the status bar (refscan.js) instead of leaving them silent.
  window.RefScan?.warnAfterDelete(id, [id], { skipFiles: ['interactions.json', 'assets.json'] }, (w) => setStatus(w, 'err'));
  state.interactions.actions = state.interactions.actions.filter((a) => a.id !== id);
  let alsoAssets = false;
  if (uses.length) {
    for (const asset of state.assets.assets) {
      if (asset.interactions.includes(id)) {
        asset.interactions = asset.interactions.filter((x) => x !== id);
        alsoAssets = true;
      }
    }
  }
  state.selected = state.interactions.actions[0]?.id ?? null;
  markDirty('interactions.json');
  if (alsoAssets) markDirty('assets.json');
  renderAll();
}

function renderAll() { renderSidebar(); renderEditor(); }

// ------------------------------------------------------------------ boot
document.getElementById('search').addEventListener('input', renderSidebar);
document.getElementById('new').addEventListener('click', addAction);
document.getElementById('save').addEventListener('click', saveAll);
window.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveAll(); }
});
window.addEventListener('beforeunload', (e) => { if (state.dirty.size > 0) e.preventDefault(); });
// Exposed for the jsdom suite (PROJECT_CONTEXT §5: editor logic lives in a plain inline script
// reachable as window.<Tool>), so tests can assert edits reach the data, not just the DOM.
window.InteractionEditor = { state, load, saveAll, renderAll, setActionChainEngine };
load();
</script>
<script type="module">
import { actionConnectionIssues, actionGraphIssues, describeActionFlow } from '/game/actionchain.ts';
window.InteractionEditor?.setActionChainEngine({ actionConnectionIssues, actionGraphIssues, describeActionFlow });
</script>
<script src="/tools/refscan.js"></script>
<script src="/tools/nav.js"></script>
</body>
