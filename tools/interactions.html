<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Condo Life — Interaction Editor</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, sans-serif; background: #141a28; color: #dfe6f2; }
  header { position: sticky; top: 0; z-index: 5; display: flex; gap: 10px; align-items: center;
    padding: 10px 14px; background: #0f1420ee; backdrop-filter: blur(6px); border-bottom: 1px solid #26304a; }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  header .grow { flex: 1; }
  #search { background: #1c2436; border: 1px solid #2c3a58; color: #dfe6f2; border-radius: 8px; padding: 7px 10px; width: 200px; font-size: 13px; }
  button { border: 0; border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; background: #2c3a58; color: #dfe6f2; }
  button.primary { background: #3d6fd2; color: #fff; }
  button.danger { background: #7a3040; }
  button:disabled { opacity: .45; cursor: default; }
  #status { font-size: 12px; color: #8fa3c8; min-width: 150px; text-align: right; }
  #status.ok { color: #7fd98a; } #status.err { color: #e58a8a; }

  #layout { display: grid; grid-template-columns: 250px 1fr; height: calc(100vh - 53px); }
  #sidebar { border-right: 1px solid #26304a; overflow-y: auto; padding: 8px; }
  .action-item { display: flex; align-items: center; gap: 8px; width: 100%; text-align: left;
    background: transparent; padding: 7px 8px; border-radius: 8px; font-size: 13px; }
  .action-item:hover { background: #1c2436; }
  .action-item.active { background: rgba(90,120,190,.28); }
  .action-item .badge { margin-left: auto; font-size: 10px; color: #8fa3c8; background: #1c2436; border-radius: 999px; padding: 2px 7px; }
  #editor { overflow-y: auto; padding: 16px; }
  #editor .empty { color: #5f6f93; padding: 40px; text-align: center; }
  .card { background: #1a2133; border: 1px solid #26304a; border-radius: 12px; padding: 14px; margin-bottom: 14px; max-width: 660px; }
  .card h2 { margin: 0 0 10px; font-size: 13px; letter-spacing: .08em; text-transform: uppercase; color: #93a3c0; }
  .frow { display: grid; grid-template-columns: 190px 1fr; gap: 10px; align-items: center; padding: 5px 0; }
  .frow label { font-size: 13px; }
  .frow input[type=number], .frow input[type=text], .frow select { width: 100%; background: #10182a; border: 1px solid #2c3a58;
    color: #dfe6f2; border-radius: 6px; padding: 6px 8px; font-size: 13px; }
  .frow input[readonly] { color: #6f7fa3; }
  .hint-line { font-size: 11px; color: #5f6f93; margin-top: 4px; }
  .row-actions { display: flex; gap: 8px; margin-top: 8px; }

  .cond-group { border: 1px solid #2c3a58; border-radius: 10px; padding: 8px 10px; margin: 6px 0; background: #10182a; }
  .cond-group-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .cond-group-head select { background: #1c2436; border: 1px solid #2c3a58; color: #dfe6f2; border-radius: 6px; padding: 4px 8px; font-size: 12px; }
  .cond-hint { font-size: 11px; color: #8fa3c8; }
  .cond-children { display: flex; flex-direction: column; gap: 6px; }
  .cond-child { display: flex; align-items: flex-start; gap: 8px; }
  .cond-child > *:first-child { flex: 1; }
  .cond-leaf { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; background: #1a2133; border: 1px solid #26304a;
    border-radius: 8px; padding: 6px 8px; flex: 1; }
  .cond-leaf select, .cond-leaf input { background: #10182a; border: 1px solid #2c3a58; color: #dfe6f2; border-radius: 6px; padding: 5px 7px; font-size: 12px; }
  .cond-var-select { min-width: 190px; }
  .cond-add-row { display: flex; gap: 6px; margin-top: 6px; }
  .cond-add-row button, .cond-remove { font-size: 11px; padding: 5px 9px; }
  .cond-remove { background: #7a3040; flex-shrink: 0; }
</style>
</head>
<body>
<header>
  <h1>🎬 Interaction Editor</h1>
  <span class="grow"></span>
  <input id="search" type="search" placeholder="Search actions…" />
  <button id="new">+ New action</button>
  <button id="save" class="primary" disabled>Save changes</button>
  <span id="status">loading…</span>
</header>
<div id="layout">
  <nav id="sidebar"></nav>
  <div id="editor"><div class="empty">Select an action</div></div>
</div>

<script>
// ------------------------------------------------------------------ state
// The Interaction Editor makes data/interactions.json (ENUM_Interations port) fully
// designer-editable: add/remove actions, per-action need/skill gains, primary need,
// animation state, autonomy eligibility, seat-awareness. Mirrors tools/assets.html's
// sidebar+editor architecture (see PROJECT_CONTEXT.md §5 "Tool architecture").
const API = '/api/data/';
// ROADMAP_NEXT B2-1: simstate.json/quests.json are read-only reference data here (same role as
// assets.json/stats.json already play) — they only feed the Conditions card's var-path dropdowns
// (vars.<id> / quests.<id>.state), mirroring the Quest Editor's own condition builder exactly.
// Neither file is ever PUT by this tool.
const state = { interactions: null, assets: null, stats: null, simstate: null, quests: null, selected: null, dirty: new Set() };

async function load() {
  setStatus('loading…');
  try {
    const [i, a, s, simstate, quests] = await Promise.all([
      fetch(API + 'interactions.json').then((r) => { if (!r.ok) throw new Error('interactions.json HTTP ' + r.status); return r.json(); }),
      fetch(API + 'assets.json').then((r) => { if (!r.ok) throw new Error('assets.json HTTP ' + r.status); return r.json(); }),
      fetch(API + 'stats.json').then((r) => { if (!r.ok) throw new Error('stats.json HTTP ' + r.status); return r.json(); }),
      fetch(API + 'simstate.json').then((r) => { if (!r.ok) throw new Error('simstate.json HTTP ' + r.status); return r.json(); }),
      fetch(API + 'quests.json').then((r) => { if (!r.ok) throw new Error('quests.json HTTP ' + r.status); return r.json(); }),
    ]);
    state.interactions = i; state.assets = a; state.stats = s; state.simstate = simstate; state.quests = quests;
    state.dirty.clear();
    if (!state.selected && i.actions.length) state.selected = i.actions[0].id;
    renderAll();
    setStatus('loaded', 'ok');
  } catch (e) { setStatus(String(e.message || e), 'err'); }
}

async function saveAll() {
  setStatus('saving…');
  try {
    const files = { 'interactions.json': state.interactions, 'assets.json': state.assets };
    for (const f of [...state.dirty]) {
      const res = await fetch(API + f, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(files[f], null, 2),
      });
      if (!res.ok) throw new Error(`${f}: HTTP ${res.status}`);
      state.dirty.delete(f);
    }
    updateSave();
    setStatus('saved — game hot-reloads', 'ok');
  } catch (e) { setStatus(String(e.message || e), 'err'); }
}

function markDirty(file) { state.dirty.add(file); updateSave(); setStatus('unsaved changes'); }
function updateSave() { document.getElementById('save').disabled = state.dirty.size === 0; }
function setStatus(msg, cls = '') { const s = document.getElementById('status'); s.textContent = msg; s.className = cls; }
const selectedAction = () => state.interactions.actions.find((a) => a.id === state.selected) ?? null;

// ------------------------------------------------------------------ sidebar
function renderSidebar() {
  const nav = document.getElementById('sidebar');
  const q = document.getElementById('search').value.trim().toLowerCase();
  nav.innerHTML = '';
  const items = state.interactions.actions.filter((a) =>
    q === '' || a.name.toLowerCase().includes(q) || a.id.toLowerCase().includes(q));
  for (const act of items) {
    const b = document.createElement('button');
    b.className = 'action-item' + (act.id === state.selected ? ' active' : '');
    b.dataset.actionId = act.id;
    b.innerHTML = `<span>${act.name}</span>${act.autonomyEligible ? '' : '<span class="badge">player-only</span>'}`;
    b.addEventListener('click', () => { state.selected = act.id; renderAll(); });
    nav.appendChild(b);
  }
}

// ------------------------------------------------------------------ field factory (mirrors assets.html)
function frow(label, input) {
  const r = document.createElement('div');
  r.className = 'frow';
  const l = document.createElement('label');
  l.textContent = label;
  r.append(l, input);
  return r;
}
function numInput(get, set, path) {
  const i = document.createElement('input');
  i.type = 'number'; i.step = 'any'; i.value = get() ?? '';
  i.dataset.path = path;
  i.addEventListener('input', () => { set(i.value === '' ? undefined : Number(i.value)); markDirty('interactions.json'); });
  return i;
}
function textInput(get, set, path, opts = {}) {
  const i = document.createElement('input');
  i.type = 'text'; i.value = get() ?? '';
  i.dataset.path = path;
  if (opts.readonly) i.readOnly = true;
  if (opts.list) i.setAttribute('list', opts.list);
  i.addEventListener('input', () => { set(i.value); markDirty('interactions.json'); });
  return i;
}
function checkInput(get, set, path) {
  const i = document.createElement('input');
  i.type = 'checkbox'; i.checked = !!get();
  i.dataset.path = path;
  i.addEventListener('change', () => { set(i.checked); markDirty('interactions.json'); });
  return i;
}

// animation states in use across all actions, plus the 4 core states the game always
// recognizes (game/anim.ts BUILTIN in the Animation Mapper) — shown as a hint + datalist
// so the free-text "animation" field doesn't require guessing an existing name.
const CORE_STATES = ['idle', 'walk', 'sit', 'lie'];
function animationStatesInUse() {
  const set = new Set(CORE_STATES);
  for (const a of state.interactions.actions) {
    const v = String(a.animation || '').trim();
    if (v) set.add(v);
  }
  return [...set].sort();
}

// ------------------------------------------------------------------ condition builder
// ROADMAP_NEXT B2-1: `ActionDef.conditions?: Condition` reuses the EXACT quest condition
// tree/namespace/evaluator (game/quests.ts's `Condition`/`evaluate`) — this builder is adapted
// verbatim from tools/quests.html's condition builder (same helpers, same markup/behavior),
// just writing into `a.conditions` instead of a quest's `trigger`/`completion`. Empty/absent
// `conditions` = always available (sparse, checked in game/main.ts's tap-menu filter and
// game/autonomy.ts's `maybeAct`).
function isLeafCond(c) { return c != null && typeof c === 'object' && !('all' in c) && !('any' in c); }
function getLeafOp(leaf) { for (const op of ['gte', 'lte', 'eq', 'neq']) if (op in leaf) return op; return null; }
function describeVarPath(path) {
  if (path === 'funds' || path === 'time.hour' || path === 'time.day') return { kind: 'number' };
  if (path.startsWith('needs.') || path.startsWith('skills.')) return { kind: 'number' };
  if (path.startsWith('vars.')) {
    const v = state.simstate.variables.find((x) => x.id === path.slice(5));
    return { kind: 'var', varType: v ? v.type : 'string' };
  }
  const m = /^quests\.(.+)\.state$/.exec(path);
  if (m) return { kind: 'queststate', questId: m[1] };
  return { kind: 'unknown' };
}
function defaultVarPath() {
  if (state.stats.needs.length) return 'needs.' + state.stats.needs[0].id;
  return 'funds';
}
function defaultValueFor(path, op, oldVal) {
  const info = describeVarPath(path);
  if (op === 'gte' || op === 'lte') return typeof oldVal === 'number' ? oldVal : 0;
  if (info.kind === 'queststate') return ['locked', 'active', 'done'].includes(oldVal) ? oldVal : 'locked';
  if (info.kind === 'var') {
    if (info.varType === 'boolean') return typeof oldVal === 'boolean' ? oldVal : false;
    if (info.varType === 'number') return typeof oldVal === 'number' ? oldVal : 0;
    return typeof oldVal === 'string' ? oldVal : '';
  }
  return typeof oldVal === 'number' ? oldVal : 0;
}
function resetLeafOperatorAndValue(leaf, op) {
  const oldOp = getLeafOp(leaf);
  const oldVal = oldOp ? leaf[oldOp] : undefined;
  delete leaf.gte; delete leaf.lte; delete leaf.eq; delete leaf.neq;
  leaf[op] = defaultValueFor(leaf.var, op, oldVal);
}
function appendVarOptions(sel, currentValue) {
  sel.innerHTML = '';
  const groups = [
    ['Needs', state.stats.needs.map((n) => ({ value: 'needs.' + n.id, label: n.name }))],
    ['Skills', state.stats.skills.map((s) => ({ value: 'skills.' + s.id, label: s.name }))],
    ['Economy', [{ value: 'funds', label: 'Funds' }]],
    ['Time', [{ value: 'time.hour', label: 'Hour of day' }, { value: 'time.day', label: 'Day' }]],
    ['Variables', state.simstate.variables.map((v) => ({ value: 'vars.' + v.id, label: v.name }))],
    ['Quests', state.quests.quests.map((q) => ({ value: 'quests.' + q.id + '.state', label: q.name + ' (state)' }))],
  ];
  const known = new Set();
  for (const [label, opts] of groups) {
    if (!opts.length) continue;
    const og = document.createElement('optgroup'); og.label = label;
    for (const o of opts) {
      const opt = document.createElement('option'); opt.value = o.value; opt.textContent = o.label;
      og.appendChild(opt); known.add(o.value);
    }
    sel.appendChild(og);
  }
  if (currentValue && !known.has(currentValue)) {
    const og = document.createElement('optgroup'); og.label = 'Unknown (stale id)';
    const opt = document.createElement('option'); opt.value = currentValue; opt.textContent = currentValue;
    og.appendChild(opt); sel.appendChild(og);
  }
  sel.value = currentValue;
}
function valueInputFor(path, value, onChange, condPath) {
  const info = describeVarPath(path);
  let input;
  if (info.kind === 'queststate') {
    input = document.createElement('select');
    for (const s of ['locked', 'active', 'done']) { const o = document.createElement('option'); o.value = s; o.textContent = s; input.appendChild(o); }
    input.value = ['locked', 'active', 'done'].includes(value) ? value : 'locked';
    input.addEventListener('change', () => onChange(input.value));
  } else if (info.kind === 'var' && info.varType === 'boolean') {
    input = document.createElement('select');
    for (const b of ['true', 'false']) { const o = document.createElement('option'); o.value = b; o.textContent = b; input.appendChild(o); }
    input.value = String(!!value);
    input.addEventListener('change', () => onChange(input.value === 'true'));
  } else if (info.kind === 'number' || (info.kind === 'var' && info.varType === 'number')) {
    input = document.createElement('input'); input.type = 'number'; input.step = 'any';
    input.value = value === undefined || value === null ? '' : value;
    input.addEventListener('input', () => onChange(input.value === '' ? 0 : Number(input.value)));
  } else {
    input = document.createElement('input'); input.type = 'text';
    input.value = value === undefined || value === null ? '' : value;
    input.addEventListener('input', () => onChange(input.value));
  }
  input.dataset.role = 'value';
  input.dataset.condPath = condPath;
  return input;
}
function renderConditionNode(node, path) {
  return isLeafCond(node) ? renderLeafRow(node, path) : renderGroupBox(node, path);
}
function renderGroupBox(node, path) {
  const key = 'all' in node ? 'all' : 'any';
  const box = document.createElement('div');
  box.className = 'cond-group';
  box.dataset.condPath = path;

  const head = document.createElement('div');
  head.className = 'cond-group-head';
  const sel = document.createElement('select');
  sel.dataset.role = 'combinator'; sel.dataset.condPath = path;
  for (const opt of ['all', 'any']) { const o = document.createElement('option'); o.value = opt; o.textContent = opt.toUpperCase(); sel.appendChild(o); }
  sel.value = key;
  sel.addEventListener('change', () => {
    const arr = node[key];
    delete node.all; delete node.any;
    node[sel.value] = arr;
    markDirty('interactions.json');
    renderEditor();
  });
  head.appendChild(sel);
  const hint = document.createElement('span');
  hint.className = 'cond-hint';
  hint.textContent = key === 'all' ? '(every child must hold; empty = vacuously TRUE)' : '(any child must hold; empty = FALSE — nothing to satisfy)';
  head.appendChild(hint);
  box.appendChild(head);

  const children = document.createElement('div');
  children.className = 'cond-children';
  node[key].forEach((child, i) => {
    const childPath = path + '.' + i;
    const wrap = document.createElement('div');
    wrap.className = 'cond-child';
    wrap.appendChild(renderConditionNode(child, childPath));
    const rm = document.createElement('button');
    rm.className = 'cond-remove'; rm.textContent = '× remove';
    rm.dataset.action = 'remove-cond'; rm.dataset.condPath = childPath;
    rm.addEventListener('click', () => {
      node[key].splice(i, 1);
      markDirty('interactions.json');
      renderEditor();
    });
    wrap.appendChild(rm);
    children.appendChild(wrap);
  });
  box.appendChild(children);

  const addRow = document.createElement('div');
  addRow.className = 'cond-add-row';
  const addLeaf = document.createElement('button');
  addLeaf.textContent = '+ Condition'; addLeaf.dataset.action = 'add-leaf'; addLeaf.dataset.condPath = path;
  addLeaf.addEventListener('click', () => {
    node[key].push({ var: defaultVarPath(), gte: 0 });
    markDirty('interactions.json');
    renderEditor();
  });
  const addGroup = document.createElement('button');
  addGroup.textContent = '+ Group'; addGroup.dataset.action = 'add-group'; addGroup.dataset.condPath = path;
  addGroup.addEventListener('click', () => {
    node[key].push({ all: [] });
    markDirty('interactions.json');
    renderEditor();
  });
  addRow.append(addLeaf, addGroup);
  box.appendChild(addRow);
  return box;
}
function renderLeafRow(leaf, path) {
  const row = document.createElement('div');
  row.className = 'cond-leaf';
  row.dataset.condPath = path;

  const varSel = document.createElement('select');
  varSel.className = 'cond-var-select';
  varSel.dataset.role = 'var'; varSel.dataset.condPath = path;
  appendVarOptions(varSel, leaf.var);
  varSel.addEventListener('change', () => {
    const op = getLeafOp(leaf) || 'gte';
    leaf.var = varSel.value;
    resetLeafOperatorAndValue(leaf, op);
    markDirty('interactions.json');
    renderEditor();
  });
  row.appendChild(varSel);

  const opSel = document.createElement('select');
  opSel.dataset.role = 'op'; opSel.dataset.condPath = path;
  for (const op of ['gte', 'lte', 'eq', 'neq']) { const o = document.createElement('option'); o.value = op; o.textContent = op; opSel.appendChild(o); }
  const currentOp = getLeafOp(leaf) || 'gte';
  opSel.value = currentOp;
  opSel.addEventListener('change', () => {
    resetLeafOperatorAndValue(leaf, opSel.value);
    markDirty('interactions.json');
    renderEditor();
  });
  row.appendChild(opSel);

  const valueWrap = document.createElement('div');
  valueWrap.appendChild(valueInputFor(leaf.var, leaf[currentOp], (v) => { leaf[currentOp] = v; markDirty('interactions.json'); }, path));
  row.appendChild(valueWrap);

  // The remove button for this leaf is rendered by the parent group (renderGroupBox), which
  // knows the leaf's index in the combinator array and can splice it out.
  return row;
}

// ------------------------------------------------------------------ editor
function renderEditor() {
  const root = document.getElementById('editor');
  const a = selectedAction();
  root.innerHTML = '';
  if (!a) { root.innerHTML = '<div class="empty">Select an action</div>'; return; }

  const datalist = document.createElement('datalist');
  datalist.id = 'anim-states-list';
  for (const s of animationStatesInUse()) {
    const o = document.createElement('option');
    o.value = s;
    datalist.appendChild(o);
  }
  root.appendChild(datalist);

  // --- identity
  const card1 = document.createElement('div');
  card1.className = 'card';
  card1.innerHTML = '<h2>Action</h2>';
  card1.appendChild(frow('id (fixed — assets reference it)', textInput(() => a.id, () => {}, 'id', { readonly: true })));
  card1.appendChild(frow('name', textInput(() => a.name, (v) => { a.name = v; renderSidebar(); }, 'name')));

  const animWrap = document.createElement('div');
  animWrap.appendChild(textInput(() => a.animation, (v) => { a.animation = v; }, 'animation', { list: 'anim-states-list' }));
  const hint = document.createElement('div');
  hint.className = 'hint-line';
  hint.textContent = 'states in use: ' + animationStatesInUse().join(', ') + ' — feeds the Animation Mapper’s state list';
  animWrap.appendChild(hint);
  card1.appendChild(frow('animation state', animWrap));
  root.appendChild(card1);

  // --- behavior
  const card2 = document.createElement('div');
  card2.className = 'card';
  card2.innerHTML = '<h2>Behavior</h2>';
  card2.appendChild(frow('autonomy eligible (sim may pick this on its own)',
    checkInput(() => a.autonomyEligible, (v) => { a.autonomyEligible = v; renderSidebar(); }, 'autonomyEligible')));
  card2.appendChild(frow('seat aware (walks to nearest seat facing the object, e.g. TV)',
    checkInput(() => !!a.seatAware, (v) => { if (v) a.seatAware = true; else delete a.seatAware; }, 'seatAware')));

  const needSel = document.createElement('select');
  needSel.dataset.path = 'primaryNeed';
  const noneOpt = document.createElement('option'); noneOpt.value = ''; noneOpt.textContent = '(none)';
  needSel.appendChild(noneOpt);
  for (const n of state.stats.needs) {
    const o = document.createElement('option'); o.value = n.id; o.textContent = n.name;
    needSel.appendChild(o);
  }
  needSel.value = a.primaryNeed ?? '';
  needSel.addEventListener('change', () => { a.primaryNeed = needSel.value || null; markDirty('interactions.json'); });
  card2.appendChild(frow('primary need (auto-stop threshold target)', needSel));
  root.appendChild(card2);

  // --- sound (ROADMAP_NEXT item 7): loops for as long as the sim is performing THIS action,
  // regardless of which asset it targets — a target asset's own `sound` (Asset Editor) wins if
  // both are set. See game/audio.ts's module doc comment for the exact precedence rule.
  const cardSound = document.createElement('div');
  cardSound.className = 'card';
  cardSound.innerHTML = '<h2>Sound <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#5f6f93">(optional — loops while this action runs; the target asset\'s own sound field wins if set)</span></h2>';
  const soundInput = textInput(() => a.sound, (v) => { if (v) a.sound = v; else delete a.sound; }, 'sound');
  soundInput.placeholder = '/sounds/action_beep.wav';
  cardSound.appendChild(frow('loop sound path', soundInput));
  root.appendChild(cardSound);

  // --- duration (ROADMAP_NEXT item 5, §7.11): sparse, mirrors the seatAware/usePose convention —
  // the whole `duration` object is absent when no field has been touched, and skillVar/atMaxSeconds
  // only mean anything together (a base-only duration is a fixed timer with no skill influence).
  const card2b = document.createElement('div');
  card2b.className = 'card';
  card2b.innerHTML = '<h2>Duration <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#5f6f93">(optional — auto-completes after this many sim-time seconds, in addition to primary-need/cancel)</span></h2>';
  const ensureDuration = () => { if (!a.duration) a.duration = { baseSeconds: 30 }; return a.duration; };
  const pruneDurationIfEmpty = () => { if (a.duration && a.duration.baseSeconds === undefined) delete a.duration; };

  const baseInput = numInput(
    () => a.duration?.baseSeconds,
    (v) => {
      if (v === undefined) { if (a.duration) delete a.duration.baseSeconds; pruneDurationIfEmpty(); }
      else ensureDuration().baseSeconds = v;
    },
    'duration.baseSeconds',
  );
  card2b.appendChild(frow('base seconds (skill at 0, or fixed if no skill below)', baseInput));

  const skillSel = document.createElement('select');
  skillSel.dataset.path = 'duration.skillVar';
  const noSkillOpt = document.createElement('option'); noSkillOpt.value = ''; noSkillOpt.textContent = '(none — fixed duration)';
  skillSel.appendChild(noSkillOpt);
  for (const skill of state.stats.skills) {
    const o = document.createElement('option'); o.value = 'skills.' + skill.id; o.textContent = skill.name;
    skillSel.appendChild(o);
  }
  skillSel.value = a.duration?.skillVar ?? '';
  skillSel.addEventListener('change', () => {
    if (!skillSel.value) { if (a.duration) delete a.duration.skillVar; pruneDurationIfEmpty(); }
    else ensureDuration().skillVar = skillSel.value;
    markDirty('interactions.json');
  });
  card2b.appendChild(frow('driven by skill', skillSel));

  const atMaxInput = numInput(
    () => a.duration?.atMaxSeconds,
    (v) => {
      if (v === undefined) { if (a.duration) delete a.duration.atMaxSeconds; pruneDurationIfEmpty(); }
      else ensureDuration().atMaxSeconds = v;
    },
    'duration.atMaxSeconds',
  );
  card2b.appendChild(frow('seconds at max skill (blank = ignore skill, fixed base)', atMaxInput));
  root.appendChild(card2b);

  // --- waste (ROADMAP_NEXT item 10): sparse — a transient-asset dropdown fed from assets.json's
  // transient-category assets (never free-typed, same rule as every other id-referencing dropdown
  // in this tool), + "(none)". See game/garbage.ts's module doc comment for the full decision flow.
  const cardWaste = document.createElement('div');
  cardWaste.className = 'card';
  cardWaste.innerHTML = '<h2>Waste <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#5f6f93">(optional — spawns this transient asset on stop, unless auto-tidied into a nearby garbage can)</span></h2>';
  const wasteSel = document.createElement('select');
  wasteSel.dataset.path = 'producesWaste';
  const noWasteOpt = document.createElement('option'); noWasteOpt.value = ''; noWasteOpt.textContent = '(none)';
  wasteSel.appendChild(noWasteOpt);
  for (const asset of state.assets.assets.filter((x) => x.category === 'transient')) {
    const o = document.createElement('option'); o.value = asset.id; o.textContent = asset.name;
    wasteSel.appendChild(o);
  }
  wasteSel.value = a.producesWaste ?? '';
  wasteSel.addEventListener('change', () => {
    if (!wasteSel.value) delete a.producesWaste; else a.producesWaste = wasteSel.value;
    markDirty('interactions.json');
  });
  cardWaste.appendChild(frow('produces waste (transient asset)', wasteSel));
  root.appendChild(cardWaste);

  // --- need gains (fed from stats.json — no free-typed ids, one row per real need)
  const card3 = document.createElement('div');
  card3.className = 'card';
  card3.innerHTML = '<h2>Need gains / tick <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#5f6f93">(blank = no effect)</span></h2>';
  for (const need of state.stats.needs) {
    card3.appendChild(frow(need.name, numInput(
      () => a.needGains[need.id],
      (v) => { if (v === undefined) delete a.needGains[need.id]; else a.needGains[need.id] = v; },
      'gain.need.' + need.id,
    )));
  }
  root.appendChild(card3);

  // --- skill gains (same convention)
  const card4 = document.createElement('div');
  card4.className = 'card';
  card4.innerHTML = '<h2>Skill gains / tick</h2>';
  for (const skill of state.stats.skills) {
    const label = skill.name + (skill.enabled === false ? ' (disabled)' : '');
    card4.appendChild(frow(label, numInput(
      () => a.skillGains[skill.id],
      (v) => { if (v === undefined) delete a.skillGains[skill.id]; else a.skillGains[skill.id] = v; },
      'gain.skill.' + skill.id,
    )));
  }
  root.appendChild(card4);

  // --- conditions (ROADMAP_NEXT B2-1): sparse, same dropdown-driven recursive builder as the
  // Quest Editor's trigger/completion cards (tools/quests.html). Empty/absent = no conditions =
  // always available; the empty-group semantics are the same as quests' (an empty top-level
  // `all` is vacuously TRUE — i.e. still "always available" — so the "+ Add condition" button
  // seeds `{ all: [] }` rather than leaving the field half-defined).
  const cardCond = document.createElement('div');
  cardCond.className = 'card';
  cardCond.innerHTML = '<h2>Conditions <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#5f6f93">(optional — unmet conditions hide this action from the tap menu and skip it for autonomy)</span></h2>';
  if (!a.conditions) {
    const addCondBtn = document.createElement('button');
    addCondBtn.id = 'addConditions'; addCondBtn.textContent = '+ Add condition';
    addCondBtn.addEventListener('click', () => {
      a.conditions = { all: [] };
      markDirty('interactions.json');
      renderEditor();
    });
    cardCond.appendChild(addCondBtn);
    const hint = document.createElement('div');
    hint.className = 'hint-line';
    hint.textContent = 'No conditions — always available.';
    cardCond.appendChild(hint);
  } else {
    const condRoot = document.createElement('div');
    condRoot.dataset.condRoot = 'conditions';
    condRoot.appendChild(renderConditionNode(a.conditions, 'conditions'));
    cardCond.appendChild(condRoot);
    const removeAllBtn = document.createElement('button');
    removeAllBtn.className = 'danger'; removeAllBtn.id = 'removeConditions';
    removeAllBtn.textContent = 'Remove all conditions (always available)';
    removeAllBtn.style.marginTop = '8px';
    removeAllBtn.addEventListener('click', () => {
      delete a.conditions;
      markDirty('interactions.json');
      renderEditor();
    });
    cardCond.appendChild(removeAllBtn);
  }
  root.appendChild(cardCond);

  // --- danger zone
  const card5 = document.createElement('div');
  card5.className = 'card';
  card5.innerHTML = '<h2>Actions</h2>';
  const rowA = document.createElement('div');
  rowA.className = 'row-actions';
  const del = document.createElement('button');
  del.className = 'danger';
  del.id = 'delete';
  const n = assetUsages(a.id).length;
  del.textContent = n ? `Delete (used by ${n} asset${n === 1 ? '' : 's'}!)` : 'Delete';
  del.addEventListener('click', () => removeAction(a.id));
  rowA.appendChild(del);
  card5.appendChild(rowA);
  root.appendChild(card5);
}

// ------------------------------------------------------------------ add/remove (referential integrity)
// Same policy as the Tuning Editor's need/skill add-remove (PROJECT_CONTEXT.md §2c): warn with the
// exact list of referencing assets, then on confirm strip the dangling reference so assets.json
// never ships an interaction id that no longer exists in interactions.json.
function slugify(name) {
  return name.trim().toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '');
}
function uniqueId(base, existingIds) {
  let root = base && /^[a-z]/.test(base) ? base : `a_${base || 'action'}`;
  if (!root) root = 'action';
  let candidate = root, n = 2;
  while (existingIds.includes(candidate)) candidate = `${root}_${n++}`;
  return candidate;
}

function assetUsages(actionId) {
  return state.assets.assets.filter((asset) => asset.interactions.includes(actionId)).map((asset) => asset.name);
}

function addAction() {
  const name = window.prompt('New action name (e.g. "Do Yoga"):', '');
  if (!name || !name.trim()) return;
  const id = uniqueId(slugify(name.trim()), state.interactions.actions.map((a) => a.id));
  state.interactions.actions.push({
    id,
    name: name.trim(),
    needGains: {},
    skillGains: {},
    animation: '',
    autonomyEligible: true,
    primaryNeed: null,
  });
  state.selected = id;
  markDirty('interactions.json');
  renderAll(); // rebuilds DOM — call after markDirty is fine here since sidebar/editor read state.dirty only via updateSave()
}

function removeAction(id) {
  const action = state.interactions.actions.find((a) => a.id === id);
  if (!action) return;
  const uses = assetUsages(id);
  const msg = uses.length
    ? `"${action.name}" is referenced by: ${uses.join(', ')}.\n\nDeleting it will remove this action from those assets' interaction lists. Continue?`
    : `Delete "${action.name}"? No assets reference it.`;
  if (!window.confirm(msg)) return;
  state.interactions.actions = state.interactions.actions.filter((a) => a.id !== id);
  let alsoAssets = false;
  if (uses.length) {
    for (const asset of state.assets.assets) {
      if (asset.interactions.includes(id)) {
        asset.interactions = asset.interactions.filter((x) => x !== id);
        alsoAssets = true;
      }
    }
  }
  state.selected = state.interactions.actions[0]?.id ?? null;
  markDirty('interactions.json');
  if (alsoAssets) markDirty('assets.json');
  renderAll();
}

function renderAll() { renderSidebar(); renderEditor(); }

// ------------------------------------------------------------------ boot
document.getElementById('search').addEventListener('input', renderSidebar);
document.getElementById('new').addEventListener('click', addAction);
document.getElementById('save').addEventListener('click', saveAll);
window.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveAll(); }
});
window.addEventListener('beforeunload', (e) => { if (state.dirty.size > 0) e.preventDefault(); });
load();
</script>
<script src="/tools/nav.js"></script>
</body>
