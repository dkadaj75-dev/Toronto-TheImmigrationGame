<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Condo Life — Quest Editor</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, sans-serif; background: #141a28; color: #dfe6f2; }
  header { position: sticky; top: 0; z-index: 5; display: flex; gap: 10px; align-items: center;
    padding: 10px 14px; background: #0f1420ee; backdrop-filter: blur(6px); border-bottom: 1px solid #26304a; }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  header .grow { flex: 1; }
  #questSearch { background: #1c2436; border: 1px solid #2c3a58; color: #dfe6f2; border-radius: 8px; padding: 7px 10px; width: 200px; font-size: 13px; }
  button { border: 0; border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; background: #2c3a58; color: #dfe6f2; }
  button.primary { background: #3d6fd2; color: #fff; }
  button.danger { background: #7a3040; }
  button:disabled { opacity: .45; cursor: default; }
  #status { font-size: 12px; color: #8fa3c8; min-width: 150px; text-align: right; }
  #status.ok { color: #7fd98a; } #status.err { color: #e58a8a; }

  main { max-width: 1100px; margin: 0 auto; padding: 14px; }
  section { background: #1a2133; border: 1px solid #26304a; border-radius: 12px; margin: 14px 0; overflow: hidden; }
  section > h2 { margin: 0; padding: 10px 14px; font-size: 13px; letter-spacing: .08em; text-transform: uppercase;
    color: #93a3c0; background: #1f2740; display: flex; align-items: center; gap: 8px; }
  .toolbar { padding: 10px 14px; display: flex; gap: 8px; }

  .var-row { display: flex; gap: 10px; align-items: center; padding: 10px 14px; border-bottom: 1px solid #212b44; flex-wrap: wrap; }
  .var-row:last-child { border-bottom: 0; }
  .var-row .frow { padding: 0; }
  .default-value-wrap { display: flex; align-items: center; gap: 6px; }
  .default-value-wrap span { font-size: 11px; color: #8fa3c8; }

  .frow { display: grid; grid-template-columns: 190px 1fr; gap: 10px; align-items: center; padding: 5px 0; }
  .frow label { font-size: 13px; }
  .frow input[type=number], .frow input[type=text], .frow select, .frow textarea { width: 100%; background: #10182a; border: 1px solid #2c3a58;
    color: #dfe6f2; border-radius: 6px; padding: 6px 8px; font-size: 13px; font-family: inherit; }
  .frow input[readonly] { color: #6f7fa3; }
  .hint-line { font-size: 11px; color: #5f6f93; margin-top: 4px; }

  .quests-layout { display: grid; grid-template-columns: 220px 1fr; min-height: 300px; }
  #questSidebar { border-right: 1px solid #26304a; overflow-y: auto; padding: 8px; }
  .quest-item { display: flex; align-items: center; gap: 8px; width: 100%; text-align: left;
    background: transparent; padding: 7px 8px; border-radius: 8px; font-size: 13px; }
  .quest-item:hover { background: #1c2436; }
  .quest-item.active { background: rgba(90,120,190,.28); }
  .quest-item .badge { margin-left: auto; font-size: 10px; color: #8fa3c8; background: #1c2436; border-radius: 999px; padding: 2px 7px; }
  #questEditor { overflow-y: auto; padding: 16px; }
  #questEditor .empty { color: #5f6f93; padding: 40px; text-align: center; }
  .card { background: #141b2c; border: 1px solid #26304a; border-radius: 12px; padding: 14px; margin-bottom: 14px; }
  .card h2 { margin: 0 0 10px; font-size: 13px; letter-spacing: .08em; text-transform: uppercase; color: #93a3c0; background: none; padding: 0; }

  .cond-group { border: 1px solid #2c3a58; border-radius: 10px; padding: 8px 10px; margin: 6px 0; background: #10182a; }
  .cond-group-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .cond-group-head select { background: #1c2436; border: 1px solid #2c3a58; color: #dfe6f2; border-radius: 6px; padding: 4px 8px; font-size: 12px; }
  .cond-hint { font-size: 11px; color: #8fa3c8; }
  .cond-children { display: flex; flex-direction: column; gap: 6px; }
  .cond-child { display: flex; align-items: flex-start; gap: 8px; }
  .cond-child > *:first-child { flex: 1; }
  .cond-leaf { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; background: #1a2133; border: 1px solid #26304a;
    border-radius: 8px; padding: 6px 8px; flex: 1; }
  .cond-leaf select, .cond-leaf input { background: #10182a; border: 1px solid #2c3a58; color: #dfe6f2; border-radius: 6px; padding: 5px 7px; font-size: 12px; }
  .cond-var-select { min-width: 190px; }
  .cond-add-row { display: flex; gap: 6px; margin-top: 6px; }
  .cond-add-row button, .cond-remove { font-size: 11px; padding: 5px 9px; }
  .cond-remove { background: #7a3040; flex-shrink: 0; }

  .reward-row { display: flex; gap: 8px; align-items: center; padding: 6px 0; border-bottom: 1px solid #212b44; flex-wrap: wrap; }
  .reward-row:last-child { border-bottom: 0; }
  .reward-fields { display: flex; gap: 8px; flex: 1; flex-wrap: wrap; }
  .reward-fields select, .reward-fields input { background: #10182a; border: 1px solid #2c3a58; color: #dfe6f2; border-radius: 6px; padding: 6px 8px; font-size: 13px; }

  #validationList { list-style: none; margin: 0; padding: 6px 14px 14px; }
  #validationList li { font-size: 12px; color: #e0b05f; padding: 4px 0; border-bottom: 1px solid #212b44; }
  #validationList li:last-child { border-bottom: 0; }
  #validationList:empty::before { content: 'No issues found.'; color: #5f6f93; font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1>🗒 Quest Editor</h1>
  <span class="grow"></span>
  <input id="questSearch" type="search" placeholder="Search quests…" />
  <button id="newQuest">+ New quest</button>
  <button id="save" class="primary" disabled>Save changes</button>
  <span id="status">loading…</span>
</header>
<main>
  <section id="variablesSection" data-file="simstate.json">
    <h2>Variables <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#6f7fa3">data/simstate.json — readable as vars.&lt;id&gt; in conditions, writable by setVar rewards</span></h2>
    <div class="toolbar">
      <button id="addVariable">+ Add variable</button>
    </div>
    <div id="variablesList"></div>
  </section>

  <section id="questsSection" data-file="quests.json">
    <h2>Quests</h2>
    <div class="quests-layout">
      <nav id="questSidebar"></nav>
      <div id="questEditor"><div class="empty">Select a quest</div></div>
    </div>
  </section>

  <section id="validationSection">
    <h2 id="validationHeader">Validation</h2>
    <ul id="validationList"></ul>
  </section>
</main>

<script src="/tools/condition-builder.js"></script>
<script>
// ------------------------------------------------------------------ state
// Quest Editor: CRUD data/simstate.json (designer variables) and data/quests.json (quests +
// nested condition trees + rewards). Mirrors tools/interactions.html's sidebar+editor
// architecture for the Quests section (PROJECT_CONTEXT.md §5 "Tool architecture") and
// tools/tuning.html's toolbar+list pattern for the Variables section (§2c precedent).
// stats.json (needs/skills), assets.json (unlockAsset targets), visas.json (grantVisa targets),
// and events.json (event reward targets)
// are read-only reference data here — fed into dropdowns, never PUT by this tool.
const API = '/api/data/';
const state = { simstate: null, quests: null, stats: null, assets: null, visas: null, npcs: null, events: null, selectedQuest: null, dirty: new Set() };

async function fetchJson(name) {
  const res = await fetch(API + name);
  if (!res.ok) throw new Error(`${name}: HTTP ${res.status}`);
  return res.json();
}

async function load() {
  setStatus('loading…');
  try {
    const [simstate, quests, stats, assets, visas, npcs, events] = await Promise.all([
      fetchJson('simstate.json'), fetchJson('quests.json'), fetchJson('stats.json'), fetchJson('assets.json'), fetchJson('visas.json'), fetchJson('npcs.json'), fetchJson('events.json'),
    ]);
    state.simstate = simstate; state.quests = quests; state.stats = stats; state.assets = assets; state.visas = visas; state.npcs = npcs; state.events = events;
    state.dirty.clear();
    if (!state.selectedQuest && quests.quests.length) state.selectedQuest = quests.quests[0].id;
    renderAll();
    setStatus('loaded', 'ok');
  } catch (e) { setStatus(String(e.message || e), 'err'); }
}

async function saveAll() {
  setStatus('saving…');
  try {
    const files = { 'simstate.json': state.simstate, 'quests.json': state.quests };
    for (const f of [...state.dirty]) {
      const res = await fetch(API + f, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(files[f], null, 2),
      });
      if (!res.ok) throw new Error(`${f}: HTTP ${res.status}`);
      state.dirty.delete(f);
    }
    updateSave();
    setStatus('saved — game hot-reloads', 'ok');
  } catch (e) { setStatus(String(e.message || e), 'err'); }
}

function markDirty(file) { state.dirty.add(file); updateSave(); setStatus('unsaved changes'); }
function updateSave() { document.getElementById('save').disabled = state.dirty.size === 0; }
function setStatus(msg, cls = '') { const s = document.getElementById('status'); s.textContent = msg; s.className = cls; }
const selectedQuestObj = () => state.quests.quests.find((q) => q.id === state.selectedQuest) ?? null;

// ------------------------------------------------------------------ shared helpers
function slugify(name) { return name.trim().toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, ''); }
function uniqueId(base, existingIds, fallback) {
  let root = base && /^[a-z]/.test(base) ? base : `${fallback}_${base || fallback}`;
  if (!root) root = fallback;
  let candidate = root, n = 2;
  while (existingIds.includes(candidate)) candidate = `${root}_${n++}`;
  return candidate;
}
function frow(label, input) {
  const r = document.createElement('div'); r.className = 'frow';
  const l = document.createElement('label'); l.textContent = label;
  r.append(l, input);
  return r;
}
function textInput(get, set, path, opts = {}) {
  const i = document.createElement('input');
  i.type = 'text'; i.value = get() ?? '';
  i.dataset.path = path;
  if (opts.readonly) i.readOnly = true;
  i.addEventListener('input', () => { set(i.value); if (opts.file) markDirty(opts.file); });
  return i;
}
function checkInput(get, set, path, opts = {}) {
  const i = document.createElement('input');
  i.type = 'checkbox'; i.checked = !!get();
  i.dataset.path = path;
  i.addEventListener('change', () => { set(i.checked); if (opts.file) markDirty(opts.file); });
  return i;
}

// ROADMAP_APT R1: the condition-tree helpers + builder now live in the SHARED
// tools/condition-builder.js (window.ConditionBuilder), reused verbatim by the Map Editor Rental
// availability card. These aliases keep the Quest Editor referential-integrity code
// (anyLeaf/stripCondition on quest+var deletion) and validation (isLeafCond/getLeafOp) reading
// exactly as before; condBuilder.render(node, path) draws the same DOM the inline builder did.
const { isLeafCond, getLeafOp, anyLeaf, stripCondition } = window.ConditionBuilder;
const condBuilder = window.ConditionBuilder.create({
  data: () => ({ stats: state.stats, simstate: state.simstate, quests: state.quests }),
  onStructuralChange: () => { markDirty("quests.json"); renderQuestEditor(); },
  onValueChange: () => { markDirty("quests.json"); renderValidation(); },
});

// ------------------------------------------------------------------ rewards builder
function defaultForRewardVar(varId) {
  const v = state.simstate.variables.find((x) => x.id === varId);
  if (!v) return '';
  return v.type === 'number' ? 0 : v.type === 'boolean' ? false : '';
}
function defaultReward(type) {
  if (type === 'funds') return { type: 'funds', amount: 0 };
  if (type === 'setVar') {
    const v = state.simstate.variables[0];
    return { type: 'setVar', var: v ? v.id : '', value: v ? defaultForRewardVar(v.id) : '' };
  }
  if (type === 'unlockAsset') {
    const a = state.assets.assets[0];
    return { type: 'unlockAsset', asset: a ? a.id : '' };
  }
  if (type === 'grantContact') {
    const npc = state.npcs.npcs[0];
    return { type: 'grantContact', npc: npc ? npc.id : '' };
  }
  if (type === 'event') return { type: 'event' };
  const v = state.visas.visas[0];
  return { type: 'grantVisa', statusId: v ? v.id : '' };
}
function valueInputForVar(varId, value, onChange, rewardIndex) {
  const v = state.simstate.variables.find((x) => x.id === varId);
  const type = v ? v.type : 'string';
  let input;
  if (type === 'boolean') {
    input = document.createElement('select');
    for (const b of ['true', 'false']) { const o = document.createElement('option'); o.value = b; o.textContent = b; input.appendChild(o); }
    input.value = String(!!value);
    input.addEventListener('change', () => onChange(input.value === 'true'));
  } else if (type === 'number') {
    input = document.createElement('input'); input.type = 'number'; input.step = 'any';
    input.value = value === undefined || value === null ? '' : value;
    input.addEventListener('input', () => onChange(input.value === '' ? 0 : Number(input.value)));
  } else {
    input = document.createElement('input'); input.type = 'text';
    input.value = value === undefined || value === null ? '' : value;
    input.addEventListener('input', () => onChange(input.value));
  }
  input.dataset.role = 'reward-value'; input.dataset.rewardIndex = rewardIndex;
  return input;
}
function renderRewards(container, quest) {
  container.innerHTML = '';
  quest.rewards.forEach((r, i) => {
    const row = document.createElement('div');
    row.className = 'reward-row'; row.dataset.rewardIndex = i;

    const typeSel = document.createElement('select');
    typeSel.dataset.role = 'reward-type'; typeSel.dataset.rewardIndex = i;
    for (const t of ['funds', 'setVar', 'unlockAsset', 'grantVisa', 'grantContact', 'event']) { const o = document.createElement('option'); o.value = t; o.textContent = t; typeSel.appendChild(o); }
    typeSel.value = r.type;
    typeSel.addEventListener('change', () => {
      quest.rewards[i] = defaultReward(typeSel.value);
      markDirty('quests.json');
      renderQuestEditor();
    });
    row.appendChild(typeSel);

    const fieldsWrap = document.createElement('div');
    fieldsWrap.className = 'reward-fields';
    if (r.type === 'funds') {
      const amt = document.createElement('input'); amt.type = 'number'; amt.step = 'any'; amt.value = r.amount ?? 0;
      amt.dataset.role = 'reward-amount'; amt.dataset.rewardIndex = i;
      amt.addEventListener('input', () => { r.amount = amt.value === '' ? 0 : Number(amt.value); markDirty('quests.json'); renderValidation(); });
      fieldsWrap.appendChild(amt);
    } else if (r.type === 'setVar') {
      const varSel = document.createElement('select'); varSel.dataset.role = 'reward-var'; varSel.dataset.rewardIndex = i;
      for (const v of state.simstate.variables) { const o = document.createElement('option'); o.value = v.id; o.textContent = v.name; varSel.appendChild(o); }
      if (r.var && !state.simstate.variables.some((v) => v.id === r.var)) {
        const o = document.createElement('option'); o.value = r.var; o.textContent = r.var + ' (unknown)'; varSel.appendChild(o);
      }
      varSel.value = r.var ?? '';
      varSel.addEventListener('change', () => { r.var = varSel.value; r.value = defaultForRewardVar(varSel.value); markDirty('quests.json'); renderQuestEditor(); });
      fieldsWrap.appendChild(varSel);
      fieldsWrap.appendChild(valueInputForVar(r.var, r.value, (v) => { r.value = v; markDirty('quests.json'); renderValidation(); }, i));
    } else if (r.type === 'unlockAsset') {
      const assetSel = document.createElement('select'); assetSel.dataset.role = 'reward-asset'; assetSel.dataset.rewardIndex = i;
      for (const a of state.assets.assets) { const o = document.createElement('option'); o.value = a.id; o.textContent = a.name; assetSel.appendChild(o); }
      if (r.asset && !state.assets.assets.some((a) => a.id === r.asset)) {
        const o = document.createElement('option'); o.value = r.asset; o.textContent = r.asset + ' (unknown)'; assetSel.appendChild(o);
      }
      assetSel.value = r.asset ?? '';
      assetSel.addEventListener('change', () => { r.asset = assetSel.value; markDirty('quests.json'); renderValidation(); });
      fieldsWrap.appendChild(assetSel);
    } else if (r.type === 'grantVisa') {
      const visaSel = document.createElement('select'); visaSel.dataset.role = 'reward-visa'; visaSel.dataset.rewardIndex = i;
      for (const v of state.visas.visas) { const o = document.createElement('option'); o.value = v.id; o.textContent = v.name; visaSel.appendChild(o); }
      if (r.statusId && !state.visas.visas.some((v) => v.id === r.statusId)) {
        const o = document.createElement('option'); o.value = r.statusId; o.textContent = r.statusId + ' (unknown)'; visaSel.appendChild(o);
      }
      visaSel.value = r.statusId ?? '';
      visaSel.addEventListener('change', () => { r.statusId = visaSel.value; markDirty('quests.json'); renderValidation(); });
      fieldsWrap.appendChild(visaSel);
    } else if (r.type === 'grantContact') {
      const npcSel = document.createElement('select'); npcSel.dataset.role = 'reward-contact'; npcSel.dataset.rewardIndex = i;
      for (const npc of state.npcs.npcs) { const o = document.createElement('option'); o.value = npc.id; o.textContent = npc.name; npcSel.appendChild(o); }
      if (r.npc && !state.npcs.npcs.some((npc) => npc.id === r.npc)) {
        const o = document.createElement('option'); o.value = r.npc; o.textContent = r.npc + ' (unknown)'; npcSel.appendChild(o);
      }
      npcSel.value = r.npc ?? '';
      npcSel.addEventListener('change', () => { r.npc = npcSel.value; markDirty('quests.json'); renderValidation(); });
      fieldsWrap.appendChild(npcSel);
    } else if (r.type === 'event') {
      const eventSel = document.createElement('select'); eventSel.dataset.role = 'reward-event'; eventSel.dataset.rewardIndex = i;
      const blank = document.createElement('option'); blank.value = ''; blank.textContent = '(none)'; eventSel.appendChild(blank);
      for (const event of state.events.events) { const o = document.createElement('option'); o.value = event.id; o.textContent = event.id; eventSel.appendChild(o); }
      if (r.event && !state.events.events.some((event) => event.id === r.event)) {
        const o = document.createElement('option'); o.value = r.event; o.textContent = r.event + ' (unknown)'; eventSel.appendChild(o);
      }
      eventSel.value = r.event ?? '';
      eventSel.addEventListener('change', () => { if (eventSel.value) r.event = eventSel.value; else delete r.event; markDirty('quests.json'); renderValidation(); });
      fieldsWrap.appendChild(eventSel);
    }
    row.appendChild(fieldsWrap);

    const rm = document.createElement('button');
    rm.className = 'cond-remove'; rm.textContent = '× remove';
    rm.dataset.action = 'remove-reward'; rm.dataset.rewardIndex = i;
    rm.addEventListener('click', () => { quest.rewards.splice(i, 1); markDirty('quests.json'); renderQuestEditor(); });
    row.appendChild(rm);

    container.appendChild(row);
  });
}
function addReward() {
  const quest = selectedQuestObj();
  if (!quest) return;
  quest.rewards.push(defaultReward('funds'));
  markDirty('quests.json');
  renderQuestEditor();
}

// ------------------------------------------------------------------ quest sidebar + editor
function renderQuestSidebar() {
  const nav = document.getElementById('questSidebar');
  const q = document.getElementById('questSearch').value.trim().toLowerCase();
  nav.innerHTML = '';
  const items = state.quests.quests.filter((x) => q === '' || x.name.toLowerCase().includes(q) || x.id.toLowerCase().includes(q));
  for (const quest of items) {
    const b = document.createElement('button');
    b.className = 'quest-item' + (quest.id === state.selectedQuest ? ' active' : '');
    b.dataset.questId = quest.id;
    b.innerHTML = `<span>${quest.name}</span>${quest.onceOnly ? '' : '<span class="badge">repeatable</span>'}`;
    b.addEventListener('click', () => { state.selectedQuest = quest.id; renderAll(); });
    nav.appendChild(b);
  }
}
function questUsages(id) {
  const uses = [];
  for (const q of state.quests.quests) {
    if (q.id === id) continue;
    const bits = [];
    if (anyLeaf(q.trigger, (leaf) => leaf.var === `quests.${id}.state`)) bits.push('trigger condition');
    if (anyLeaf(q.completion, (leaf) => leaf.var === `quests.${id}.state`)) bits.push('completion condition');
    if (bits.length) uses.push(`${q.name} (${bits.join(', ')})`);
  }
  return uses;
}
function renderQuestEditor() {
  const root = document.getElementById('questEditor');
  const quest = selectedQuestObj();
  root.innerHTML = '';
  if (!quest) { root.innerHTML = '<div class="empty">Select a quest</div>'; renderValidation(); return; }

  const card1 = document.createElement('div'); card1.className = 'card';
  card1.innerHTML = '<h2>Quest</h2>';
  card1.appendChild(frow('id (fixed — other quests may reference quests.<id>.state)', textInput(() => quest.id, () => {}, 'id', { readonly: true })));
  card1.appendChild(frow('name', textInput(() => quest.name, (v) => { quest.name = v; renderQuestSidebar(); }, 'name', { file: 'quests.json' })));
  const descArea = document.createElement('textarea');
  descArea.dataset.path = 'description'; descArea.rows = 2; descArea.value = quest.description;
  descArea.addEventListener('input', () => { quest.description = descArea.value; markDirty('quests.json'); });
  card1.appendChild(frow('description', descArea));
  const onceWrap = document.createElement('div');
  onceWrap.appendChild(checkInput(() => quest.onceOnly, (v) => { quest.onceOnly = v; renderQuestSidebar(); }, 'onceOnly', { file: 'quests.json' }));
  const onceHint = document.createElement('div');
  onceHint.className = 'hint-line';
  onceHint.textContent = 'Checked = quest completes once and stays "done" forever. Unchecked = repeatable — completing it resets its state to "locked" so the trigger can fire again later, and its rewards are applied again every time it completes.';
  onceWrap.appendChild(onceHint);
  card1.appendChild(frow('once only', onceWrap));
  root.appendChild(card1);

  const card2 = document.createElement('div'); card2.className = 'card';
  card2.innerHTML = '<h2>Trigger — locked → active</h2>';
  const triggerRoot = document.createElement('div'); triggerRoot.dataset.condRoot = 'trigger';
  triggerRoot.appendChild(condBuilder.render(quest.trigger, 'trigger'));
  card2.appendChild(triggerRoot);
  root.appendChild(card2);

  const card3 = document.createElement('div'); card3.className = 'card';
  card3.innerHTML = '<h2>Completion — active → done (applies rewards)</h2>';
  const completionRoot = document.createElement('div'); completionRoot.dataset.condRoot = 'completion';
  completionRoot.appendChild(condBuilder.render(quest.completion, 'completion'));
  card3.appendChild(completionRoot);
  root.appendChild(card3);

  const card4 = document.createElement('div'); card4.className = 'card';
  card4.innerHTML = '<h2>Rewards</h2>';
  const rewardsList = document.createElement('div'); rewardsList.id = 'rewardsList';
  card4.appendChild(rewardsList);
  const addRewardBtn = document.createElement('button'); addRewardBtn.id = 'addReward'; addRewardBtn.textContent = '+ Add reward';
  addRewardBtn.addEventListener('click', addReward);
  card4.appendChild(addRewardBtn);
  root.appendChild(card4);
  renderRewards(rewardsList, quest);

  const card5 = document.createElement('div'); card5.className = 'card';
  card5.innerHTML = '<h2>Actions</h2>';
  const del = document.createElement('button'); del.className = 'danger'; del.id = 'deleteQuest';
  const n = questUsages(quest.id).length;
  del.textContent = n ? `Delete (referenced by ${n} quest${n === 1 ? '' : 's'}!)` : 'Delete';
  del.addEventListener('click', () => removeQuest(quest.id));
  card5.appendChild(del);
  root.appendChild(card5);

  renderValidation();
}

function addQuest() {
  const name = window.prompt('New quest name (e.g. "First Words"):', '');
  if (!name || !name.trim()) return;
  const id = uniqueId(slugify(name.trim()), state.quests.quests.map((q) => q.id), 'quest');
  state.quests.quests.push({
    id, name: name.trim(), description: '',
    trigger: { all: [] }, completion: { all: [] },
    rewards: [], onceOnly: true,
  });
  state.selectedQuest = id;
  markDirty('quests.json');
  renderAll();
}
function removeQuest(id) {
  const quest = state.quests.quests.find((q) => q.id === id);
  if (!quest) return;
  const uses = questUsages(id);
  const msg = uses.length
    ? `"${quest.name}" is referenced by: ${uses.join(', ')}.\n\nDeleting it will remove those condition leaves (an emptied "all" group becomes vacuously TRUE; an emptied "any" group becomes FALSE). Continue?`
    : `Delete "${quest.name}"? No other quests reference it.`;
  if (!window.confirm(msg)) return;
  // AUDIT bugs 4-13: after the in-tool reconciliation, scan every OTHER data file and surface
  // still-dangling references in the status bar (refscan.js) instead of leaving them silent.
  window.RefScan?.warnAfterDelete(id, [id, 'quests.' + id + '.state'], { skipFiles: ['quests.json'] }, (w) => setStatus(w, 'err'));
  state.quests.quests = state.quests.quests.filter((q) => q.id !== id);
  if (uses.length) {
    for (const q of state.quests.quests) {
      q.trigger = stripCondition(q.trigger, (leaf) => leaf.var === `quests.${id}.state`) ?? { all: [] };
      q.completion = stripCondition(q.completion, (leaf) => leaf.var === `quests.${id}.state`) ?? { all: [] };
    }
  }
  state.selectedQuest = state.quests.quests[0]?.id ?? null;
  markDirty('quests.json');
  renderAll();
}

// ------------------------------------------------------------------ variables (data/simstate.json)
function defaultForType(type) { return type === 'number' ? 0 : type === 'boolean' ? false : ''; }
function defaultValueControl(v) {
  const wrap = document.createElement('div');
  wrap.className = 'default-value-wrap';
  const nullCb = document.createElement('input');
  nullCb.type = 'checkbox'; nullCb.checked = v.default === null;
  nullCb.dataset.path = `var.${v.id}.defaultIsNull`;
  nullCb.addEventListener('change', () => {
    v.default = nullCb.checked ? null : defaultForType(v.type);
    markDirty('simstate.json');
    renderVariables();
  });
  const nullLabel = document.createElement('span'); nullLabel.textContent = 'null';
  wrap.append(nullCb, nullLabel);

  let input;
  if (v.default === null) {
    input = document.createElement('input'); input.type = 'text'; input.value = ''; input.disabled = true; input.placeholder = '(null)';
  } else if (v.type === 'boolean') {
    input = document.createElement('input'); input.type = 'checkbox'; input.checked = !!v.default;
    input.addEventListener('change', () => { v.default = input.checked; markDirty('simstate.json'); });
  } else if (v.type === 'number') {
    input = document.createElement('input'); input.type = 'number'; input.step = 'any'; input.value = v.default;
    input.addEventListener('input', () => { v.default = input.value === '' ? 0 : Number(input.value); markDirty('simstate.json'); });
  } else {
    input = document.createElement('input'); input.type = 'text'; input.value = v.default ?? '';
    input.addEventListener('input', () => { v.default = input.value; markDirty('simstate.json'); });
  }
  input.dataset.path = `var.${v.id}.default`;
  wrap.appendChild(input);
  return wrap;
}
function renderVariables() {
  const root = document.getElementById('variablesList');
  root.innerHTML = '';
  for (const v of state.simstate.variables) {
    const row = document.createElement('div');
    row.className = 'var-row'; row.dataset.varId = v.id;
    row.appendChild(frow('name', textInput(() => v.name, (val) => { v.name = val; }, `var.${v.id}.name`, { file: 'simstate.json' })));
    row.appendChild(frow('id', textInput(() => v.id, () => {}, `var.${v.id}.id`, { readonly: true })));

    const typeSel = document.createElement('select');
    typeSel.dataset.path = `var.${v.id}.type`;
    for (const t of ['string', 'number', 'boolean']) { const o = document.createElement('option'); o.value = t; o.textContent = t; typeSel.appendChild(o); }
    typeSel.value = v.type;
    typeSel.addEventListener('change', () => {
      v.type = typeSel.value;
      if (v.default !== null) v.default = defaultForType(v.type);
      markDirty('simstate.json');
      renderVariables();
    });
    row.appendChild(frow('type', typeSel));
    row.appendChild(frow('default value', defaultValueControl(v)));

    const del = document.createElement('button');
    del.className = 'danger'; del.dataset.action = 'delete-variable'; del.dataset.varId = v.id;
    del.textContent = 'Delete variable';
    del.addEventListener('click', () => removeVariable(v.id));
    row.appendChild(del);
    root.appendChild(row);
  }
  renderValidation();
}
function conditionReferencesVar(cond, varId) { return anyLeaf(cond, (leaf) => leaf.var === `vars.${varId}`); }
function varUsages(varId) {
  const uses = [];
  for (const q of state.quests.quests) {
    const bits = [];
    if (conditionReferencesVar(q.trigger, varId)) bits.push('trigger condition');
    if (conditionReferencesVar(q.completion, varId)) bits.push('completion condition');
    if (q.rewards.some((r) => r.type === 'setVar' && r.var === varId)) bits.push('setVar reward');
    if (bits.length) uses.push(`${q.name} (${bits.join(', ')})`);
  }
  return uses;
}
function addVariable() {
  const name = window.prompt('New variable name (e.g. "Visa Status"):', '');
  if (!name || !name.trim()) return;
  const id = uniqueId(slugify(name.trim()), state.simstate.variables.map((v) => v.id), 'var');
  state.simstate.variables.push({ id, name: name.trim(), type: 'string', default: '' });
  markDirty('simstate.json');
  renderAll();
}
function removeVariable(id) {
  const v = state.simstate.variables.find((x) => x.id === id);
  if (!v) return;
  const uses = varUsages(id);
  const msg = uses.length
    ? `"${v.name}" is referenced by: ${uses.join(', ')}.\n\nDeleting it will remove those condition leaves (an emptied "all" group becomes vacuously TRUE; an emptied "any" group becomes FALSE) and delete the matching setVar reward(s). Continue?`
    : `Delete "${v.name}"? No quests reference it.`;
  if (!window.confirm(msg)) return;
  // AUDIT bugs 4-13: after the in-tool reconciliation, scan every OTHER data file and surface
  // still-dangling references in the status bar (refscan.js) instead of leaving them silent.
  window.RefScan?.warnAfterDelete(id, [id, 'vars.' + id], { skipFiles: ['quests.json', 'simstate.json'] }, (w) => setStatus(w, 'err'));
  state.simstate.variables = state.simstate.variables.filter((x) => x.id !== id);
  let alsoQuests = false;
  if (uses.length) {
    for (const q of state.quests.quests) {
      const before = JSON.stringify([q.trigger, q.completion, q.rewards]);
      q.trigger = stripCondition(q.trigger, (leaf) => leaf.var === `vars.${id}`) ?? { all: [] };
      q.completion = stripCondition(q.completion, (leaf) => leaf.var === `vars.${id}`) ?? { all: [] };
      q.rewards = q.rewards.filter((r) => !(r.type === 'setVar' && r.var === id));
      if (JSON.stringify([q.trigger, q.completion, q.rewards]) !== before) alsoQuests = true;
    }
  }
  markDirty('simstate.json');
  if (alsoQuests) markDirty('quests.json');
  renderAll();
}

// ------------------------------------------------------------------ live validation
// Never blocks saving — the designer may deliberately leave a quest half-built or a group
// empty while iterating; this panel only surfaces the runtime semantics so mistakes are
// informed choices, not silent surprises (PROJECT_CONTEXT.md §3.2 "live validation").
function collectValidationIssues() {
  const issues = [];
  if (!state.quests) return issues;
  const needIds = new Set(state.stats.needs.map((n) => n.id));
  const skillIds = new Set(state.stats.skills.map((s) => s.id));
  const varIds = new Set(state.simstate.variables.map((v) => v.id));
  const questIds = new Set(state.quests.quests.map((q) => q.id));
  const assetIds = new Set(state.assets.assets.map((a) => a.id));
  const visaIds = new Set(state.visas.visas.map((v) => v.id));
  const npcIds = new Set(state.npcs.npcs.map((npc) => npc.id));

  function checkLeaf(leaf, questName, field) {
    if (!leaf.var) { issues.push(`${questName} — ${field}: a condition is missing its var path.`); return; }
    if (!getLeafOp(leaf)) { issues.push(`${questName} — ${field}: "${leaf.var}" has no operator (gte/lte/eq/neq) set — always evaluates false.`); }
    if (leaf.var.startsWith('needs.')) {
      if (!needIds.has(leaf.var.slice(6))) issues.push(`${questName} — ${field}: unknown need id "${leaf.var}".`);
      return;
    }
    if (leaf.var.startsWith('skills.')) {
      if (!skillIds.has(leaf.var.slice(7))) issues.push(`${questName} — ${field}: unknown skill id "${leaf.var}".`);
      return;
    }
    if (leaf.var.startsWith('vars.')) {
      if (!varIds.has(leaf.var.slice(5))) issues.push(`${questName} — ${field}: unknown variable "${leaf.var.slice(5)}".`);
      return;
    }
    if (leaf.var === 'funds' || leaf.var === 'job.level' || leaf.var === 'time.hour' || leaf.var === 'time.day') return;
    const m = /^quests\.(.+)\.state$/.exec(leaf.var);
    if (m) {
      if (!questIds.has(m[1])) issues.push(`${questName} — ${field}: unknown quest id "${leaf.var}".`);
      return;
    }
    issues.push(`${questName} — ${field}: unrecognized condition namespace "${leaf.var}" (always evaluates false).`);
  }
  function checkCondition(cond, questName, field) {
    if (!cond) return;
    if (isLeafCond(cond)) { checkLeaf(cond, questName, field); return; }
    const key = 'all' in cond ? 'all' : 'any';
    const arr = cond[key] || [];
    if (arr.length === 0) issues.push(`${questName} — ${field}: empty "${key}" group is ${key === 'all' ? 'vacuously TRUE' : 'always FALSE (nothing to satisfy)'}.`);
    for (const c of arr) checkCondition(c, questName, field);
  }

  for (const q of state.quests.quests) {
    if (!q.id) issues.push(`A quest is missing an id.`);
    if (!q.name) issues.push(`Quest "${q.id}" is missing a name.`);
    checkCondition(q.trigger, q.name || q.id, 'trigger');
    checkCondition(q.completion, q.name || q.id, 'completion');
    q.rewards.forEach((r, i) => {
      if (r.type === 'grantContact' && !npcIds.has(r.npc)) issues.push(`Quest reward #${i + 1}: grantContact references unknown NPC "${r.npc}".`);
      if (r.type === 'setVar' && !varIds.has(r.var)) issues.push(`${q.name} — reward #${i + 1}: setVar references unknown variable "${r.var}".`);
      if (r.type === 'unlockAsset' && !assetIds.has(r.asset)) issues.push(`${q.name} — reward #${i + 1}: unlockAsset references unknown asset "${r.asset}".`);
      if (r.type === 'grantVisa' && !visaIds.has(r.statusId)) issues.push(`${q.name} — reward #${i + 1}: grantVisa references unknown visa "${r.statusId}".`);
      if (r.type === 'funds' && typeof r.amount !== 'number') issues.push(`${q.name} — reward #${i + 1}: funds reward missing a numeric amount.`);
    });
  }
  return issues;
}
function renderValidation() {
  const panel = document.getElementById('validationList');
  const header = document.getElementById('validationHeader');
  if (!panel || !state.quests) return;
  const issues = collectValidationIssues();
  panel.innerHTML = '';
  for (const msg of issues) { const li = document.createElement('li'); li.textContent = msg; panel.appendChild(li); }
  if (header) header.textContent = issues.length ? `Validation — ⚠ ${issues.length} issue${issues.length === 1 ? '' : 's'} (warnings only, saving is never blocked)` : 'Validation — ✓ no issues';
}

function renderAll() { renderVariables(); renderQuestSidebar(); renderQuestEditor(); renderValidation(); }

// ------------------------------------------------------------------ boot
document.getElementById('questSearch').addEventListener('input', renderQuestSidebar);
document.getElementById('newQuest').addEventListener('click', addQuest);
document.getElementById('addVariable').addEventListener('click', addVariable);
document.getElementById('save').addEventListener('click', saveAll);
window.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveAll(); }
});
window.addEventListener('beforeunload', (e) => { if (state.dirty.size > 0) e.preventDefault(); });
load();
</script>
