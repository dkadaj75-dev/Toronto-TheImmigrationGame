<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1b2230" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <title>Condo Life</title>
  <script>if (new URLSearchParams(location.search).has('dev') || location.hash === '#dev') document.documentElement.classList.add('dev-boot');</script>
  <style>
    :root { --hud-bg: rgba(20, 26, 38, 0.82); --hud-fg: #e8ecf4; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overscroll-behavior: none; }
    body {
      background: #1b2230; font-family: system-ui, -apple-system, sans-serif;
      touch-action: none; overflow: hidden;
      /* mobile polish: no native double-tap-zoom/callout/selection anywhere in the game shell —
         this is a game, not a document; the HUD (game/ui.ts) is appended into this same body. */
      -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }
    #app { position: fixed; inset: 0; overscroll-behavior: none; }
    canvas { display: block; touch-action: none; }
    [hidden] { display: none !important; }
    #title-screen {
      position: fixed; inset: 0; z-index: 110; display: grid; place-items: center;
      padding: calc(24px + env(safe-area-inset-top, 0px)) calc(20px + env(safe-area-inset-right, 0px))
        calc(20px + env(safe-area-inset-bottom, 0px)) calc(20px + env(safe-area-inset-left, 0px));
      color: var(--theme-title-screen-fg, #eaf0fb); background: #1b2230 center / cover no-repeat;
      font-family: var(--theme-title-screen-font-family, system-ui, sans-serif);
    }
    .dev-boot #title-screen { display: none; }
    #title-screen::before { content: ''; position: absolute; inset: 0; background: rgba(9,13,22,.5); }
    .title-card {
      position: relative; width: min(420px, 100%); max-height: 100%; overflow: auto; text-align: center;
      padding: clamp(22px, 6vw, 38px); border: var(--theme-title-screen-outline-width, 1px) solid var(--theme-title-screen-outline, rgba(130,158,210,.55));
      border-radius: var(--theme-title-screen-radius, 18px); background: var(--theme-title-screen-bg, rgba(20,26,40,.88));
      box-shadow: var(--theme-title-screen-shadow, 0 10px 40px rgba(0,0,0,.45));
    }
    /* hideCard (data/title.json): the card stretches over the whole screen with no chrome;
       contents stay centered unless given an explicit anchor (.title-anchored). */
    .title-card.no-card { position: absolute; inset: 0; width: auto; max-height: none; padding: 0;
      border: 0; border-radius: 0; background: transparent; box-shadow: none; overflow: visible;
      display: grid; place-items: center; align-content: center; grid-auto-rows: min-content; gap: 4px; }
    .title-card.no-card > #title-panel { width: min(420px, calc(100vw - 40px)); max-height: 100dvh; overflow: auto; }
    .title-anchored { margin: 0 !important; z-index: 1; }
    #title-menu.title-anchored { width: min(320px, calc(100vw - 32px)); }
    #title-logo-image { display: block; max-width: min(280px, 80vw); max-height: 24vh; margin: 0 auto 10px; object-fit: contain; }
    #title-logo-text { font-size: clamp(40px, 12vw, 70px); line-height: .95; color: var(--theme-title-screen-accent, #9fd08c); text-shadow: 0 4px 18px #000; }
    #title-menu { display: grid; gap: 10px; margin: clamp(24px, 7vh, 52px) auto 8px; }
    .title-menu-button {
      width: 100%; min-height: 48px; padding: 10px 18px; border: var(--theme-button-outline-width, 0px) solid var(--theme-button-outline, transparent);
      border-radius: var(--theme-button-radius, 999px); color: var(--theme-button-fg, #eaf0fb); background: var(--theme-button-bg, rgba(90,120,190,.55));
      box-shadow: var(--theme-button-shadow, none); font: 700 max(16px, var(--theme-button-font-size, 16px))/1.2 var(--theme-button-font-family, inherit); cursor: pointer;
    }
    .title-menu-button:focus-visible { outline: 3px solid var(--theme-title-screen-accent, #9fd08c); outline-offset: 2px; }
    .title-menu-button:disabled { cursor: not-allowed; opacity: .42; }
    #title-hint { min-height: 1.4em; font-size: 13px; opacity: .78; }
    #title-panel h2 { margin-bottom: 22px; font-size: clamp(24px, 7vw, 34px); }
    .title-options-fields { display: grid; gap: 20px; margin-bottom: 28px; text-align: left; }
    .title-option { display: grid; gap: 8px; font-size: 16px; }
    .title-option input[type='range'] { width: 100%; min-height: 44px; accent-color: var(--theme-title-screen-accent, #9fd08c); }
    .title-save-list { display: grid; gap: 10px; margin-bottom: 14px; text-align: left; }
    .title-save-card { padding: 12px; border: var(--theme-outline-width, 1px) solid var(--theme-outline, rgba(130,158,210,.4)); border-radius: var(--theme-card-radius, 12px); background: var(--theme-card-bg, rgba(43,57,86,.7)); }
    .title-save-head { display: flex; justify-content: space-between; gap: 10px; }
    .title-save-head span { font-size: 11px; opacity: .7; text-transform: uppercase; }
    .title-save-meta { margin: 7px 0 10px; font-size: 12px; opacity: .8; }
    .title-save-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .title-save-actions .title-menu-button { min-height: 44px; padding: 7px; font-size: 13px; }
    .title-save-import { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .title-save-import select { min-height: 44px; border: 0; border-radius: var(--theme-button-radius, 999px); padding: 8px; background: var(--theme-panel-bg, #20283a); color: inherit; }
    .title-save-import label { display: grid; place-items: center; }
    .title-save-import input { position: absolute; width: 1px; height: 1px; opacity: 0; }
    .title-save-confirm { position: sticky; bottom: 0; z-index: 2; display: grid; gap: 8px; padding: 12px; margin: 10px 0; border-radius: var(--theme-panel-radius, 12px); background: var(--theme-panel-bg, #20283a); box-shadow: var(--theme-shadow, 0 6px 24px rgba(0,0,0,.45)); }
    .save-confirm-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    #title-credits { margin-top: 22px; font-size: 12px; opacity: .65; }
    @media (orientation: landscape) and (max-height: 520px) {
      .title-card { width: min(680px, 100%); padding: 18px 28px; }
      #title-logo-text { font-size: clamp(34px, 9vh, 48px); }
      #title-menu { grid-template-columns: repeat(3, 1fr); margin: 18px auto 4px; }
      #title-credits { margin-top: 8px; }
    }
    #boot {
      --loading-fill: #9fd08c; --loading-track: #313b50; --loading-height: 14px;
      position: fixed; inset: 0; display: grid; place-items: center;
      color: var(--hud-fg); background: #1b2230 center / cover no-repeat; z-index: 100;
      transition: opacity .3s; font-size: 14px; letter-spacing: .04em;
    }
    #boot.done { opacity: 0; pointer-events: none; }
    #boot::before { content: ''; position: absolute; inset: 0; background: rgba(9, 13, 22, .58); }
    .loading-card { position: relative; width: min(520px, calc(100vw - 48px)); text-align: center; text-shadow: 0 2px 12px #000; }
    #loading-phrase { min-height: 1.5em; margin-bottom: 18px; font-size: clamp(16px, 4vw, 22px); font-weight: 650; }
    #loading-track { height: var(--loading-height); overflow: hidden; border-radius: 999px; background: var(--loading-track); box-shadow: 0 2px 12px rgba(0,0,0,.5); }
    #loading-fill { width: 0; height: 100%; border-radius: inherit; background: var(--loading-fill); transition: width .15s ease-out; }
    #loading-count { margin-top: 8px; font-size: 11px; opacity: .8; font-variant-numeric: tabular-nums; }
    #loading-tap { margin-top: 18px; padding: 10px 16px; border: 1px solid rgba(255,255,255,.45); border-radius: 999px; color: inherit; background: rgba(20,26,38,.72); font: inherit; cursor: pointer; }
    #loading-tap[hidden] { display: none; }
  </style>
</head>
<body>
  <div id="app"></div>
  <section id="title-screen" aria-label="Condo Life title screen">
    <div class="title-card">
      <div id="title-identity">
        <img id="title-logo-image" alt="" hidden />
        <h1 id="title-logo-text" hidden></h1>
      </div>
      <nav id="title-menu" aria-label="Main menu">
        <button class="title-menu-button" type="button">New Game</button>
        <button class="title-menu-button" type="button" disabled>Load Game</button>
        <button class="title-menu-button" type="button">Options</button>
      </nav>
      <div id="title-hint" role="status"></div>
      <section id="title-panel" hidden></section>
      <footer id="title-credits" hidden></footer>
    </div>
  </section>
  <div id="boot">
    <div class="loading-card">
      <div id="loading-phrase">Loading condo…</div>
      <div id="loading-track" role="progressbar" aria-label="Loading assets" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><div id="loading-fill"></div></div>
      <div id="loading-count">Preparing paperwork…</div>
      <button id="loading-tap" type="button" hidden>Tap to start the music</button>
    </div>
  </div>
  <script type="module" src="/game/main.ts"></script>
  <script type="module">
    // PWA (PROJECT_CONTEXT.md §8): registered on the game page only, never the
    // tool pages (tools/*.html don't include this). Module-typed so the SW can
    // import sw-routing.js's pure predicate directly. Network-first strategy
    // (see sw.js's own comments) means this is safe to leave registered during
    // `npm run dev` too — the cache is only ever an offline fallback.
    if (import.meta.env.DEV) {
      const toolNav = document.createElement('script');
      toolNav.src = new URL('tools/nav.js', document.baseURI).href;
      document.body.appendChild(toolNav);
    }
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register(new URL('sw.js', document.baseURI), { type: 'module' }).catch((err) => {
          console.warn('service worker registration failed (offline support disabled):', err);
        });
      });
    }
  </script>
</body>
</html>
